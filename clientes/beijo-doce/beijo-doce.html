<style>

  scrim.addEventListener('click',function(){ setMenu(false); });
  drawer.querySelectorAll('[data-close]').forEach(function(a){ a.addEventListener('click',function(){ setMenu(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.1,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });
  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=parseFloat(el.dataset.count)||0,sf=el.dataset.suffix||'',st=performance.now(); (function tk(n){ var p=Math.min((n-st)/1400,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  var form=document.getElementById('cform');
  if(form){ var msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      var t='Olá! Meu nome é '+form.nome.value+'.'+(form.msg.value?' Pedido: '+form.msg.value:'')+' 😋';
      msg.style.color=acc; msg.textContent='✓ Abrindo o WhatsApp...';
      window.open(waMsg(t),'_blank'); form.reset();
    });
  }
})();
</script>
