<style>
:root{
  --accent:#3FA9C9;
  --ink:#0C2A35; --ink2:#3D5660; --muted:#79929C; --line:#E4EDF1;
  --bg:#FFFFFF; --soft:#F3F9FC; --soft2:#E9F4F8;
  --wa:#25D366;
  --disp:"Poppins", sans-serif; --body:"Inter", sans-serif;
  --maxw:1180px; --ease:cubic-bezier(.16,.84,.34,1);
  --shadow:0 18px 50px -22px rgba(12,42,53,.28);
  --shadow-sm:0 8px 26px -16px rgba(12,42,53,.30);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
body{ background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.65; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--disp); line-height:1.1; letter-spacing:-.02em; font-weight:700; }
em{ font-style:normal; color:var(--accent); }
::selection{ background:var(--accent); color:#fff; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
svg{ display:block; }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:20px; }
.section{ padding-block:64px; }
.kicker{ font-family:var(--disp); font-weight:600; font-size:.74rem; letter-spacing:.16em; text-transform:uppercase; color:var(--accent);
  display:inline-flex; align-items:center; gap:9px; background:var(--soft2); padding:7px 14px; border-radius:30px; }
.kicker svg{ width:15px; height:15px; }
.sec-head{ max-width:640px; margin-bottom:34px; }
.sec-title{ font-size:clamp(1.9rem,7vw,2.9rem); margin-top:16px; }
.sec-intro{ color:var(--ink2); margin-top:14px; font-size:1.02rem; }

/* botões */
.btn{ font-family:var(--disp); font-weight:600; font-size:.95rem; padding:15px 24px; border-radius:14px; display:inline-flex;
  align-items:center; justify-content:center; gap:10px; transition:transform .25s var(--ease), box-shadow .25s, background .25s; cursor:pointer; border:none; }
.btn svg{ width:19px; height:19px; }
.btn--wa{ background:var(--wa); color:#fff; box-shadow:0 14px 30px -12px rgba(37,211,102,.6); }
.btn--accent{ background:var(--accent); color:#fff; box-shadow:0 14px 30px -12px color-mix(in srgb,var(--accent) 70%, transparent); }
.btn--ghost{ background:#fff; color:var(--ink); border:1.5px solid var(--line); }
.btn:active{ transform:scale(.97); }
.btn--block{ width:100%; }
@media(hover:hover){ .btn--wa:hover,.btn--accent:hover{ transform:translateY(-2px); } .btn--ghost:hover{ border-color:var(--accent); color:var(--accent); } }

/* ---------- LOADER ---------- */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--bg); display:grid; place-items:center; transition:opacity .6s, visibility .6s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld-mark{ width:64px; height:64px; border-radius:18px; background:var(--accent); display:grid; place-items:center; color:#fff; animation:pulse 1.1s var(--ease) infinite; }
.ld-mark svg{ width:34px; height:34px; }
@keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1 } 50%{ transform:scale(.86); opacity:.7 } }

/* ---------- HEADER ---------- */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .35s, box-shadow .35s, padding .35s; }
.header.scrolled{ background:rgba(255,255,255,.92); backdrop-filter:blur(12px); box-shadow:0 6px 22px -16px rgba(12,42,53,.5); }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:14px; gap:12px; }
.brand{ display:flex; align-items:center; gap:10px; min-width:0; }
.brand .bmark{ width:40px; height:40px; border-radius:11px; background:var(--accent); color:#fff; display:grid; place-items:center; flex-shrink:0; }
.brand .bmark svg{ width:23px; height:23px; }
.brand .bn{ font-family:var(--disp); font-weight:700; font-size:1.06rem; color:var(--ink); line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.brand .bn b{ font-weight:700; color:var(--accent); }
.brand .tag{ display:block; font-family:var(--body); font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:500; margin-top:1px; }
.nav-links{ display:none; }
.nav-cta{ display:none; }
.nav-tools{ display:flex; align-items:center; gap:8px; }
.icon-wa{ width:44px; height:44px; border-radius:12px; background:var(--wa); color:#fff; display:grid; place-items:center; flex-shrink:0; }
.icon-wa svg{ width:22px; height:22px; }
.burger{ width:46px; height:46px; border-radius:12px; border:1.5px solid var(--line); background:#fff; position:relative; cursor:pointer; flex-shrink:0; }
.burger span{ position:absolute; left:13px; width:20px; height:2px; background:var(--ink); border-radius:2px; transition:.3s var(--ease); }
.burger span:nth-child(1){ top:16px; } .burger span:nth-child(2){ top:22px; } .burger span:nth-child(3){ top:28px; }
.burger.open span:nth-child(1){ top:22px; transform:rotate(45deg); }
.burger.open span:nth-child(2){ opacity:0; }
.burger.open span:nth-child(3){ top:22px; transform:rotate(-45deg); }

/* drawer mobile */
.scrim{ position:fixed; inset:0; background:rgba(12,42,53,.45); z-index:1040; opacity:0; visibility:hidden; transition:.35s; }
.scrim.open{ opacity:1; visibility:visible; }
.drawer{ position:fixed; top:0; right:0; height:100%; width:82%; max-width:340px; background:#fff; z-index:1050;
  transform:translateX(100%); transition:transform .4s var(--ease); display:flex; flex-direction:column; padding:18px 22px 26px; }
.drawer.open{ transform:none; }
.drawer-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.drawer-links{ display:flex; flex-direction:column; gap:4px; margin-top:14px; }
.drawer-links a{ font-family:var(--disp); font-weight:600; font-size:1.15rem; color:var(--ink); padding:14px 6px; border-bottom:1px solid var(--line); }
.drawer-links a:active{ color:var(--accent); }
.drawer-foot{ margin-top:auto; display:grid; gap:12px; }
.drawer-info{ font-size:.85rem; color:var(--ink2); display:flex; align-items:center; gap:9px; }
.drawer-info svg{ width:17px; height:17px; color:var(--accent); flex-shrink:0; }

/* ---------- HERO ---------- */
.hero{ position:relative; padding-top:96px; padding-bottom:54px; background:
  radial-gradient(70% 55% at 85% 0%, var(--soft2), transparent 70%),
  radial-gradient(60% 50% at 0% 100%, var(--soft), transparent 70%); overflow:hidden; }
.hero h1{ font-size:clamp(2.2rem,9vw,3.6rem); font-weight:800; margin:16px 0; letter-spacing:-.03em; }
.hero .sub{ color:var(--ink2); font-size:1.08rem; max-width:520px; }
.hero-chips{ display:flex; flex-wrap:wrap; gap:8px; margin:22px 0 26px; }
.chip{ display:inline-flex; align-items:center; gap:7px; background:#fff; border:1px solid var(--line); border-radius:30px;
  padding:8px 14px; font-size:.82rem; font-weight:500; color:var(--ink); box-shadow:var(--shadow-sm); }
.chip svg{ width:15px; height:15px; color:var(--accent); }
.chip .star{ color:#F5A623; }
.hero-actions{ display:flex; flex-direction:column; gap:12px; }
.hero-visual{ position:relative; margin-top:38px; }
.hero-card{ position:relative; aspect-ratio:4/3; border-radius:24px; overflow:hidden; box-shadow:var(--shadow);
  background:linear-gradient(150deg, color-mix(in srgb,var(--accent) 22%, #fff), color-mix(in srgb,var(--accent) 6%, #fff)); }
.hero-card img{ width:100%; height:100%; object-fit:cover; }
.hero-card .ph{ position:absolute; inset:0; display:grid; place-items:center; color:color-mix(in srgb,var(--accent) 55%, #fff); }
.hero-card .ph svg{ width:84px; height:84px; }
.hero-badge{ position:absolute; left:14px; bottom:14px; background:#fff; border-radius:16px; padding:12px 16px; box-shadow:var(--shadow);
  display:flex; align-items:center; gap:11px; }
.hero-badge .hb-ic{ width:40px; height:40px; border-radius:11px; background:var(--soft2); color:var(--accent); display:grid; place-items:center; }
.hero-badge .hb-ic svg{ width:22px; height:22px; }
.hero-badge .hb-n{ font-family:var(--disp); font-weight:700; font-size:1.1rem; line-height:1; }
.hero-badge .hb-l{ font-size:.72rem; color:var(--muted); }

/* ---------- TRUST BAR ---------- */
.trust{ background:var(--ink); }
.trust-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:18px 14px; }
.trust .ti{ display:flex; align-items:center; gap:11px; color:#fff; }
.trust .ti .tc{ width:42px; height:42px; border-radius:12px; background:rgba(255,255,255,.10); color:var(--accent); display:grid; place-items:center; flex-shrink:0; }
.trust .ti .tc svg{ width:22px; height:22px; }
.trust .ti b{ font-family:var(--disp); font-size:.95rem; display:block; line-height:1.2; }
.trust .ti span{ font-size:.76rem; color:#A9C2CC; }

/* ---------- SOBRE ---------- */
.about{ background:var(--soft); }
.about-media{ position:relative; aspect-ratio:4/3; border-radius:22px; overflow:hidden; box-shadow:var(--shadow); margin-bottom:28px;
  background:linear-gradient(150deg, color-mix(in srgb,var(--accent) 18%, #fff), #fff); }
.about-media img{ width:100%; height:100%; object-fit:cover; }
.about-media .ph{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--disp); font-weight:700; font-size:3rem; color:color-mix(in srgb,var(--accent) 55%, #fff); }
.about-text p{ color:var(--ink2); margin-bottom:14px; }
.about-stats{ display:flex; flex-wrap:wrap; gap:26px; margin:24px 0; }
.about-stats .n{ font-family:var(--disp); font-weight:800; font-size:2rem; color:var(--accent); line-height:1; }
.about-stats .l{ font-size:.78rem; color:var(--muted); margin-top:5px; }
.about-certs{ display:flex; flex-wrap:wrap; gap:9px; }
.about-certs span{ display:inline-flex; align-items:center; gap:7px; font-size:.82rem; padding:9px 14px; border-radius:30px; background:#fff; border:1px solid var(--line); color:var(--ink2); }
.about-certs span svg{ width:15px; height:15px; color:var(--accent); }

/* ---------- SERVIÇOS ---------- */
.svc-grid{ display:grid; grid-template-columns:1fr; gap:14px; }
.svc-card{ background:#fff; border:1px solid var(--line); border-radius:20px; padding:22px; transition:transform .3s var(--ease), box-shadow .3s, border-color .3s; }
.svc-card .ic{ width:52px; height:52px; border-radius:15px; background:var(--soft2); color:var(--accent); display:grid; place-items:center; margin-bottom:14px; transition:.3s; }
.svc-card .ic svg{ width:27px; height:27px; }
.svc-card h3{ font-size:1.18rem; font-weight:600; margin-bottom:7px; }
.svc-card p{ color:var(--ink2); font-size:.92rem; }
.svc-card .price{ display:inline-block; margin-top:13px; font-family:var(--disp); font-weight:600; font-size:.86rem; color:var(--accent); background:var(--soft); padding:6px 12px; border-radius:9px; }
@media(hover:hover){ .svc-card:hover{ transform:translateY(-4px); box-shadow:var(--shadow); border-color:transparent; } .svc-card:hover .ic{ background:var(--accent); color:#fff; } }

/* ---------- CTA / EMERGÊNCIA ---------- */
.cta-band{ background:linear-gradient(135deg, var(--accent), color-mix(in srgb,var(--accent) 60%, #0C2A35)); color:#fff; border-radius:24px; padding:38px 24px; text-align:center; }
.cta-band h2{ font-size:clamp(1.6rem,6vw,2.3rem); margin-bottom:10px; }
.cta-band p{ color:rgba(255,255,255,.9); margin-bottom:22px; max-width:480px; margin-inline:auto; }
.cta-band .btn--wa{ box-shadow:0 16px 34px -12px rgba(0,0,0,.4); }

/* ---------- DEPOIMENTOS ---------- */
.quotes{ background:var(--soft); }
.qtrack{ overflow:hidden; }
.qslides{ display:flex; transition:transform .6s var(--ease); }
.qslide{ min-width:100%; padding:4px; }
.qcard{ background:#fff; border:1px solid var(--line); border-radius:20px; padding:26px; box-shadow:var(--shadow-sm); }
.qstars{ display:flex; gap:3px; color:#F5A623; margin-bottom:14px; }
.qstars svg{ width:18px; height:18px; }
.qquote{ font-size:1.05rem; color:var(--ink); line-height:1.6; }
.qauthor{ margin-top:18px; font-family:var(--disp); font-weight:600; font-size:.95rem; }
.qauthor span{ display:block; font-family:var(--body); font-weight:400; color:var(--muted); font-size:.8rem; margin-top:2px; }
.qdots{ display:flex; gap:8px; justify-content:center; margin-top:22px; }
.qdots button{ width:8px; height:8px; border-radius:50%; border:none; background:var(--line); cursor:pointer; transition:.3s; }
.qdots button.active{ background:var(--accent); width:24px; border-radius:8px; }

/* ---------- CONTATO ---------- */
.contact-grid{ display:grid; gap:30px; }
.cform{ display:grid; gap:16px; background:#fff; border:1px solid var(--line); border-radius:22px; padding:24px; box-shadow:var(--shadow-sm); }
.fld label{ display:block; font-size:.78rem; font-weight:600; color:var(--ink2); margin-bottom:7px; }
.fld input,.fld select,.fld textarea{ width:100%; background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:13px 14px;
  font-family:var(--body); font-size:1rem; color:var(--ink); transition:border-color .25s, background .25s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); background:#fff; }
.fld textarea{ resize:vertical; min-height:96px; }
.cmsg{ font-size:.88rem; color:var(--accent); min-height:18px; font-weight:500; }
.cinfo{ display:grid; gap:12px; align-content:start; }
.cinfo .it{ display:flex; gap:13px; align-items:flex-start; background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; }
.cinfo .it .ic{ width:42px; height:42px; border-radius:12px; background:var(--soft2); color:var(--accent); display:grid; place-items:center; flex-shrink:0; }
.cinfo .it .ic svg{ width:21px; height:21px; }
.cinfo .it h4{ font-family:var(--body); font-weight:600; font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.cinfo .it p{ font-size:.98rem; color:var(--ink); }
.cmap{ border-radius:16px; overflow:hidden; border:1px solid var(--line); }
.cmap iframe{ width:100%; height:200px; border:0; display:block; }

/* WhatsApp flutuante */
.wa{ position:fixed; right:16px; bottom:16px; z-index:800; width:58px; height:58px; border-radius:50%; background:var(--wa); display:grid; place-items:center;
  box-shadow:0 12px 30px -8px rgba(37,211,102,.6); animation:waPulse 2.4s infinite; }
.wa svg{ width:30px; height:30px; fill:#fff; }
@keyframes waPulse{ 0%{ box-shadow:0 12px 30px -8px rgba(37,211,102,.6), 0 0 0 0 rgba(37,211,102,.45) } 70%{ box-shadow:0 12px 30px -8px rgba(37,211,102,.6), 0 0 0 16px rgba(37,211,102,0) } 100%{ box-shadow:0 12px 30px -8px rgba(37,211,102,.6), 0 0 0 0 rgba(37,211,102,0) } }

/* ---------- FOOTER ---------- */
.footer{ background:var(--ink); color:#fff; padding-block:48px 28px; }
.footer .fmark{ display:flex; align-items:center; gap:11px; margin-bottom:16px; }
.footer .fmark .bmark{ width:42px; height:42px; border-radius:12px; background:var(--accent); display:grid; place-items:center; }
.footer .fmark .bmark svg{ width:24px; height:24px; }
.footer .fmark b{ font-family:var(--disp); font-weight:700; font-size:1.15rem; }
.footer .ftag{ color:#A9C2CC; max-width:420px; margin-bottom:24px; }
.fnav{ display:flex; flex-wrap:wrap; gap:16px 24px; margin-bottom:24px; }
.fnav a{ font-size:.92rem; color:#C9DBE2; } .fnav a:active{ color:#fff; }
.fsoc{ display:flex; gap:10px; margin-bottom:26px; }
.fsoc a{ width:42px; height:42px; border-radius:11px; background:rgba(255,255,255,.08); display:grid; place-items:center; }
.fsoc a svg{ width:19px; height:19px; color:#fff; }
.fcopy{ font-size:.8rem; color:#7C95A0; border-top:1px solid rgba(255,255,255,.1); padding-top:22px; }

/* reveal */
[data-rev]{ opacity:0; transform:translateY(24px); transition:opacity .8s var(--ease), transform .8s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.08s } [data-rev][data-d="2"]{ transition-delay:.16s } [data-rev][data-d="3"]{ transition-delay:.24s }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important } [data-rev]{ opacity:1; transform:none } }

/* ====== >= 768px ====== */
@media(min-width:768px){
  .container{ padding-inline:32px; }
  .section{ padding-block:90px; }
  .hero{ padding-top:120px; padding-bottom:80px; }
  .hero-inner{ display:grid; grid-template-columns:1.05fr .95fr; gap:48px; align-items:center; }
  .hero-visual{ margin-top:0; }
  .hero-actions{ flex-direction:row; flex-wrap:wrap; }
  .hero h1{ font-size:clamp(3rem,5vw,4rem); }

  /* ===== interações ===== */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },600); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>30); },{passive:true});

  var drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
  function setMenu(o){ drawer.classList.toggle('open',o); scrim.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  document.getElementById('burger').addEventListener('click',function(){ setMenu(true); });
  document.getElementById('burgerClose').addEventListener('click',function(){ setMenu(false); });
  scrim.addEventListener('click',function(){ setMenu(false); });
  drawer.querySelectorAll('[data-close]').forEach(function(a){ a.addEventListener('click',function(){ setMenu(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.12,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=parseFloat(el.dataset.count)||0,sf=el.dataset.suffix||'',st=performance.now(); (function tk(n){ var p=Math.min((n-st)/1400,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length>1){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au(); } au();
  }

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Tenho interesse em: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:'')+' Gostaria de agendar um horário.';
      msg.style.color=acc; msg.textContent='✓ Abrindo o WhatsApp...';
      window.open(waMsg(t),'_blank'); form.reset();
    });
  }
})();
</script>
