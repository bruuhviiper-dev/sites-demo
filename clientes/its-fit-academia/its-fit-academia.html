<style>
:root{
  --bg:#0B0D0E; --bg2:#101314; --surface:#16191B; --surface2:#1C2023;
  --ink:#F1F4F2; --ink2:#AAB3AE; --muted:#7C857F; --line:#242A2C;

  --display:"Oswald", sans-serif; --sans:"Inter", sans-serif;

*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--bg); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.65; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--display); font-weight:700; line-height:1.02; text-transform:uppercase; letter-spacing:.01em; }
::selection{ background:var(--accent); color:#0B0D0E; }

.sec-title em{ font-style:normal; color:var(--accent); }
.sec-intro{ color:var(--ink2); max-width:560px; margin-top:12px; font-size:1.04rem; }

.btn{ font-family:var(--display); font-weight:600; font-size:.94rem; text-transform:uppercase; letter-spacing:.04em; padding:14px 28px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; gap:9px; border:2px solid transparent; cursor:pointer; transition:all .2s var(--ease); }

.ld span:nth-child(2){ animation-delay:.12s; }

.mod-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:clamp(32px,5vw,52px); }

.plan-selo{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); background:var(--accent); color:#0B0D0E; font-family:var(--display); font-weight:600; font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; padding:5px 16px; border-radius:30px; white-space:nowrap; }

.plan-preco b{ font-weight:700; font-size:3rem; color:var(--ink); }
.plan.hot .plan-preco b{ color:var(--accent); }
.plan-preco span{ font-size:1rem; }
.plan-bens{ display:grid; gap:11px; margin-bottom:26px; }
.plan-bens li{ display:flex; gap:10px; align-items:flex-start; color:var(--ink2); font-size:.94rem; }
.plan-bens svg{ width:18px; height:18px; color:var(--accent); flex-shrink:0; margin-top:2px; }
.plan .btn{ margin-top:auto; width:100%; }

    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    calendar:'<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>',
    pin:'<path d="M12 21s-7-4.5-7-10a7 7 0 1114 0c0 5.5-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/>',
    phone:'<path d="M5 4h3l2 5-2 1a11 11 0 005 5l1-2 5 2v3a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/>',
    star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6-5.3-2.9-5.3 2.9 1.1-6L3.4 9.4l6-.8z"/>'
  };
  function svg(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||ICONS.check)+'</svg>'; }
  var IGS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>';
  var WAS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/></svg>';
  var MS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
  var ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

  var acc = (S.theme && S.theme.accent) || '#C6F24E';
  document.documentElement.style.setProperty('--accent', acc);

  document.getElementById('meta-title').textContent = (S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Academia';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{}, h=S.hero||{}, c=S.contact||{};
  document.querySelector('.ld').innerHTML = ini(b.name).split('').map(function(ch){return '<span>'+esc(ch)+'</span>';}).join('');

  var hasMod = S.services && S.services.items && S.services.items.length;
  var hasPlanos = S.planos && S.planos.items && S.planos.items.length;
  var hasAulas = S.aulas && S.aulas.items && S.aulas.items.length;

  var nav=[{id:'inicio',label:'Início'}];
  if(hasMod) nav.push({id:'modalidades',label:(S.services.navLabel||'Modalidades')});
  if(hasPlanos) nav.push({id:'planos',label:(S.planos.navLabel||'Planos')});
  if(hasAulas) nav.push({id:'aulas',label:(S.aulas.navLabel||'Aulas')});
  nav.push({id:'contato',label:'Contato'});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';
  document.getElementById('header').innerHTML='<div class="container nav">'+brandHtml+
    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right"><a href="#contato" class="btn btn--solid">'+esc((h.ctaAgendar)||'Matricule-se')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):(c.instagramUrl||'#');
  function wa(text){ return (waLink!=='#') ? (waLink+'?text='+encodeURIComponent(text)) : '#contato'; }
  var html='';

  /* HERO */
  var chips = (h.chips&&h.chips.length)?h.chips:(hasMod?S.services.items.slice(0,3).map(function(i){return i.name;}):[]);
  html+='<section class="hero" id="inicio"><div class="container">'+
    '<span class="kicker">'+esc(h.eyebrow||'Academia')+'</span>'+
    '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
    (h.sub?'<p class="hero-lead">'+esc(h.sub)+'</p>':'')+
    '<div class="hero-actions">'+
      '<a href="'+esc((h.ctaPrimary&&h.ctaPrimary.href)||'#planos')+'" class="btn btn--solid">'+esc((h.ctaPrimary&&h.ctaPrimary.label)||'Ver planos')+' '+ARR+'</a>'+
      (h.ctaGhost?'<a href="'+esc(h.ctaGhost.href||'#contato')+'" class="btn btn--ghost">'+esc(h.ctaGhost.label)+'</a>':'')+
    '</div>'+
    (chips.length?'<div class="hero-chips">'+chips.map(function(ch){return '<span>'+svg('bolt')+esc(ch)+'</span>';}).join('')+'</div>':'')+
    '</div></section>';

  /* MODALIDADES */
  if(hasMod){
    var sv=S.services;
    html+='<section class="section" id="modalidades"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(sv.eyebrow||'Modalidades')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(sv.titleHtml||esc(sv.title||'Modalidades'))+'</h2>'+
      (sv.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(sv.intro)+'</p>':'')+'</div>'+
      '<div class="mod-grid">'+
      sv.items.map(function(it,i){return '<article class="mod" data-rev'+(i%4?' data-d="'+Math.min(i%4,3)+'"':'')+'>'+
        '<div class="mod-ic">'+svg(it.icon||'dumbbell')+'</div><h3>'+esc(it.name)+'</h3>'+(it.desc?'<p>'+esc(it.desc)+'</p>':'')+
      '</article>';}).join('')+
      '</div></div></section>';
  }

  /* PLANOS (protagonista) */
  if(hasPlanos){
    var pl=S.planos;
    html+='<section class="section planos" id="planos"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(pl.eyebrow||'Planos')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(pl.titleHtml||esc(pl.title||'Planos'))+'</h2>'+
      (pl.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(pl.intro)+'</p>':'')+'</div>'+
      '<div class="plan-grid">'+
      pl.items.map(function(p){ var hot=!!p.destaque;
        return '<div class="plan'+(hot?' hot':'')+'" data-rev>'+
          (p.selo?'<span class="plan-selo">'+esc(p.selo)+'</span>':'')+
          '<div class="plan-nome">'+esc(p.nome)+'</div>'+
          '<div class="plan-preco">'+esc(p.precoPrefix||'R$ ')+'<b>'+esc(p.preco)+'</b>'+(p.periodo?'<span>'+esc(p.periodo)+'</span>':'')+'</div>'+
          '<ul class="plan-bens">'+(p.beneficios||[]).map(function(bn){return '<li>'+svg('check')+'<span>'+esc(bn)+'</span></li>';}).join('')+'</ul>'+
          '<a class="btn '+(hot?'btn--solid':'btn--ghost')+'" href="'+esc(wa('Olá! Tenho interesse no plano '+p.nome+'.'))+'" target="_blank" rel="noopener">'+esc(pl.ctaLabel||'Quero esse')+'</a>'+
        '</div>';}).join('')+
      '</div></div></section>';
  }

  /* GRADE DE AULAS */
  if(hasAulas){
    var au=S.aulas;
    html+='<section class="section" id="aulas"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(au.eyebrow||'Aulas')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(au.titleHtml||esc(au.title||'Grade de aulas'))+'</h2>'+
      (au.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(au.intro)+'</p>':'')+'</div>'+
      '<div class="aula-grid">'+
      au.items.map(function(it,i){return '<div class="aula" data-rev'+(i%3?' data-d="'+(i%3)+'"':'')+'><h3>'+esc(it.aula)+'</h3>'+
        '<div class="aula-meta">'+(it.horario?'<span>'+svg('clock')+esc(it.horario)+'</span>':'')+(it.dias?'<span>'+svg('calendar')+esc(it.dias)+'</span>':'')+'</div></div>';}).join('')+
      '</div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section quotes" id="depoimentos"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<div class="qmark" data-rev>&ldquo;</div>'+
      '<div class="qtrack" data-rev data-d="1"><div class="qslides" id="qslides">'+
      te.items.map(function(it){return '<div class="qslide"><p class="qquote">'+esc(it.quote||it.text)+'</p><div class="qauthor">'+esc(it.name)+'<span>'+esc(it.meta||'')+'</span></div></div>';}).join('')+
      '</div></div><div class="qdots" id="qdots"></div></div></section>';
  }

  /* CONTATO */
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener">'+WAS+'<div><h4>'+(c.whatsapp?'WhatsApp':'Telefone')+'</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.address) info+='<div class="it">'+svg('pin')+'<div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it">'+svg('clock')+'<div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';
  var map=c.mapsEmbed?'<div class="cmap"><iframe loading="lazy" src="'+esc(c.mapsEmbed)+'"></iframe></div>':'';
  var planOpts=(hasPlanos?S.planos.items.map(function(p){return p.nome;}):[]);
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+
    '<h2 class="sec-title" data-rev data-d="1">'+(c.titleHtml||esc(c.title||'Comece hoje'))+'</h2>'+
    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      (planOpts.length?'<div class="fld"><label>Plano de interesse</label><select name="servico"><option value="">Selecione</option>'+planOpts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select></div>':'<div class="fld"><label>E-mail</label><input type="email" name="email" placeholder="voce@email.com"></div>')+
      '</div>'+
      '<div class="fld"><label>Mensagem</label><textarea name="msg" placeholder="Qual o seu objetivo?"></textarea></div>'+
      '<button type="submit" class="btn btn--solid" id="cbtn" style="justify-self:start">Quero treinar '+ARR+'</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cinfo" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  var foot=S.footer||{};
  var soc='';
  if(S.instagram&&S.instagram.url) soc+='<a href="'+esc(S.instagram.url)+'" target="_blank" rel="noopener" aria-label="Instagram">'+IGS+'</a>';
  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="fmark">'+esc(b.name)+'</div>'+
    (foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    (soc?'<div class="fsoc">'+soc+'</div>':'')+
    '<p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* INTERAÇÕES */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});

  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(x){ x.addEventListener('click',function(){ tm(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length>1){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au2(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au2(); } au2();
  }

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#ff6b6b'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.innerHTML='Quero treinar '+ARR; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Plano: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
</body>
</html>
