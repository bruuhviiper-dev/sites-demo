<style>
:root{
  --bg:#0C1118; --bg2:#111A24; --surface:#16202E; --surface2:#1B2736;
  --ink:#EEF3F8; --ink2:#AEB9C6; --muted:#7D8A99; --line:#23303F;
  --accent:#F2A33C;
  --display:"Poppins", sans-serif; --sans:"Inter", sans-serif;
  --maxw:1180px; --ease:cubic-bezier(.16,.84,.34,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--bg); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.7; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--display); font-weight:700; line-height:1.1; letter-spacing:-.01em; }
::selection{ background:var(--accent); color:#0C1118; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-track{ background:var(--bg2); }
::-webkit-scrollbar-thumb{ background:#2c3a4b; } ::-webkit-scrollbar-thumb:hover{ background:var(--accent); }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:clamp(22px,5vw,56px); }
.section{ padding-block:clamp(64px,9vw,124px); }
.kicker{ font-family:var(--sans); font-weight:600; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:10px; }
.kicker::before{ content:""; width:26px; height:2px; background:var(--accent); display:inline-block; }
.sec-title{ font-size:clamp(2rem,4.6vw,3.3rem); font-weight:700; margin-top:14px; }
.sec-title em{ font-style:normal; color:var(--accent); }
.sec-intro{ color:var(--ink2); max-width:560px; margin-top:14px; font-size:1.04rem; }

.btn{ font-family:var(--display); font-weight:600; font-size:.9rem; padding:14px 26px; border-radius:10px; display:inline-flex; align-items:center; gap:9px; border:1px solid transparent; cursor:pointer; transition:transform .25s var(--ease), background .25s, box-shadow .25s; }
.btn svg{ width:17px; height:17px; }
.btn--solid{ background:var(--accent); color:#0C1118; box-shadow:0 10px 30px -12px var(--accent); }
.btn--solid:hover{ transform:translateY(-2px); }
.btn--ghost{ background:transparent; border-color:var(--line); color:var(--ink); }
.btn--ghost:hover{ border-color:var(--accent); color:var(--accent); }

/* LOADER */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--bg); display:grid; place-items:center; transition:opacity .8s var(--ease), visibility .8s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld{ font-family:var(--display); font-weight:800; font-size:clamp(2.2rem,7vw,3.6rem); color:var(--accent); overflow:hidden; }
.ld span{ display:inline-block; transform:translateY(110%); animation:ldup .9s var(--ease) forwards; }
.ld span:nth-child(2){ animation-delay:.12s; }
@keyframes ldup{ to{ transform:none; } }

/* HEADER */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .4s var(--ease), border-color .4s, padding .4s; border-bottom:1px solid transparent; }
.header.scrolled{ background:rgba(12,17,24,.85); backdrop-filter:blur(14px); border-bottom-color:var(--line); }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:22px; }
.header.scrolled .nav{ padding-block:14px; }
.brand{ font-family:var(--display); font-weight:700; font-size:1.4rem; letter-spacing:-.01em; line-height:1; }
.brand b{ color:var(--accent); }
.brand .tag{ display:block; font-family:var(--sans); font-size:.56rem; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); margin-top:4px; font-weight:500; }
.nav-links{ display:flex; align-items:center; gap:30px; }
.nav-links a{ font-size:.84rem; font-weight:400; color:var(--ink2); position:relative; transition:color .25s; }
.nav-links a:hover{ color:var(--accent); }
.nav-right{ display:flex; align-items:center; gap:18px; }
.burger{ display:none; width:42px; height:42px; border-radius:10px; background:var(--surface); border:1px solid var(--line); position:relative; z-index:1100; cursor:pointer; }
.burger span{ position:absolute; left:11px; width:20px; height:2px; border-radius:2px; background:var(--ink); transition:.35s var(--ease); }
.burger span:nth-child(1){ top:16px; } .burger span:nth-child(2){ top:24px; }
.burger.open span:nth-child(1){ top:20px; transform:rotate(45deg); background:var(--accent); }
.burger.open span:nth-child(2){ top:20px; transform:rotate(-45deg); background:var(--accent); }
@media (max-width:900px){
  .burger{ display:grid; place-items:center; }
  .nav-links{ position:fixed; inset:0; flex-direction:column; justify-content:center; gap:26px; background:var(--bg2); transform:translateX(100%); transition:transform .45s var(--ease); }
  .nav-links.open{ transform:none; }
  .nav-links a{ font-size:1.5rem; font-family:var(--display); font-weight:600; color:var(--ink); }
  .nav-right .btn{ display:none; }
}

/* HERO */
.hero{ padding-top:clamp(118px,15vw,166px); padding-bottom:0; position:relative; background:radial-gradient(55% 60% at 88% 12%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 68%); }
.hero-grid{ display:grid; grid-template-columns:1.15fr .85fr; gap:clamp(34px,5vw,64px); align-items:center; position:relative; }
.hero h1{ font-size:clamp(2.4rem,5.6vw,4.2rem); font-weight:800; line-height:1.05; margin:18px 0 22px; }
.hero h1 em{ font-style:normal; color:var(--accent); }
.hero-lead{ color:var(--ink2); font-size:1.12rem; max-width:480px; margin-bottom:30px; }
.hero-actions{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
/* card de economia */
.eco{ background:linear-gradient(160deg,var(--surface),var(--surface2)); border:1px solid var(--line); border-radius:18px; padding:clamp(24px,3vw,32px); box-shadow:0 50px 90px -50px #000; }
.eco-hd{ font-family:var(--display); font-weight:600; font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
.eco-row{ display:flex; gap:13px; align-items:flex-start; padding:13px 0; border-top:1px solid var(--line); }
.eco-row:first-of-type{ border-top:none; }
.eco-ic{ width:38px; height:38px; flex-shrink:0; border-radius:10px; background:color-mix(in srgb, var(--accent) 16%, transparent); display:grid; place-items:center; color:var(--accent); }
.eco-ic svg{ width:19px; height:19px; }
.eco-lb{ font-family:var(--display); font-weight:600; color:var(--ink); font-size:.96rem; }
.eco-vl{ font-size:.84rem; color:var(--ink2); }
.eco-badge{ margin-top:16px; background:var(--accent); color:#0C1118; border-radius:10px; padding:12px; text-align:center; font-family:var(--display); font-weight:700; font-size:.92rem; }
@media (max-width:900px){ .hero-grid{ grid-template-columns:1fr; gap:32px; } }

/* FAIXA DE BENEFÍCIOS (marquee) */
.bene{ margin-top:clamp(40px,5vw,64px); background:var(--accent); color:#0C1118; overflow:hidden; padding-block:13px; white-space:nowrap; }
.bene-track{ display:inline-flex; gap:42px; animation:scroll 24s linear infinite; will-change:transform; }
.bene-track span{ font-family:var(--display); font-weight:600; font-size:1rem; display:inline-flex; align-items:center; gap:42px; }
.bene-track span::after{ content:"☀"; font-weight:400; }
@keyframes scroll{ to{ transform:translateX(-50%); } }

/* STATS */
.sb{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
.sb-row{ display:flex; flex-wrap:wrap; }
.sb-it{ flex:1; min-width:150px; padding:30px clamp(14px,3vw,30px); border-right:1px solid var(--line); }
.sb-it:last-child{ border-right:none; }
.sb-n{ font-family:var(--display); font-weight:800; font-size:clamp(2.1rem,4vw,3rem); color:var(--accent); line-height:1; }
.sb-l{ font-size:.78rem; letter-spacing:.04em; color:var(--muted); margin-top:8px; }

/* SOBRE */
.about-grid{ display:grid; grid-template-columns:1fr 1fr; gap:clamp(36px,6vw,80px); align-items:center; }
.about-media{ position:relative; aspect-ratio:4/3; background:linear-gradient(135deg,var(--surface),var(--surface2)); border:1px solid var(--line); border-radius:18px; overflow:hidden; }
.about-media img{ width:100%; height:100%; object-fit:cover; }
.about-media .ml{ position:absolute; inset:0; display:flex; flex-direction:column; gap:10px; align-items:center; justify-content:center; color:var(--accent); }
.about-media .ml svg{ width:64px; height:64px; opacity:.6; }
.about-media .ml b{ font-family:var(--display); font-weight:700; font-size:1.6rem; color:var(--ink2); }
.about-text h2{ font-size:clamp(1.9rem,4.2vw,3.1rem); margin:14px 0 20px; }
.about-text p{ color:var(--ink2); margin-bottom:15px; max-width:540px; }
.about-tags{ display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
.about-tags span{ font-size:.8rem; font-weight:500; padding:9px 15px; border:1px solid var(--line); border-radius:8px; color:var(--ink2); background:var(--surface); display:inline-flex; align-items:center; gap:8px; }
.about-tags span svg{ width:15px; height:15px; color:var(--accent); }
@media (max-width:900px){ .about-grid{ grid-template-columns:1fr; gap:34px; } .about-media{ max-width:460px; } }

/* SOLUÇÕES (cards) */
.sol-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:clamp(34px,5vw,54px); }
.sol{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:28px; transition:transform .3s var(--ease), border-color .3s; }
.sol:hover{ transform:translateY(-5px); border-color:var(--accent); }
.sol-ic{ width:52px; height:52px; border-radius:13px; background:color-mix(in srgb, var(--accent) 14%, transparent); display:grid; place-items:center; color:var(--accent); margin-bottom:18px; }
.sol-ic svg{ width:26px; height:26px; }
.sol h3{ font-size:1.22rem; font-weight:600; margin-bottom:8px; }
.sol p{ color:var(--ink2); font-size:.94rem; }
.sol .sol-price{ display:inline-block; margin-top:14px; font-family:var(--display); font-weight:600; font-size:.84rem; color:var(--accent); }
@media (max-width:880px){ .sol-grid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:560px){ .sol-grid{ grid-template-columns:1fr; } }

/* COMO FUNCIONA (4 etapas) */
.proc{ background:var(--bg2); }
.proc-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:clamp(18px,3vw,34px); margin-top:clamp(34px,5vw,54px); }
.proc-step{ position:relative; padding-top:24px; border-top:2px solid var(--line); }
.proc-step .pn{ font-family:var(--display); font-weight:800; font-size:2rem; color:var(--accent); }
.proc-step h3{ font-size:1.18rem; font-weight:600; margin:6px 0 8px; }
.proc-step p{ color:var(--ink2); font-size:.92rem; }
@media (max-width:760px){ .proc-grid{ grid-template-columns:1fr 1fr; gap:24px; } }
@media (max-width:460px){ .proc-grid{ grid-template-columns:1fr; } }

/* DEPOIMENTOS */
.quotes{ text-align:center; }
.qmark{ font-family:var(--display); font-weight:800; font-size:4rem; line-height:.6; color:var(--accent); }
.qtrack{ max-width:800px; margin:0 auto; overflow:hidden; }
.qslides{ display:flex; transition:transform .7s var(--ease); }
.qslide{ min-width:100%; }
.qquote{ font-family:var(--display); font-weight:500; font-size:clamp(1.35rem,3vw,2.05rem); line-height:1.45; color:var(--ink); }
.qauthor{ margin-top:24px; font-size:.82rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); font-weight:600; }
.qauthor span{ display:block; color:var(--muted); margin-top:5px; letter-spacing:.04em; font-weight:400; text-transform:none; }
.qdots{ display:flex; gap:10px; justify-content:center; margin-top:34px; }
.qdots button{ width:8px; height:8px; border-radius:50%; border:none; background:#33445a; cursor:pointer; transition:.3s; }
.qdots button.active{ background:var(--accent); width:26px; border-radius:8px; }

/* CONTATO */
.contact-grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(36px,6vw,72px); margin-top:48px; }
.cform{ display:grid; gap:20px; }
.fld label{ display:block; font-size:.74rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.fld input,.fld select,.fld textarea{ width:100%; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:13px 14px; font-family:var(--sans); font-size:1rem; font-weight:300; color:var(--ink); transition:border-color .3s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); }
.fld textarea{ resize:vertical; min-height:96px; }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.cmsg{ font-size:.86rem; color:var(--accent); min-height:18px; }
.cinfo{ display:grid; gap:4px; align-content:start; }
.cinfo .it{ padding:18px 0; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:flex-start; }
.cinfo .it h4{ font-family:var(--display); font-weight:600; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.cinfo .it p{ font-size:1rem; color:var(--ink); }
.cinfo .it svg{ width:20px; height:20px; color:var(--accent); flex-shrink:0; margin-top:3px; }
.cmap{ margin-top:8px; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.cmap iframe{ width:100%; height:200px; border:0; display:block; filter:grayscale(.3) invert(.92) hue-rotate(180deg); }
@media (max-width:900px){ .contact-grid{ grid-template-columns:1fr; } .frow{ grid-template-columns:1fr; } }

.wa{ position:fixed; right:22px; bottom:22px; z-index:800; width:56px; height:56px; border-radius:50%; background:#25D366; display:grid; place-items:center; box-shadow:0 10px 26px -8px rgba(37,211,102,.55); transition:transform .3s; }
.wa:hover{ transform:scale(1.08); } .wa svg{ width:28px; height:28px; fill:#fff; }

/* FOOTER */
.footer{ background:var(--bg2); border-top:1px solid var(--line); padding-block:60px 28px; text-align:center; }
.footer .fmark{ font-family:var(--display); font-weight:700; font-size:clamp(2rem,5vw,3.2rem); color:var(--ink); }
.footer .ftag{ color:var(--ink2); max-width:440px; margin:12px auto 26px; font-size:1.05rem; }
.fnav{ display:flex; gap:24px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
.fnav a{ font-size:.8rem; color:var(--ink2); }
.fnav a:hover{ color:var(--accent); }
.fsoc{ display:flex; gap:12px; justify-content:center; margin-bottom:26px; }
.fsoc a{ width:40px; height:40px; border:1px solid var(--line); border-radius:10px; display:grid; place-items:center; transition:.3s; }
.fsoc a svg{ width:17px; height:17px; color:var(--ink2); }
.fsoc a:hover{ border-color:var(--accent); } .fsoc a:hover svg{ color:var(--accent); }
.fcopy{ font-size:.76rem; color:var(--muted); border-top:1px solid var(--line); padding-top:22px; }

[data-rev]{ opacity:0; transform:translateY(28px); transition:opacity .9s var(--ease), transform .9s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.08s; } [data-rev][data-d="2"]{ transition-delay:.16s; } [data-rev][data-d="3"]{ transition-delay:.24s; }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } [data-rev]{ opacity:1; transform:none; } .bene-track{ animation:none!important; } }
</style>
</head>

<script>

  document.getElementById('meta-title').textContent = (S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Energia Solar';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{}, h=S.hero||{}, a=S.about||{}, c=S.contact||{};
  document.querySelector('.ld').innerHTML = ini(b.name).split('').map(function(ch){return '<span>'+esc(ch)+'</span>';}).join('');

  if(S.process&&S.process.steps&&S.process.steps.length) nav.push({id:'processo',label:(S.process.navLabel||'Como funciona')});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';

    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right"><a href="#contato" class="btn btn--solid">'+esc((h.ctaAgendar)||'Simular economia')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):(c.instagramUrl||'#');
  var html='';

  /* HERO + card de economia */
  var ecoRows='';
  if(c.phoneDisplay||c.whatsapp) ecoRows+='<div class="eco-row"><span class="eco-ic">'+svg('phone')+'</span><div><div class="eco-lb">'+(c.whatsapp?'WhatsApp':'Telefone')+'</div><div class="eco-vl">'+esc(c.phoneDisplay||c.whatsapp)+'</div></div></div>';
  (a.certs||[]).slice(0,3).forEach(function(ct){
    ecoRows+='<div class="eco-row"><span class="eco-ic">'+svg(ct.icon||'check')+'</span><div><div class="eco-lb">'+esc(ct.label||ct)+'</div>'+(ct.desc?'<div class="eco-vl">'+esc(ct.desc)+'</div>':'')+'</div></div>';
  });
  var ecoBadge=h.badge?'<div class="eco-badge">'+esc(String(h.badge).replace(/^★\s*/,''))+'</div>':'';
  html+='<section class="hero" id="inicio"><div class="container">'+
    '<div class="hero-grid">'+
      '<div><span class="kicker">'+esc(h.eyebrow||'Energia Solar')+'</span>'+
        '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
        (h.sub?'<p class="hero-lead">'+esc(h.sub)+'</p>':'')+
        '<div class="hero-actions">'+
          '<a href="'+esc((h.ctaPrimary&&h.ctaPrimary.href)||'#contato')+'" class="btn btn--solid">'+esc((h.ctaPrimary&&h.ctaPrimary.label)||'Fazer simulação')+' '+ARR+'</a>'+
          (h.ctaGhost?'<a href="'+esc(h.ctaGhost.href||'#solucoes')+'" class="btn btn--ghost">'+esc(h.ctaGhost.label)+'</a>':'')+
        '</div></div>'+
      '<div class="eco"><div class="eco-hd">'+esc(h.cardTitle||'Por que energia solar')+'</div>'+ecoRows+ecoBadge+'</div>'+
    '</div></div></section>';

  /* FAIXA DE BENEFÍCIOS */
  var bene = (h.beneficios&&h.beneficios.length)?h.beneficios:['Economia na conta de luz','Valoriza o seu imóvel','Energia limpa e renovável','Projeto e instalação completos'];
  var one='<span>'+bene.map(esc).join('</span><span>')+'</span>';
  html+='<div class="bene" aria-hidden="true"><div class="bene-track">'+one+one+'</div></div>';

  /* STATS */
  if(a.stats&&a.stats.length){
    html+='<div class="container"><div class="sb"><div class="sb-row">'+
      a.stats.map(function(s){var nn=String(s.num),num=/^\d+$/.test(nn);return '<div class="sb-it"><div class="sb-n"'+(num?' data-count="'+esc(nn)+'"':'')+(s.suffix?' data-suffix="'+esc(s.suffix)+'"':'')+'>'+(num?'0':esc(nn)+(s.suffix?esc(s.suffix):''))+'</div><div class="sb-l">'+esc(s.label)+'</div></div>';}).join('')+
      '</div></div></div>';
  }

  /* SOBRE */
  if(S.about){
    var media = a.image ? '<img loading="lazy" src="'+esc(a.image)+'" alt="'+esc(b.name)+'">' : '<span class="ml">'+svg('sun')+'<b>'+esc(ini(b.name))+'</b></span>';
    html+='<section class="section" id="sobre"><div class="container about-grid">'+
      '<div class="about-media" data-rev>'+media+'</div>'+
      '<div class="about-text"><span class="kicker" data-rev>'+esc(a.eyebrow||'Sobre')+'</span>'+
      '<h2 data-rev data-d="1">'+(a.titleHtml||esc(a.title))+'</h2>'+
      (a.paragraphs||[]).map(function(p){return '<p data-rev data-d="1">'+esc(p)+'</p>';}).join('')+
      (a.certs&&a.certs.length?'<div class="about-tags" data-rev data-d="2">'+a.certs.map(function(ct){return '<span>'+svg(ct.icon||'check')+esc(ct.label||ct)+'</span>';}).join('')+'</div>':'')+
      '</div></div></section>';
  }

  /* SOLUÇÕES (cards) */
  if(S.services){
    var sv=S.services;
    html+='<section class="section" id="solucoes"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(sv.eyebrow||'Soluções')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(sv.titleHtml||esc(sv.title||'Soluções'))+'</h2>'+
      (sv.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(sv.intro)+'</p>':'')+'</div>'+
      '<div class="sol-grid">'+
      (sv.items||[]).map(function(it,i){return '<article class="sol" data-rev'+(i%3?' data-d="'+(i%3)+'"':'')+'>'+
        '<div class="sol-ic">'+svg(it.icon||'bolt')+'</div>'+
        '<h3>'+esc(it.name)+'</h3>'+(it.desc?'<p>'+esc(it.desc)+'</p>':'')+
        (it.price?'<span class="sol-price">'+esc(it.price)+'</span>':'')+
      '</article>';}).join('')+
      '</div></div></section>';
  }

  /* COMO FUNCIONA */
  if(S.process&&S.process.steps&&S.process.steps.length){
    var pc=S.process;
    html+='<section class="section proc" id="processo"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(pc.eyebrow||'Como funciona')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(pc.titleHtml||esc(pc.title||'Como funciona'))+'</h2>'+
      (pc.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(pc.intro)+'</p>':'')+'</div>'+
      '<div class="proc-grid">'+
      pc.steps.map(function(s,i){return '<div class="proc-step" data-rev'+(i?' data-d="'+Math.min(i,3)+'"':'')+'><div class="pn">'+esc(s.n||('0'+(i+1)).slice(-2))+'</div><h3>'+esc(s.name)+'</h3><p>'+esc(s.desc)+'</p></div>';}).join('')+
      '</div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section quotes" id="depoimentos"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<div class="qmark" data-rev>&ldquo;</div>'+
      '<div class="qtrack" data-rev data-d="1"><div class="qslides" id="qslides">'+
      te.items.map(function(it){return '<div class="qslide"><p class="qquote">'+esc(it.quote||it.text)+'</p><div class="qauthor">'+esc(it.name)+'<span>'+esc(it.meta||'')+'</span></div></div>';}).join('')+
      '</div></div><div class="qdots" id="qdots"></div></div></section>';
  }

  /* CONTATO */
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener">'+WAS+'<div><h4>'+(c.whatsapp?'WhatsApp':'Telefone')+'</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.address) info+='<div class="it">'+svg('pin')+'<div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it">'+svg('clock')+'<div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';

  var svcOpts=(S.services&&S.services.items?S.services.items.map(function(i){return i.name;}):[]);
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+

    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      '<div class="fld"><label>Valor médio da conta</label><input type="text" name="conta" placeholder="Ex.: R$ 500/mês"></div></div>'+
      (svcOpts.length?'<div class="fld"><label>Tipo de imóvel</label><select name="servico"><option value="">Selecione</option>'+svcOpts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select></div>':'')+
      '<div class="fld"><label>Mensagem</label><textarea name="msg" placeholder="Conte um pouco sobre o seu consumo"></textarea></div>'+
      '<button type="submit" class="btn btn--solid" id="cbtn" style="justify-self:start">Quero simular '+ARR+'</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cinfo" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  var foot=S.footer||{};
  var soc='';

  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="fmark">'+esc(b.name)+'</div>'+
    (foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    (soc?'<div class="fsoc">'+soc+'</div>':'')+
    '<p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* INTERAÇÕES */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});

  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(x){ x.addEventListener('click',function(){ tm(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=+el.dataset.count,sf=el.dataset.suffix||'',st=performance.now(); if(isNaN(t)){ el.textContent=el.dataset.count+sf; cio.unobserve(el); return; } (function tk(n){ var p=Math.min((n-st)/1500,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length>1){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au(); } au();
  }

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#ff6b6b'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.innerHTML='Quero simular '+ARR; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.conta&&form.conta.value?' Conta média: '+form.conta.value+'.':'')+(form.servico&&form.servico.value?' Imóvel: '+form.servico.value+'.':'')+' Quero uma simulação de energia solar.'+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
