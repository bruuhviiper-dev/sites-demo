<style>
:root{
  --paper:#F5F1EA; --paper2:#ECE6DB; --white:#FFFFFF;
  --ink:#1A1815; --ink2:#4B463E; --muted:#8C8475; --line:#DCD4C6;
  --accent:#B08D57;
  --serif:"Fraunces", serif; --sans:"Jost", sans-serif;
  --maxw:1200px; --ease:cubic-bezier(.16,.84,.34,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--paper); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.7; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--serif); font-weight:400; line-height:1.05; letter-spacing:-.01em; }
::selection{ background:var(--accent); color:var(--white); }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-track{ background:var(--paper); }
::-webkit-scrollbar-thumb{ background:#ccc2b0; } ::-webkit-scrollbar-thumb:hover{ background:var(--accent); }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:clamp(22px,5vw,56px); }
.section{ padding-block:clamp(72px,11vw,150px); }
.kicker{ font-family:var(--sans); font-weight:500; font-size:.72rem; letter-spacing:.32em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:12px; }
.kicker::before{ content:""; width:34px; height:1px; background:var(--accent); display:inline-block; }
.sec-title{ font-size:clamp(2.4rem,6vw,4.6rem); font-weight:400; margin-top:22px; }
.sec-title em{ font-style:italic; color:var(--accent); }
.sec-intro{ color:var(--ink2); max-width:540px; margin-top:20px; font-size:1.05rem; }

/* link editorial sublinhado com seta */
.tlink{ font-family:var(--sans); font-size:.82rem; letter-spacing:.14em; text-transform:uppercase; font-weight:500; display:inline-flex; align-items:center; gap:10px; padding-bottom:6px; border-bottom:1px solid var(--ink); transition:gap .3s var(--ease), color .3s, border-color .3s; }
.tlink:hover{ gap:18px; color:var(--accent); border-color:var(--accent); }
.tlink--accent{ color:var(--accent); border-color:var(--accent); }
.tlink svg{ width:15px; height:15px; }

/* botão minimal (só onde precisa de bloco) */
.pill{ font-family:var(--sans); font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; font-weight:500; padding:15px 30px; border:1px solid var(--ink); border-radius:40px; display:inline-flex; align-items:center; gap:10px; transition:all .35s var(--ease); }
.pill:hover{ background:var(--ink); color:var(--paper); }
.pill--solid{ background:var(--accent); border-color:var(--accent); color:var(--white); }
.pill--solid:hover{ background:var(--ink); border-color:var(--ink); }

/* ---------- LOADER ---------- */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--paper); display:grid; place-items:center; transition:opacity .8s var(--ease), visibility .8s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld{ font-family:var(--serif); font-size:clamp(2.4rem,7vw,4rem); font-style:italic; color:var(--ink); overflow:hidden; }
.ld span{ display:inline-block; transform:translateY(110%); animation:ldup .9s var(--ease) forwards; }
.ld span:nth-child(2){ animation-delay:.12s; }
@keyframes ldup{ to{ transform:none; } }

/* ---------- HEADER ---------- */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .4s var(--ease), border-color .4s, padding .4s; border-bottom:1px solid transparent; }
.header.scrolled{ background:rgba(245,241,234,.85); backdrop-filter:blur(14px); border-bottom-color:var(--line); }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:26px; }
.header.scrolled .nav{ padding-block:16px; }
.brand{ font-family:var(--serif); font-size:1.5rem; letter-spacing:.01em; }
.brand b{ font-weight:500; font-style:italic; }
.brand .tag{ display:block; font-family:var(--sans); font-size:.56rem; letter-spacing:.36em; text-transform:uppercase; color:var(--muted); margin-top:3px; font-weight:400; }
.nav-links{ display:flex; align-items:center; gap:40px; }
.nav-links a{ font-size:.78rem; letter-spacing:.16em; text-transform:uppercase; font-weight:400; position:relative; }
.nav-links a::after{ content:""; position:absolute; left:0; bottom:-5px; width:0; height:1px; background:var(--accent); transition:width .35s var(--ease); }
.nav-links a:hover{ color:var(--accent); } .nav-links a:hover::after{ width:100%; }
.nav-right{ display:flex; align-items:center; gap:24px; }
.burger{ display:none; width:40px; height:40px; background:none; border:none; position:relative; z-index:1100; cursor:pointer; }
.burger span{ position:absolute; left:8px; width:24px; height:1.5px; background:var(--ink); transition:.35s var(--ease); }
.burger span:nth-child(1){ top:15px; } .burger span:nth-child(2){ top:22px; }
.burger.open span:nth-child(1){ top:18px; transform:rotate(45deg); }
.burger.open span:nth-child(2){ top:18px; transform:rotate(-45deg); }
@media (max-width:900px){
  .burger{ display:block; }
  .nav-links{ position:fixed; inset:0; flex-direction:column; justify-content:center; gap:30px; background:var(--paper); transform:translateY(-100%); transition:transform .5s var(--ease); }
  .nav-links.open{ transform:none; }
  .nav-links a{ font-size:1.6rem; font-family:var(--serif); text-transform:none; letter-spacing:0; }
  .nav-right .pill{ display:none; }
}

/* ---------- HERO (editorial assimétrico) ---------- */
.hero{ padding-top:140px; padding-bottom:clamp(40px,7vw,90px); }
.hero-top{ display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid var(--line); padding-bottom:26px; }
.hero-meta{ font-size:.74rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); text-align:right; }
.hero h1{ font-size:clamp(3rem,11vw,9rem); font-weight:300; line-height:.95; margin:clamp(26px,5vw,54px) 0; }
.hero h1 em{ font-style:italic; }
.hero h1 .accent{ color:var(--accent); font-style:italic; }
.hero-bottom{ display:grid; grid-template-columns:1fr 1fr; gap:50px; align-items:end; }
.hero-lead{ max-width:430px; }
.hero-lead p{ color:var(--ink2); font-size:1.12rem; margin-bottom:30px; }
.hero-actions{ display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
.hero-visual{ position:relative; aspect-ratio:5/4; background:linear-gradient(135deg,var(--paper2),#e2d9c9); overflow:hidden; }
.hero-visual img{ width:100%; height:100%; object-fit:cover; }
.hero-visual .vlabel{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--serif); font-style:italic; color:var(--muted); font-size:1.1rem; }
.hero-visual .vtag{ position:absolute; left:0; bottom:0; background:var(--accent); color:var(--white); font-family:var(--sans); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; padding:10px 18px; }
@media (max-width:900px){
  .hero-bottom{ grid-template-columns:1fr; gap:36px; }
  .hero-visual{ order:-1; aspect-ratio:4/3; }
  .hero-meta{ display:none; }
}

/* ---------- SOBRE (editorial split) ---------- */
.about{ background:var(--paper2); }
.about-grid{ display:grid; grid-template-columns:.9fr 1.1fr; gap:clamp(40px,6vw,90px); align-items:center; }
.about-media{ position:relative; aspect-ratio:4/5; background:linear-gradient(135deg,#e6ddcd,#d8cdb9); overflow:hidden; }
.about-media img{ width:100%; height:100%; object-fit:cover; }
.about-media .ml{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--serif); font-style:italic; font-size:3rem; color:var(--muted); }
.about-text h2{ font-size:clamp(2rem,4.5vw,3.4rem); margin:18px 0 24px; }
.about-text p{ color:var(--ink2); margin-bottom:18px; max-width:520px; }
.about-stats{ display:flex; flex-wrap:wrap; gap:clamp(28px,5vw,56px); margin:38px 0; }
.about-stats .st .n{ font-family:var(--serif); font-size:clamp(2.4rem,5vw,3.4rem); color:var(--accent); line-height:1; }
.about-stats .st .l{ font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:8px; }
.about-certs{ display:flex; flex-wrap:wrap; gap:10px; }
.about-certs span{ font-size:.8rem; letter-spacing:.04em; padding:9px 16px; border:1px solid var(--line); border-radius:30px; color:var(--ink2); background:var(--white); }
@media (max-width:900px){ .about-grid{ grid-template-columns:1fr; gap:40px; } .about-media{ max-width:440px; } }

/* ---------- SERVIÇOS (lista-revista numerada) ---------- */
.sec-head{ max-width:760px; margin-bottom:clamp(40px,6vw,70px); }
.svc-list{ border-top:1px solid var(--line); }
.svc-row{ display:grid; grid-template-columns:auto 1fr auto auto; gap:clamp(18px,4vw,48px); align-items:center; padding:clamp(24px,3vw,38px) 8px; border-bottom:1px solid var(--line); position:relative; transition:padding-left .4s var(--ease), background .4s; cursor:default; }
.svc-row::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:0; background:var(--accent); transition:width .4s var(--ease); }
.svc-row:hover{ background:var(--white); padding-left:26px; }
.svc-row:hover::before{ width:3px; }
.svc-idx{ font-family:var(--serif); font-style:italic; font-size:1.2rem; color:var(--accent); width:48px; }
.svc-main h3{ font-size:clamp(1.5rem,3vw,2.3rem); font-weight:400; }
.svc-main p{ color:var(--ink2); font-size:.95rem; margin-top:6px; max-width:520px; }
.svc-price{ font-family:var(--serif); font-size:1.3rem; color:var(--ink); white-space:nowrap; }
.svc-price small{ display:block; font-family:var(--sans); font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.svc-arrow{ width:42px; height:42px; border:1px solid var(--line); border-radius:50%; display:grid; place-items:center; transition:all .35s var(--ease); }
.svc-row:hover .svc-arrow{ background:var(--accent); border-color:var(--accent); color:var(--white); transform:rotate(45deg); }
.svc-arrow svg{ width:16px; height:16px; }
@media (max-width:760px){
  .svc-row{ grid-template-columns:auto 1fr; gap:14px 18px; }
  .svc-idx{ width:auto; }
  .svc-price{ grid-column:2; font-size:1.1rem; }
  .svc-arrow{ display:none; }
}

/* ---------- PRODUTOS ---------- */
.prod-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:24px; margin-top:54px; }
.prod{ background:var(--white); border:1px solid var(--line); }
.prod-thumb{ aspect-ratio:1; background:linear-gradient(135deg,var(--paper2),#e0d6c5); display:grid; place-items:center; position:relative; overflow:hidden; }
.prod-thumb img{ width:100%; height:100%; object-fit:cover; }
.prod-thumb .g{ font-family:var(--serif); font-style:italic; font-size:2.4rem; color:var(--muted); }
.prod-thumb .cat{ position:absolute; top:12px; left:12px; font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; background:var(--white); padding:5px 11px; color:var(--ink2); }
.prod-b{ padding:20px; }
.prod-b h4{ font-size:1.25rem; font-weight:500; }
.prod-b p{ color:var(--ink2); font-size:.84rem; margin:6px 0 14px; min-height:36px; }
.prod-foot{ display:flex; align-items:center; justify-content:space-between; }
.prod-foot .pp{ font-family:var(--serif); font-size:1.2rem; color:var(--accent); }
.prod-foot button{ background:none; border:none; font-family:var(--sans); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink); border-bottom:1px solid var(--accent); padding-bottom:3px; cursor:pointer; transition:color .3s; }
.prod-foot button:hover{ color:var(--accent); }
.prod-filters{ display:flex; flex-wrap:wrap; gap:10px; margin-top:30px; }
.prod-filters button{ background:none; border:1px solid var(--line); border-radius:30px; padding:8px 20px; font-family:var(--sans); font-size:.76rem; letter-spacing:.08em; text-transform:uppercase; color:var(--ink2); cursor:pointer; transition:all .3s; }
.prod-filters button.active,.prod-filters button:hover{ background:var(--accent); border-color:var(--accent); color:var(--white); }
@media (max-width:1024px){ .prod-grid{ grid-template-columns:repeat(3,1fr); } }
@media (max-width:760px){ .prod-grid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:460px){ .prod-grid{ grid-template-columns:1fr; } }

/* ---------- DEPOIMENTOS ---------- */
.quotes{ background:var(--ink); color:var(--paper); text-align:center; }
.quotes .kicker{ color:var(--accent); }
.quotes .kicker::before{ background:var(--accent); }
.qmark{ font-family:var(--serif); font-size:6rem; line-height:.6; color:var(--accent); font-style:italic; }
.qtrack{ max-width:820px; margin:0 auto; overflow:hidden; }
.qslides{ display:flex; transition:transform .7s var(--ease); }
.qslide{ min-width:100%; }
.qquote{ font-family:var(--serif); font-weight:300; font-size:clamp(1.5rem,3.4vw,2.4rem); line-height:1.4; font-style:italic; }
.qauthor{ margin-top:30px; font-family:var(--sans); font-size:.8rem; letter-spacing:.18em; text-transform:uppercase; color:var(--paper); }
.qauthor span{ display:block; color:var(--muted); margin-top:5px; letter-spacing:.1em; }
.qdots{ display:flex; gap:10px; justify-content:center; margin-top:42px; }
.qdots button{ width:8px; height:8px; border-radius:50%; border:none; background:#5a5347; cursor:pointer; transition:.3s; }
.qdots button.active{ background:var(--accent); width:26px; border-radius:8px; }

/* ---------- GALERIA / INSTAGRAM ---------- */
.gal-grid{ display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:200px; gap:14px; margin-top:54px; }
.gal-item{ background:linear-gradient(135deg,var(--paper2),#ddd2bf); overflow:hidden; position:relative; }
.gal-item:nth-child(1){ grid-column:span 2; grid-row:span 2; }
.gal-item:nth-child(6){ grid-column:span 2; }
.gal-item .g{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--serif); font-style:italic; color:var(--muted); }
.gal-item .ov{ position:absolute; inset:0; background:rgba(26,24,21,.35); opacity:0; display:grid; place-items:center; transition:opacity .4s; }
.gal-item:hover .ov{ opacity:1; } .gal-item .ov svg{ width:26px; height:26px; stroke:var(--white); fill:none; }
@media (max-width:760px){ .gal-grid{ grid-template-columns:repeat(2,1fr); grid-auto-rows:150px; } .gal-item:nth-child(1){ grid-column:span 2; } .gal-item:nth-child(6){ grid-column:span 1; } }

/* ---------- CONTATO ---------- */
.contact-grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(40px,6vw,80px); margin-top:54px; }
.cform{ display:grid; gap:26px; }
.fld label{ display:block; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.fld input,.fld select,.fld textarea{ width:100%; background:none; border:none; border-bottom:1px solid var(--line); padding:8px 2px; font-family:var(--sans); font-size:1rem; font-weight:300; color:var(--ink); transition:border-color .3s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); }
.fld textarea{ resize:vertical; min-height:90px; }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:26px; }
.cmsg{ font-size:.86rem; color:var(--accent); min-height:18px; }
.cinfo{ display:grid; gap:4px; align-content:start; }
.cinfo .it{ padding:22px 0; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:flex-start; }
.cinfo .it h4{ font-family:var(--sans); font-weight:500; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.cinfo .it p{ font-size:1rem; color:var(--ink); }
.cinfo .it svg{ width:20px; height:20px; stroke:var(--accent); fill:none; flex-shrink:0; margin-top:3px; }
.cmap{ margin-top:8px; border:1px solid var(--line); }
.cmap iframe{ width:100%; height:200px; border:0; display:block; filter:grayscale(.4); }
@media (max-width:900px){ .contact-grid{ grid-template-columns:1fr; } .frow{ grid-template-columns:1fr; } }

/* WhatsApp flutuante */
.wa{ position:fixed; right:22px; bottom:22px; z-index:800; width:56px; height:56px; border-radius:50%; background:#25D366; display:grid; place-items:center; box-shadow:0 10px 26px -8px rgba(37,211,102,.55); transition:transform .3s; }
.wa:hover{ transform:scale(1.08); } .wa svg{ width:28px; height:28px; fill:#fff; }

/* ---------- FOOTER ---------- */
.footer{ background:var(--paper2); border-top:1px solid var(--line); padding-block:70px 30px; text-align:center; }
.footer .fmark{ font-family:var(--serif); font-size:clamp(2.4rem,6vw,4rem); font-style:italic; }
.footer .ftag{ color:var(--ink2); max-width:440px; margin:14px auto 30px; font-family:var(--serif); font-size:1.2rem; font-style:italic; }
.fnav{ display:flex; gap:28px; justify-content:center; flex-wrap:wrap; margin-bottom:26px; }
.fnav a{ font-size:.76rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2); }
.fnav a:hover{ color:var(--accent); }
.fsoc{ display:flex; gap:14px; justify-content:center; margin-bottom:30px; }
.fsoc a{ width:40px; height:40px; border:1px solid var(--line); border-radius:50%; display:grid; place-items:center; transition:.3s; }
.fsoc a svg{ width:17px; height:17px; stroke:var(--ink2); fill:none; }
.fsoc a:hover{ border-color:var(--accent); } .fsoc a:hover svg{ stroke:var(--accent); }
.fcopy{ font-size:.76rem; color:var(--muted); border-top:1px solid var(--line); padding-top:24px; }

[data-rev]{ opacity:0; transform:translateY(30px); transition:opacity 1s var(--ease), transform 1s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.1s; } [data-rev][data-d="2"]{ transition-delay:.2s; } [data-rev][data-d="3"]{ transition-delay:.3s; }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } [data-rev]{ opacity:1; transform:none; } }
</style>

<body>
  <div id="loader"><div class="ld"></div></div>
  <header class="header" id="header"></header>
  <main id="app"></main>
  <footer class="footer" id="footer"></footer>
  <a class="wa" id="wa" target="_blank" rel="noopener" aria-label="WhatsApp" style="display:none"><svg viewBox="0 0 32 32"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.7 1.9 6.7L3 29l7-1.8c1.9 1 4 1.6 6 1.6 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-4.1 1.1 1.1-4-.3-.4a10 10 0 01-1.6-5.4C5.6 9.8 10.2 5.3 16 5.3s10.4 4.5 10.4 10.2S21.8 25.7 16 25.7zm5.7-7.6c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-.9 1.2-.3.2-.6.1a8.3 8.3 0 01-2.4-1.5 9 9 0 01-1.7-2.1c-.2-.3 0-.5.1-.6l.5-.5.3-.5a.5.5 0 000-.5l-1-2.3c-.3-.6-.5-.5-.7-.5h-.6a1.1 1.1 0 00-.8.4 3.3 3.3 0 00-1 2.5c0 1.5 1.1 2.9 1.2 3.1s2.1 3.3 5.2 4.6c.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4s.3-1.3.2-1.4-.3-.2-.5-.4z"/></svg></a>

<script>
(function(){
  "use strict";
  var S = window.SITE;
  if(!S){ document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Erro: SITE não injetado.</p>'; return; }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function ini(n){ return (n||'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'•'; }

  /* segurança: se algum 'title' vier com HTML, trata como titleHtml (evita tags na tela) */
  ['hero','about','services','products','testimonials','instagram','contact','footer'].forEach(function(k){
    var o=S[k]; if(o && o.title && !o.titleHtml && /[<>]/.test(o.title)){ o.titleHtml=o.title; }
  });

  var IGS='<svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>';
  var WAS='<svg viewBox="0 0 24 24" stroke-width="1.4"><path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/></svg>';
  var MS='<svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
  var PIN='<svg viewBox="0 0 24 24" stroke-width="1.4"><path d="M12 21s-7-4.5-7-10a7 7 0 1114 0c0 5.5-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/></svg>';
  var CLK='<svg viewBox="0 0 24 24" stroke-width="1.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  var ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
  var ARRUP='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M7 17L17 7M9 7h8v8"/></svg>';

  /* accent do nicho */
  var acc = (S.theme && S.theme.accent) || '#B08D57';
  document.documentElement.style.setProperty('--accent', acc);

  document.getElementById('meta-title').textContent = (S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Site';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{};
  document.querySelector('.ld').innerHTML = ini(b.name).split('').map(function(c){return '<span>'+esc(c)+'</span>';}).join('');

  /* navegação */
  var nav=[{id:'inicio',label:'Início'}];
  if(S.about) nav.push({id:'sobre',label:'Sobre'});
  if(S.services) nav.push({id:'servicos',label:(S.services.navLabel||'Serviços')});
  if(S.products&&S.products.show!==false&&S.products.items&&S.products.items.length) nav.push({id:'produtos',label:(S.products.navLabel||'Produtos')});
  nav.push({id:'contato',label:'Contato'});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';
  document.getElementById('header').innerHTML='<div class="container nav">'+brandHtml+
    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right"><a href="#contato" class="pill pill--solid">'+esc((S.hero&&S.hero.ctaAgendar)||'Agendar')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var html='';
  var h=S.hero||{};
  /* HERO */
  var heroImg = h.image ? '<img loading="lazy" src="'+esc(h.image)+'" alt="'+esc(b.name)+'">' : '<span class="vlabel">'+esc(h.imageLabel||'Sua foto aqui')+'</span>';
  html+='<section class="hero" id="inicio"><div class="container">'+
    '<div class="hero-top"><span class="kicker">'+esc(h.eyebrow||'Bem-vindo')+'</span>'+
      '<span class="hero-meta">'+esc((S.contact&&S.contact.cidade)||(b.tagline)||'')+(h.badge?'<br>'+h.badge:'')+'</span></div>'+
    '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
    '<div class="hero-bottom"><div class="hero-lead">'+
      (h.sub?'<p>'+esc(h.sub)+'</p>':'')+
      '<div class="hero-actions">'+
        '<a href="'+esc((h.ctaPrimary&&h.ctaPrimary.href)||'#servicos')+'" class="tlink tlink--accent">'+esc((h.ctaPrimary&&h.ctaPrimary.label)||'Ver Serviços')+' '+ARR+'</a>'+
        (h.ctaGhost?'<a href="'+esc(h.ctaGhost.href||'#contato')+'" class="tlink">'+esc(h.ctaGhost.label)+'</a>':'')+
      '</div></div>'+
      '<div class="hero-visual">'+heroImg+(h.badge?'<span class="vtag">'+h.badge+'</span>':'')+'</div>'+
    '</div></div></section>';

  /* SOBRE */
  if(S.about){
    var a=S.about;
    var media = a.image ? '<img loading="lazy" src="'+esc(a.image)+'" alt="'+esc(b.name)+'">' : '<span class="ml">'+esc(ini(b.name))+'</span>';
    html+='<section class="section about" id="sobre"><div class="container about-grid">'+
      '<div class="about-media" data-rev>'+media+'</div>'+
      '<div class="about-text"><span class="kicker" data-rev>'+esc(a.eyebrow||'Sobre')+'</span>'+
      '<h2 data-rev data-d="1">'+(a.titleHtml||esc(a.title))+'</h2>'+
      (a.paragraphs||[]).map(function(p){return '<p data-rev data-d="1">'+esc(p)+'</p>';}).join('')+
      (a.stats&&a.stats.length?'<div class="about-stats" data-rev data-d="2">'+a.stats.map(function(s){return '<div class="st"><div class="n" data-count="'+esc(s.num)+'"'+(s.suffix?' data-suffix="'+esc(s.suffix)+'"':'')+'>0</div><div class="l">'+esc(s.label)+'</div></div>';}).join('')+'</div>':'')+
      (a.certs&&a.certs.length?'<div class="about-certs" data-rev data-d="2">'+a.certs.map(function(c){return '<span>'+esc(c.label||c)+'</span>';}).join('')+'</div>':'')+
      '</div></div></section>';
  }

  /* SERVIÇOS (lista-revista) */
  if(S.services){
    var sv=S.services;
    html+='<section class="section" id="servicos"><div class="container">'+
      '<div class="sec-head"><span class="kicker" data-rev>'+esc(sv.eyebrow||'Serviços')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(sv.titleHtml||esc(sv.title))+'</h2>'+
      (sv.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(sv.intro)+'</p>':'')+'</div>'+
      '<div class="svc-list">'+
      (sv.items||[]).map(function(it,i){return '<div class="svc-row" data-rev>'+
        '<span class="svc-idx">'+('0'+(i+1)).slice(-2)+'</span>'+
        '<div class="svc-main"><h3>'+esc(it.name)+'</h3><p>'+esc(it.desc)+'</p></div>'+
        (it.price?'<span class="svc-price"><small>'+esc(it.priceLabel||'A partir de')+'</small>'+esc(it.price)+'</span>':'<span></span>')+
        '<a href="#contato" class="svc-arrow" aria-label="Saiba mais">'+ARRUP+'</a>'+
      '</div>';}).join('')+
      '</div></div></section>';
  }

  /* PRODUTOS */
  if(S.products&&S.products.show!==false&&S.products.items&&S.products.items.length){
    var pr=S.products, cats={};
    pr.items.forEach(function(p){ if(p.cat) cats[p.cat]=p.tag||p.cat; });
    var filters=pr.filters||([{key:'todos',label:'Todos'}].concat(Object.keys(cats).map(function(k){return {key:k,label:cats[k]};})));
    html+='<section class="section" id="produtos"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(pr.eyebrow||'Loja')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(pr.titleHtml||esc(pr.title))+'</h2>'+
      (pr.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(pr.intro)+'</p>':'')+
      (filters.length>1?'<div class="prod-filters" data-rev data-d="1">'+filters.map(function(f,i){return '<button class="'+(i===0?'active':'')+'" data-f="'+esc(f.key)+'">'+esc(f.label)+'</button>';}).join('')+'</div>':'')+
      '<div class="prod-grid" id="prodGrid"></div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section quotes" id="depoimentos"><div class="container" style="text-align:center">'+
      '<span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<div class="qmark" data-rev>&ldquo;</div>'+
      '<div class="qtrack" data-rev data-d="1"><div class="qslides" id="qslides">'+
      te.items.map(function(it){return '<div class="qslide"><p class="qquote">'+esc(it.quote)+'</p><div class="qauthor">'+esc(it.name)+'<span>'+esc(it.meta||'')+'</span></div></div>';}).join('')+
      '</div></div><div class="qdots" id="qdots"></div></div></section>';
  }

  /* GALERIA / INSTAGRAM */
  if(S.instagram&&S.instagram.show!==false&&S.instagram.url){
    var ig=S.instagram;
    var cell='<a class="gal-item" href="'+esc(ig.url)+'" target="_blank" rel="noopener"><span class="g">'+esc(ini(b.name))+'</span><span class="ov">'+IGS+'</span></a>';
    html+='<section class="section" id="instagram"><div class="container">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px">'+
      '<div><span class="kicker" data-rev>'+esc(ig.handle||'@instagram')+'</span><h2 class="sec-title" data-rev data-d="1">'+(ig.titleHtml||esc(ig.title||'Nosso dia a dia'))+'</h2></div>'+
      '<a href="'+esc(ig.url)+'" target="_blank" rel="noopener" class="tlink" data-rev data-d="1">Seguir '+IGS+'</a></div>'+
      '<div class="gal-grid" data-rev data-d="1">'+Array(7).join(cell)+'</div></div></section>';
  }

  /* CONTATO */
  var c=S.contact||{};
  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):(c.instagramUrl||'#');
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener">'+WAS+'<div><h4>WhatsApp</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.address) info+='<div class="it">'+PIN+'<div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it">'+CLK+'<div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';
  var map=c.mapsEmbed?'<div class="cmap"><iframe loading="lazy" src="'+esc(c.mapsEmbed)+'"></iframe></div>':'';
  var svcOpts=(S.services&&S.services.items?S.services.items.map(function(i){return i.name;}):[]);
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+
    '<h2 class="sec-title" data-rev data-d="1">'+(c.titleHtml||esc(c.title||'Vamos conversar'))+'</h2>'+
    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      '<div class="fld"><label>E-mail</label><input type="email" name="email" placeholder="voce@email.com"></div></div>'+
      (svcOpts.length?'<div class="fld"><label>Interesse</label><select name="servico"><option value="">Selecione</option>'+svcOpts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select></div>':'')+
      '<div class="fld"><label>Mensagem</label><textarea name="msg" placeholder="Como podemos ajudar?"></textarea></div>'+
      '<button type="submit" class="pill pill--solid" id="cbtn" style="justify-self:start">Enviar mensagem</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cinfo" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  /* FOOTER */
  var foot=S.footer||{};
  var soc='';
  if(S.instagram&&S.instagram.url) soc+='<a href="'+esc(S.instagram.url)+'" target="_blank" rel="noopener" aria-label="Instagram">'+IGS+'</a>';
  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="fmark">'+esc(b.name)+'</div>'+
    (foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    (soc?'<div class="fsoc">'+soc+'</div>':'')+
    '<p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* ====== INTERAÇÕES ====== */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});

  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',function(){ tm(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=+el.dataset.count,sf=el.dataset.suffix||'',st=performance.now(); (function tk(n){ var p=Math.min((n-st)/1500,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  /* produtos */
  var grid=document.getElementById('prodGrid');
  if(grid&&S.products&&S.products.items){
    function rp(f){ grid.innerHTML=''; S.products.items.filter(function(p){return f==='todos'||p.cat===f;}).forEach(function(p){ var d=document.createElement('div'); d.className='prod'; d.innerHTML='<div class="prod-thumb">'+(p.tag?'<span class="cat">'+esc(p.tag)+'</span>':'')+(p.image?'<img loading="lazy" src="'+esc(p.image)+'" alt="'+esc(p.nome||p.name)+'" style="width:100%;height:100%;object-fit:cover">':'<span class="g">'+esc(ini(p.nome||p.name||'?'))+'</span>')+'</div><div class="prod-b"><h4>'+esc(p.nome||p.name)+'</h4><p>'+esc(p.desc||'')+'</p><div class="prod-foot">'+((p.preco||p.price)?'<span class="pp">'+esc(p.preco||p.price)+'</span>':'<span></span>')+'<button>'+esc(S.products.buyLabel||'Comprar')+'</button></div></div>'; grid.appendChild(d); }); }
    rp('todos');
    document.querySelectorAll('.prod-filters button').forEach(function(btn){ btn.addEventListener('click',function(){ var a=document.querySelector('.prod-filters .active'); if(a)a.classList.remove('active'); btn.classList.add('active'); rp(btn.dataset.f); }); });
  }

  /* carrossel depoimentos */
  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au(); } au();
  }

  /* formulário */
  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.textContent='Enviar mensagem'; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Interesse: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
</body>
</html>
