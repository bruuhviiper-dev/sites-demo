<style>
:root{
  --navy:#0E1B2E; --navy2:#16263E; --paper:#FFFFFF; --paper2:#F3F6FA;
  --ink:#15202E; --ink2:#47576C; --muted:#6B7888; --line:#E3E8EF; --lineD:#27384E; --mutedD:#9EB1C7;
  --accent:#2F6BD8; --accent-ink:#FFFFFF;
  --head:"Archivo", sans-serif; --body:"Inter", sans-serif;
  --maxw:1200px; --ease:cubic-bezier(.16,.84,.34,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--paper); color:var(--ink); font-family:var(--body); font-weight:300; line-height:1.65; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--head); font-weight:700; line-height:1.06; letter-spacing:-.02em; }
::selection{ background:var(--accent); color:#fff; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
::-webkit-scrollbar{ width:10px; } ::-webkit-scrollbar-track{ background:var(--paper2); }
::-webkit-scrollbar-thumb{ background:#c3ccd8; } ::-webkit-scrollbar-thumb:hover{ background:var(--accent); }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:clamp(22px,5vw,56px); }
.section{ padding-block:clamp(64px,9vw,120px); }
.kicker{ font-family:var(--body); font-weight:600; font-size:.72rem; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:10px; }
.kicker::before{ content:""; width:26px; height:2px; background:var(--accent); }
.h-title{ font-size:clamp(2rem,4.6vw,3.3rem); margin-top:16px; }
.intro{ color:var(--ink2); max-width:560px; margin-top:16px; font-size:1.04rem; }
.ac{ color:var(--accent); }
.h-title em, .hero h1 em{ color:var(--accent); font-style:normal; }
.on-dark{ background:var(--navy); color:#fff; }
.on-dark .kicker{ color:#fff; } .on-dark .kicker::before{ background:var(--accent); }
.on-dark .intro{ color:var(--mutedD); }

.btn{ font-family:var(--body); font-weight:600; font-size:.82rem; letter-spacing:.04em; padding:15px 28px; border-radius:8px; display:inline-flex; align-items:center; gap:10px; transition:transform .25s var(--ease), background .25s, box-shadow .25s; }
.btn--primary{ background:var(--accent); color:var(--accent-ink); }
.btn--primary:hover{ transform:translateY(-2px); box-shadow:0 12px 26px -10px var(--accent); }
.btn--ghost{ border:1.5px solid currentColor; color:inherit; }
.btn--ghost:hover{ background:rgba(255,255,255,.08); }
.btn svg{ width:16px; height:16px; }

/* LOADER */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--navy); display:grid; place-items:center; transition:opacity .7s var(--ease), visibility .7s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld{ font-family:var(--head); font-weight:800; font-size:clamp(2.2rem,7vw,3.6rem); color:#fff; letter-spacing:-.02em; position:relative; }
.ld .bar{ height:3px; width:0; background:var(--accent); margin-top:10px; animation:ldbar 1.1s .2s var(--ease) forwards; }
@keyframes ldbar{ to{ width:100%; } }

/* HEADER */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .35s, box-shadow .35s, padding .35s; }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:20px; color:#fff; transition:color .35s; }
.header.scrolled{ background:#fff; box-shadow:0 4px 20px -12px rgba(0,0,0,.3); }
.header.scrolled .nav{ color:var(--ink); padding-block:13px; }
.brand{ font-family:var(--head); font-weight:700; font-size:1.4rem; letter-spacing:-.02em; }
.brand b{ color:var(--accent); }
.brand .tag{ display:block; font-family:var(--body); font-size:.58rem; letter-spacing:.2em; text-transform:uppercase; opacity:.7; margin-top:2px; font-weight:500; }
.nav-links{ display:flex; align-items:center; gap:34px; }
.nav-links a{ font-size:.82rem; letter-spacing:.02em; font-weight:500; position:relative; }
.nav-links a::after{ content:""; position:absolute; left:0; bottom:-5px; width:0; height:2px; background:var(--accent); transition:width .3s var(--ease); }
.nav-links a:hover::after{ width:100%; }
.nav-right{ display:flex; align-items:center; gap:20px; }
.nav-phone{ font-weight:600; font-size:.9rem; display:inline-flex; align-items:center; gap:8px; }
.nav-phone svg{ width:16px; height:16px; }
.burger{ display:none; width:40px; height:40px; background:none; border:none; position:relative; z-index:1100; cursor:pointer; color:inherit; }
.burger span{ position:absolute; left:8px; width:24px; height:2px; background:currentColor; transition:.35s var(--ease); }
.burger span:nth-child(1){ top:15px; } .burger span:nth-child(2){ top:22px; }
.burger.open span:nth-child(1){ top:18px; transform:rotate(45deg); }
.burger.open span:nth-child(2){ top:18px; transform:rotate(-45deg); }
@media (max-width:920px){
  .burger{ display:block; }
  .nav-links{ position:fixed; inset:0; flex-direction:column; justify-content:center; gap:26px; background:var(--navy); color:#fff; transform:translateX(100%); transition:transform .5s var(--ease); }
  .nav-links.open{ transform:none; }
  .nav-links a{ font-size:1.5rem; font-family:var(--head); font-weight:600; }
  .nav-right .btn, .nav-right .nav-phone{ display:none; }
}

/* HERO */
.hero{ background:var(--navy); color:#fff; padding-top:130px; position:relative; overflow:hidden; }
.hero::before{ content:""; position:absolute; inset:0; opacity:.5;
  background-image:linear-gradient(var(--lineD) 1px,transparent 1px),linear-gradient(90deg,var(--lineD) 1px,transparent 1px);
  background-size:64px 64px; -webkit-mask:radial-gradient(120% 80% at 80% 0%,#000,transparent 70%); mask:radial-gradient(120% 80% at 80% 0%,#000,transparent 70%); }
.hero-in{ position:relative; z-index:1; padding-bottom:clamp(40px,6vw,72px); }
.hero-grid{ display:grid; grid-template-columns:1.15fr .85fr; gap:50px; align-items:center; }
.hero h1{ font-size:clamp(2.5rem,6vw,4.4rem); margin:20px 0 22px; }
.hero h1 .ac{ color:var(--accent); }
.hero-sub{ color:var(--mutedD); font-size:1.12rem; max-width:480px; margin-bottom:32px; }
.hero-actions{ display:flex; gap:14px; flex-wrap:wrap; }
.hero-card{ background:var(--navy2); border:1px solid var(--lineD); border-radius:16px; padding:30px; }
.hero-card .hc-label{ font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; color:var(--mutedD); }
.hero-card .hc-row{ display:flex; align-items:center; gap:14px; padding:16px 0; border-bottom:1px solid var(--lineD); }
.hero-card .hc-row:last-child{ border-bottom:none; padding-bottom:0; }
.hero-card .hc-ic{ width:40px; height:40px; border-radius:9px; background:rgba(255,255,255,.06); display:grid; place-items:center; flex-shrink:0; }
.hero-card .hc-ic svg{ width:20px; height:20px; stroke:var(--accent); fill:none; }
.hero-card .hc-t{ font-weight:500; color:#fff; font-size:.96rem; } .hero-card .hc-s{ color:var(--mutedD); font-size:.82rem; }
@media (max-width:920px){ .hero-grid{ grid-template-columns:1fr; gap:34px; } }

/* STAT BAND */
.stats-band{ background:var(--navy2); border-top:1px solid var(--lineD); position:relative; z-index:1; }
.stats-band .row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); }
.stats-band .st{ padding:30px clamp(16px,3vw,34px); border-right:1px solid var(--lineD); }
.stats-band .st:last-child{ border-right:none; }
.stats-band .n{ font-family:var(--head); font-weight:800; font-size:clamp(2rem,4vw,2.8rem); color:#fff; }
.stats-band .n b{ color:var(--accent); font-weight:800; }
.stats-band .l{ color:var(--mutedD); font-size:.82rem; letter-spacing:.04em; margin-top:4px; }

/* SOBRE */
.about-grid{ display:grid; grid-template-columns:1.05fr .95fr; gap:clamp(36px,5vw,70px); align-items:center; }
.about-text p{ color:var(--ink2); margin:14px 0; max-width:520px; }
.about-tags{ display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
.about-tags span{ font-size:.8rem; font-weight:500; color:var(--ink2); padding:9px 16px; border:1px solid var(--line); border-radius:8px; background:var(--paper2); display:inline-flex; align-items:center; gap:8px; }
.about-tags span::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--accent); }
.about-media{ aspect-ratio:4/3; border-radius:16px; overflow:hidden; background:linear-gradient(135deg,var(--paper2),#e4eaf2); border:1px solid var(--line); position:relative; }
.tst-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px; margin-top:50px; }
.tst-card{ background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:clamp(24px,3vw,34px); display:flex; flex-direction:column; gap:16px; }
.tst-stars{ color:var(--accent); letter-spacing:3px; font-size:.9rem; }
.tst-card blockquote{ font-family:var(--display,inherit); font-size:1.16rem; line-height:1.5; color:var(--ink); font-style:italic; }
.tst-card figcaption{ margin-top:auto; display:flex; flex-direction:column; gap:3px; }
.tst-card .tst-name{ font-weight:600; color:var(--ink); }
.tst-card .tst-meta{ font-size:.8rem; color:var(--muted); }
.about-media img{ width:100%; height:100%; object-fit:cover; }
.about-media .ml{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--head); font-weight:800; color:#c2cedd; font-size:3rem; }
@media (max-width:920px){ .about-grid{ grid-template-columns:1fr; gap:34px; } .about-media{ max-width:480px; } }

/* SERVIÇOS */
.svc-head{ max-width:680px; margin-bottom:clamp(34px,4vw,54px); }
.svc-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.svc-card{ background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:30px 26px; position:relative; transition:transform .35s var(--ease), box-shadow .35s, border-color .35s; overflow:hidden; }
.svc-card::before{ content:""; position:absolute; top:0; left:0; width:100%; height:3px; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform .4s var(--ease); }
.svc-card:hover{ transform:translateY(-6px); box-shadow:0 24px 50px -28px rgba(14,27,46,.4); border-color:transparent; }
.svc-card:hover::before{ transform:scaleX(1); }
.svc-ic{ width:50px; height:50px; border-radius:12px; background:var(--paper2); display:grid; place-items:center; margin-bottom:20px; }
.svc-ic svg{ width:24px; height:24px; stroke:var(--accent); fill:none; }
.svc-card h3{ font-size:1.3rem; font-weight:700; margin-bottom:8px; }
.svc-card p{ color:var(--ink2); font-size:.92rem; min-height:46px; }
.svc-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
.svc-price{ font-family:var(--head); font-weight:700; color:var(--ink); font-size:1.05rem; }
.svc-more{ font-size:.78rem; font-weight:600; color:var(--accent); display:inline-flex; align-items:center; gap:6px; }
.svc-more svg{ width:14px; height:14px; }
@media (max-width:900px){ .svc-grid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:560px){ .svc-grid{ grid-template-columns:1fr; } }

/* PROCESSO */
.proc-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:24px; margin-top:clamp(34px,4vw,54px); position:relative; }
.proc-step{ position:relative; }
.proc-n{ font-family:var(--head); font-weight:800; font-size:2.4rem; color:var(--accent); line-height:1; }
.proc-step h3{ font-size:1.25rem; font-weight:700; margin:14px 0 8px; color:#fff; }
.proc-step p{ color:var(--mutedD); font-size:.92rem; }
.proc-step::after{ content:""; position:absolute; top:18px; right:-12px; width:24px; height:1px; background:var(--lineD); }
.proc-grid .proc-step:last-child::after{ display:none; }
@media (max-width:760px){ .proc-step::after{ display:none; } }

/* CONTATO */
.contact-grid{ display:grid; grid-template-columns:1.05fr .95fr; gap:clamp(32px,4vw,56px); margin-top:clamp(32px,4vw,50px); }
.cform{ display:grid; gap:18px; }
.fld label{ display:block; font-size:.74rem; font-weight:500; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.fld input,.fld select,.fld textarea{ width:100%; background:var(--paper2); border:1px solid var(--line); border-radius:10px; padding:14px 16px; font-family:var(--body); font-size:.96rem; font-weight:300; color:var(--ink); transition:border-color .25s, box-shadow .25s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,107,216,.12); }
.fld textarea{ resize:vertical; min-height:110px; }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.cmsg{ font-size:.86rem; color:var(--accent); min-height:18px; }
.cpanel{ background:var(--navy); color:#fff; border-radius:16px; padding:32px; align-self:start; }
.cpanel .it{ display:flex; gap:14px; padding:18px 0; border-bottom:1px solid var(--lineD); }
.cpanel .it:first-child{ padding-top:0; } .cpanel .it:last-child{ border-bottom:none; }
.cpanel .it svg{ width:20px; height:20px; stroke:var(--accent); fill:none; flex-shrink:0; margin-top:2px; }
.cpanel .it h4{ font-family:var(--body); font-weight:600; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--mutedD); margin-bottom:4px; }
.cpanel .it p{ font-size:.98rem; }
.cmap{ margin-top:18px; border-radius:12px; overflow:hidden; border:1px solid var(--lineD); }
.cmap iframe{ width:100%; height:180px; border:0; display:block; }
@media (max-width:920px){ .contact-grid{ grid-template-columns:1fr; } .frow{ grid-template-columns:1fr; } }

.wa{ position:fixed; right:22px; bottom:22px; z-index:800; width:56px; height:56px; border-radius:50%; background:#25D366; display:grid; place-items:center; box-shadow:0 10px 26px -8px rgba(37,211,102,.5); transition:transform .3s; }
.wa:hover{ transform:scale(1.08); } .wa svg{ width:28px; height:28px; fill:#fff; }

/* FOOTER */
.footer{ background:var(--navy); color:#fff; padding-block:56px 28px; }
.footer-top{ display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:24px; padding-bottom:30px; border-bottom:1px solid var(--lineD); }
.footer .fmark{ font-family:var(--head); font-weight:700; font-size:1.6rem; }
.footer .ftag{ color:var(--mutedD); max-width:340px; margin-top:10px; }
.fnav{ display:flex; gap:24px; flex-wrap:wrap; }
.fnav a{ font-size:.82rem; font-weight:500; color:var(--mutedD); } .fnav a:hover{ color:#fff; }
.fbot{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; padding-top:22px; }
.fsoc{ display:flex; gap:12px; }
.fsoc a{ width:38px; height:38px; border:1px solid var(--lineD); border-radius:9px; display:grid; place-items:center; transition:.3s; }
.fsoc a svg{ width:17px; height:17px; stroke:var(--mutedD); fill:none; }
.fsoc a.fb svg{ fill:var(--mutedD); stroke:none; }
.fsoc a:hover{ border-color:var(--accent); } .fsoc a:hover svg{ stroke:#fff; } .fsoc a.fb:hover svg{ fill:#fff; }
.fcopy{ font-size:.78rem; color:var(--mutedD); }

[data-rev]{ opacity:0; transform:translateY(26px); transition:opacity .8s var(--ease), transform .8s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.08s; } [data-rev][data-d="2"]{ transition-delay:.16s; } [data-rev][data-d="3"]{ transition-delay:.24s; }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } [data-rev]{ opacity:1; transform:none; } }
</style>

<body>
  <div id="loader"><div class="ld"><span id="ldn"></span><div class="bar"></div></div></div>
  <header class="header" id="header"></header>
  <main id="app"></main>
  <footer class="footer" id="footer"></footer>
  <a class="wa" id="wa" target="_blank" rel="noopener" aria-label="WhatsApp" style="display:none"><svg viewBox="0 0 32 32"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.7 1.9 6.7L3 29l7-1.8c1.9 1 4 1.6 6 1.6 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-4.1 1.1 1.1-4-.3-.4a10 10 0 01-1.6-5.4C5.6 9.8 10.2 5.3 16 5.3s10.4 4.5 10.4 10.2S21.8 25.7 16 25.7zm5.7-7.6c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-.9 1.2-.3.2-.6.1a8.3 8.3 0 01-2.4-1.5 9 9 0 01-1.7-2.1c-.2-.3 0-.5.1-.6l.5-.5.3-.5a.5.5 0 000-.5l-1-2.3c-.3-.6-.5-.5-.7-.5h-.6a1.1 1.1 0 00-.8.4 3.3 3.3 0 00-1 2.5c0 1.5 1.1 2.9 1.2 3.1s2.1 3.3 5.2 4.6c.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4s.3-1.3.2-1.4-.3-.2-.5-.4z"/></svg></a>
<script>
(function(){
  "use strict";
  var S=window.SITE;
  if(!S){ document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Erro: SITE não injetado.</p>'; return; }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function ini(n){ return (n||'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'•'; }
  ['hero','about','services','products','testimonials','instagram','contact','footer','process'].forEach(function(k){ var o=S[k]; if(o && o.title && !o.titleHtml && /[<>]/.test(o.title)){ o.titleHtml=o.title; } });

  var ICONS={ home:'<path d="M3 11l9-7 9 7M5 10v9h14v-9"/>', check:'<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/>', hand:'<path d="M6 19c0-4 3-7 6-7s6 3 6 7"/><circle cx="12" cy="7" r="3"/>', shield:'<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/>', star:'<path d="M12 2l2.6 6 6.4.5-4.9 4.2 1.5 6.3L12 16l-5.6 3 1.5-6.3L3 8.5 9.4 8z"/>', sparkle:'<path d="M12 3l2 5 5 .5-4 3.5 1.5 5L12 14l-4.5 3 1.5-5-4-3.5 5-.5z"/>', scale:'<path d="M12 3v18M5 21h14M7 7h10M7 7l-3 6h6zM17 7l3 6h-6z"/>', clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>', pin:'<path d="M12 21s-7-4.5-7-10a7 7 0 1114 0c0 5.5-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/>', phone:'<path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/>', leaf:'<path d="M4 14c2-1 4-1 8-4s6-6 8-6c0 2-3 5-6 8s-3 6-4 8c-2-4-4-4-6-6z"/>', heart:'<path d="M12 21s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 11c0 5.5-7 10-7 10z"/>' };
  function svg(n){ return '<svg viewBox="0 0 24 24" stroke-width="1.6">'+(ICONS[n]||ICONS.check)+'</svg>'; }
  var IGS='<svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>';
  var WAS='<svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/></svg>';
  var FBS='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 10-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0022 12z"/></svg>';
  var MS='<svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
  var ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

  var acc=(S.theme&&S.theme.accent)||'#2F6BD8';
  document.documentElement.style.setProperty('--accent',acc);
  document.getElementById('meta-title').textContent=(S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Site';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{}, c=S.contact||{};
  document.getElementById('ldn').textContent=esc(b.name||'');
  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):'#';

  var nav=[{id:'inicio',label:'Início'}];
  if(S.about) nav.push({id:'sobre',label:'Sobre'});
  if(S.services) nav.push({id:'servicos',label:(S.services.navLabel||'Serviços')});
  if(S.process&&S.process.steps&&S.process.steps.length) nav.push({id:'processo',label:(S.process.navLabel||'Como funciona')});
  nav.push({id:'contato',label:'Contato'});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';
  var phoneHtml=(c.phoneDisplay||c.whatsapp)?'<a class="nav-phone" href="'+(c.whatsapp?esc(waLink):'tel:'+esc(c.phoneDisplay))+'">'+'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">'+ICONS.phone+'</svg>'+esc(c.phoneDisplay||'')+'</a>':'';
  document.getElementById('header').innerHTML='<div class="container nav">'+brandHtml+
    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right">'+phoneHtml+'<a href="#contato" class="btn btn--primary">'+esc((S.hero&&S.hero.ctaAgendar)||'Fale conosco')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var html='', h=S.hero||{}, a=S.about||{};
  var heroImg=h.image?'<img loading="lazy" src="'+esc(h.image)+'" alt="'+esc(b.name)+'">':'';
  /* HERO */
  html+='<section class="hero" id="inicio"><div class="container hero-in"><div class="hero-grid"><div>'+
    '<span class="kicker">'+esc(h.eyebrow||'Bem-vindo')+'</span>'+
    '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
    (h.sub?'<p class="hero-sub">'+esc(h.sub)+'</p>':'')+
    '<div class="hero-actions">'+
      '<a href="'+esc((h.ctaPrimary&&h.ctaPrimary.href)||'#contato')+'" class="btn btn--primary">'+esc((h.ctaPrimary&&h.ctaPrimary.label)||'Fale conosco')+' '+ARR+'</a>'+
      (h.ctaGhost?'<a href="'+esc(h.ctaGhost.href||'#servicos')+'" class="btn btn--ghost">'+esc(h.ctaGhost.label)+'</a>':'')+
    '</div></div>'+
    '<div class="hero-card">'+
      '<div class="hc-label">'+esc(h.badge||'Por que nós')+'</div>'+
      (a.certs||[]).slice(0,4).map(function(ct){return '<div class="hc-row"><span class="hc-ic">'+svg(ct.icon||'check')+'</span><div><div class="hc-t">'+esc(ct.label||ct)+'</div></div></div>';}).join('')+
    '</div></div></div>';
  /* STAT BAND */
  if(a.stats&&a.stats.length){
    html+='<div class="stats-band"><div class="container"><div class="row">'+
      a.stats.map(function(s){return '<div class="st"><div class="n" data-count="'+esc(s.num)+'"'+(s.suffix?' data-suffix="'+esc(s.suffix)+'"':'')+'>0</div><div class="l">'+esc(s.label)+'</div></div>';}).join('')+
      '</div></div></div>';
  }
  html+='</section>';

  /* SOBRE */
  if(S.about){
    var media=a.image?'<img loading="lazy" src="'+esc(a.image)+'" alt="'+esc(b.name)+'">':'<span class="ml">'+esc(ini(b.name))+'</span>';
    html+='<section class="section" id="sobre"><div class="container about-grid"><div class="about-text">'+
      '<span class="kicker" data-rev>'+esc(a.eyebrow||'Sobre')+'</span>'+
      '<h2 class="h-title" data-rev data-d="1">'+(a.titleHtml||esc(a.title))+'</h2>'+
      (a.paragraphs||[]).map(function(p){return '<p data-rev data-d="1">'+esc(p)+'</p>';}).join('')+
      (a.certs&&a.certs.length?'<div class="about-tags" data-rev data-d="2">'+a.certs.map(function(ct){return '<span>'+esc(ct.label||ct)+'</span>';}).join('')+'</div>':'')+
      '</div><div class="about-media" data-rev data-d="1">'+media+'</div></div></section>';
  }

  /* SERVIÇOS */
  if(S.services){
    var sv=S.services;
    html+='<section class="section" style="background:var(--paper2)" id="servicos"><div class="container">'+
      '<div class="svc-head"><span class="kicker" data-rev>'+esc(sv.eyebrow||'Serviços')+'</span>'+
      '<h2 class="h-title" data-rev data-d="1">'+(sv.titleHtml||esc(sv.title))+'</h2>'+
      (sv.intro?'<p class="intro" data-rev data-d="1">'+esc(sv.intro)+'</p>':'')+'</div>'+
      '<div class="svc-grid">'+
      (sv.items||[]).map(function(it,i){return '<article class="svc-card" data-rev'+(i%3?' data-d="'+(i%3)+'"':'')+'>'+
        '<div class="svc-ic">'+svg(it.icon)+'</div><h3>'+esc(it.name)+'</h3><p>'+esc(it.desc)+'</p>'+
        '<div class="svc-foot">'+(it.price?'<span class="svc-price">'+esc(it.price)+'</span>':'<span></span>')+'<a href="#contato" class="svc-more">'+esc(sv.ctaLabel||'Saiba mais')+' '+ARR+'</a></div></article>';}).join('')+
      '</div></div></section>';
  }

  /* PROCESSO */
  if(S.process&&S.process.steps&&S.process.steps.length){
    var pc=S.process;
    html+='<section class="section on-dark" id="processo"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(pc.eyebrow||'Como funciona')+'</span>'+
      '<h2 class="h-title" data-rev data-d="1">'+(pc.titleHtml||esc(pc.title||'Como funciona'))+'</h2>'+
      (pc.intro?'<p class="intro" data-rev data-d="1">'+esc(pc.intro)+'</p>':'')+
      '<div class="proc-grid">'+
      pc.steps.map(function(s,i){return '<div class="proc-step" data-rev'+(i?' data-d="'+Math.min(i,3)+'"':'')+'><div class="proc-n">'+esc(s.n||('0'+(i+1)).slice(-2))+'</div><h3>'+esc(s.name)+'</h3><p>'+esc(s.desc)+'</p></div>';}).join('')+
      '</div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section" style="background:var(--paper2)" id="depoimentos"><div class="container">'+
      '<div class="svc-head"><span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<h2 class="h-title" data-rev data-d="1">'+(te.titleHtml||esc(te.title||'O que dizem os clientes'))+'</h2></div>'+
      '<div class="tst-grid">'+
      te.items.map(function(it,i){return '<figure class="tst-card" data-rev'+(i%3?' data-d="'+(i%3)+'"':'')+'>'+
        '<div class="tst-stars">'+new Array((+it.stars||5)+1).join('★')+'</div>'+
        '<blockquote>&ldquo;'+esc(it.quote||it.text)+'&rdquo;</blockquote>'+
        '<figcaption><span class="tst-name">'+esc(it.name)+'</span>'+(it.meta?'<span class="tst-meta">'+esc(it.meta)+'</span>':'')+'</figcaption>'+
      '</figure>';}).join('')+
      '</div></div></section>';
  }

  /* CONTATO */
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" stroke-width="1.5">'+ICONS.phone+'</svg><div><h4>'+(c.whatsapp?'WhatsApp':'Telefone')+'</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.facebookUrl) info+='<a class="it" href="'+esc(c.facebookUrl)+'" target="_blank" rel="noopener"><span style="color:var(--accent)">'+FBS+'</span><div><h4>Facebook</h4><p>'+esc(c.facebookLabel||'Página')+'</p></div></a>';
  if(c.address) info+='<div class="it"><svg viewBox="0 0 24 24" stroke-width="1.5">'+ICONS.pin+'</svg><div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it"><svg viewBox="0 0 24 24" stroke-width="1.5">'+ICONS.clock+'</svg><div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';
  var map=c.mapsEmbed?'<div class="cmap"><iframe loading="lazy" src="'+esc(c.mapsEmbed)+'"></iframe></div>':'';
  var svcOpts=(S.services&&S.services.items?S.services.items.map(function(i){return i.name;}):[]);
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+
    '<h2 class="h-title" data-rev data-d="1">'+(c.titleHtml||esc(c.title||'Fale com a gente'))+'</h2>'+
    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome / Empresa</label><input type="text" name="nome" placeholder="Seu nome ou empresa" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      '<div class="fld"><label>E-mail</label><input type="email" name="email" placeholder="voce@email.com"></div></div>'+
      (svcOpts.length?'<div class="fld"><label>Assunto</label><select name="servico"><option value="">Selecione</option>'+svcOpts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select></div>':'')+
      '<div class="fld"><label>Mensagem</label><textarea name="msg" placeholder="Como podemos ajudar?"></textarea></div>'+
      '<button type="submit" class="btn btn--primary" id="cbtn" style="justify-self:start">Enviar mensagem '+ARR+'</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cpanel" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  /* FOOTER */
  var foot=S.footer||{};
  var soc='';
  if(S.instagram&&S.instagram.url) soc+='<a href="'+esc(S.instagram.url)+'" target="_blank" rel="noopener" aria-label="Instagram">'+IGS+'</a>';
  if(c.facebookUrl) soc+='<a class="fb" href="'+esc(c.facebookUrl)+'" target="_blank" rel="noopener" aria-label="Facebook">'+FBS+'</a>';
  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="footer-top">'+
    '<div><div class="fmark">'+(b.nameHtml||esc(b.name))+'</div>'+(foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+'</div>'+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav></div>'+
    '<div class="fbot"><p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p>'+(soc?'<div class="fsoc">'+soc+'</div>':'')+'</div></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* INTERAÇÕES */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});
  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(x){ x.addEventListener('click',function(){ tm(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });
  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=+el.dataset.count,sf=el.dataset.suffix||'',st=performance.now(); if(isNaN(t)){ el.textContent=el.dataset.count+sf; cio.unobserve(el); return; } (function tk(n){ var p=Math.min((n-st)/1500,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.innerHTML='Enviar mensagem'; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Assunto: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
</body>
</html>
