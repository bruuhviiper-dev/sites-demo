<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boutique</title>
<meta name="description" content="Boutique" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF6F4; --bg-alt: #F0E9E4; --surface: #FFFFFF;
  --accent: #B86060; --accent2: #E8C8C8;
  --text: #1A1210; --muted: #8A7A76; --border: #E2D8D2;
  --font-d: "Playfair Display", serif;
  --font-b: "DM Sans", sans-serif;
  --ease: cubic-bezier(.16,.84,.34,1);
  --nav-h: 68px;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-b); line-height: 1.65; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
section { padding: clamp(72px,10vw,120px) clamp(24px,6vw,80px); }
.wrap { max-width: 1160px; margin: 0 auto; }

/* ═══ NAV — sempre sólido, nunca transparente ═══ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(24px,5vw,64px);
  background: rgba(250,246,244,0.97);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  font-family: var(--font-d); font-style: italic; font-size: 1.15rem;
  color: var(--text); letter-spacing: .01em;
}
.nav-group { display: flex; align-items: center; gap: 32px; }
.nav-link {
  font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); transition: color .25s;
}
.nav-link:hover { color: var(--accent); }
.nav-cta {
  font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--text); border: 1px solid var(--border);
  padding: 9px 18px; border-radius: 100px;
  display: flex; align-items: center; gap: 8px;
  transition: border-color .3s, color .3s;
}
.nav-cta:hover { border-color: var(--accent); color: var(--accent); }

/* ═══ HERO ═══ */
#hero {
  min-height: 100vh;
  padding-top: var(--nav-h);
  display: grid;
  grid-template-columns: 52% 48%;
  position: relative;
}
.hero-copy {
  display: flex; flex-direction: column; justify-content: flex-start;
  padding: clamp(52px,6vw,80px) clamp(40px,6vw,88px) calc(clamp(40px,5vw,64px) + 52px);
}
.hero-eyebrow {
  font-size: .66rem; letter-spacing: .32em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 22px;
}
.hero-title {
  font-family: var(--font-d); font-style: italic; font-weight: 400;
  font-size: clamp(3.4rem, 6.5vw, 7rem); line-height: 1.02;
  color: var(--text); margin-bottom: 28px;
}
.hero-title em { color: var(--accent); font-style: italic; }
.hero-sub {
  font-size: 1rem; color: var(--muted); max-width: 380px; line-height: 1.8;
  margin-bottom: 40px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: .78rem; color: var(--muted); margin-bottom: 40px;
}
.hero-badge strong { color: var(--text); }
.ctas { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-fill {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--accent); color: #fff;
  padding: 16px 32px; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase;
  transition: background .25s;
}
.btn-fill:hover { background: var(--text); }
.btn-line {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--text); border: 1.5px solid var(--text);
  padding: 15px 30px; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase;
  transition: border-color .3s, color .3s;
}
.btn-line:hover { border-color: var(--accent); color: var(--accent); }

/* Hero — lado imagem */
.hero-visual {
  position: relative;
  background: linear-gradient(152deg, var(--bg-alt) 0%, var(--accent2) 100%);
  overflow: hidden;
  min-height: calc(100vh - var(--nav-h));
}
/* Palavra editorial gigante — ocupa o lado visual */
.hero-word {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d); font-style: italic; font-weight: 400;
  font-size: clamp(8rem, 18vw, 24rem); line-height: 1;
  color: #fff; opacity: .18;
  user-select: none; pointer-events: none; letter-spacing: -.02em;
  padding: 0 16px; text-align: center;
}
/* Quadro interno com sazonalidade */
.hero-visual-frame {
  position: absolute;
  inset: clamp(24px,3.5vw,44px);
  border: 1px solid rgba(255,255,255,.35);
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-end;
  padding: 22px 26px; gap: 4px;
}
.hero-img-season {
  font-size: .6rem; letter-spacing: .24em; text-transform: uppercase;
  color: rgba(26,18,16,.45);
}
.hero-img-label {
  font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); opacity: .55;
}
.hero-tag {
  position: absolute; top: 28px; right: 28px;
  background: var(--accent); color: #fff;
  font-size: .6rem; letter-spacing: .2em; text-transform: uppercase;
  padding: 8px 14px;
}

/* Marquee */
.marquee-wrap {
  position: absolute; bottom: 0; left: 0; right: 0; height: 52px;
  background: var(--text); overflow: hidden;
  display: flex; align-items: center;
  grid-column: 1 / -1;
}
.marquee-track {
  display: flex; white-space: nowrap;
  animation: mq 32s linear infinite;
}
.marquee-item { font-size: .66rem; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.65); padding: 0 24px; }
.marquee-dot { color: var(--accent); font-size: .8rem; padding: 0 8px; }
@keyframes mq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ═══ SOBRE ═══ */
#sobre { background: var(--surface); }
.sobre-wrap { max-width: 1100px; margin: 0 auto; }
.sobre-top {
  border-bottom: 1px solid var(--border);
  padding-bottom: clamp(32px,4vw,56px);
  margin-bottom: clamp(32px,4vw,56px);
}
.eyebrow { font-size: .66rem; letter-spacing: .32em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
.section-title {
  font-family: var(--font-d); font-style: italic; font-weight: 400;
  font-size: clamp(2.2rem,4vw,3.6rem); line-height: 1.08; color: var(--text);
}
.section-title em { color: var(--accent); font-style: italic; }
.sobre-body { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px,5vw,72px); align-items: start; }
.sobre-text p { font-size: .97rem; color: var(--muted); line-height: 1.85; margin-bottom: 14px; }
.stats-row { display: flex; gap: 0; margin-top: 40px; }
.stat { flex: 1; padding: 28px 20px; border-left: 1px solid var(--border); }
.stat:first-child { padding-left: 0; border-left: none; }
.stat-n { font-family: var(--font-d); font-size: 2.6rem; font-weight: 400; color: var(--text); line-height: 1; }
.stat-l { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
.certs { display: flex; flex-direction: column; gap: 10px; }
.cert {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  border-left: 2px solid var(--accent2);
  background: var(--bg);
  font-size: .9rem; color: var(--text); line-height: 1.4;
}
.cert-ico { color: var(--accent); flex-shrink: 0; }

/* ═══ COLEÇÕES ═══ */
#colecoes { padding: 0; background: var(--bg); }
.col-header {
  max-width: 1100px; margin: 0 auto;
  padding: clamp(60px,8vw,96px) clamp(24px,6vw,80px) clamp(28px,3vw,44px);
  display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;
}
.col-header-text .eyebrow { margin-bottom: 10px; }
.col-header-text .section-title { font-size: clamp(1.8rem,3.5vw,3rem); }
.col-ver-link {
  font-size: .72rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--accent2); padding-bottom: 2px;
  white-space: nowrap; flex-shrink: 0; transition: color .25s, border-color .25s;
}
.col-ver-link:hover { color: var(--text); border-color: var(--text); }
.col-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
.col-card {
  position: relative; aspect-ratio: 2/3; overflow: hidden; cursor: pointer;
}
.col-bg {
  position: absolute; inset: 0;
  transition: transform .7s var(--ease);
}
.col-card:hover .col-bg { transform: scale(1.05); }
.col-ph {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d); font-style: italic; color: rgba(26,18,16,.22);
  font-size: clamp(.8rem,1.4vw,1.1rem); text-align: center; padding: 24px; pointer-events: none;
}
.col-tag {
  position: absolute; top: 0; left: 0;
  background: rgba(250,246,244,.92);
  font-size: .6rem; letter-spacing: .16em; text-transform: uppercase;
  color: var(--text); padding: 8px 14px;
}
.col-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(26,18,16,.78) 0%, transparent 55%);
  opacity: 0; transition: opacity .45s var(--ease);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: clamp(16px,2vw,28px);
}
.col-card:hover .col-overlay { opacity: 1; }
.col-name { font-family: var(--font-d); font-style: italic; font-size: clamp(1rem,1.6vw,1.3rem); color: #fff; margin-bottom: 6px; }
.col-desc { font-size: .8rem; color: rgba(255,255,255,.8); line-height: 1.5; }
.col-price { margin-top: 10px; font-size: .68rem; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.6); }

/* ═══ CONTATO ═══ */
#contato { background: var(--bg-alt); }
.contato-wrap { max-width: 820px; margin: 0 auto; }
.contato-top { margin-bottom: clamp(40px,5vw,64px); }
.contato-infos {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 2px; margin-bottom: 48px;
}
.info-block {
  background: var(--bg); padding: 24px 28px;
  display: flex; flex-direction: column; gap: 8px;
}
.info-label { font-size: .62rem; letter-spacing: .22em; text-transform: uppercase; color: var(--accent); }
.info-val { font-size: .94rem; color: var(--text); line-height: 1.5; }
.wpp-block {
  display: flex; flex-direction: column; align-items: flex-start; gap: 20px;
  margin-bottom: 40px;
}
.btn-wpp {
  display: inline-flex; align-items: center; gap: 14px;
  background: #1A1210; color: #fff;
  padding: 18px 36px; font-size: .82rem; letter-spacing: .1em; text-transform: uppercase;
  transition: background .25s;
}
.btn-wpp:hover { background: var(--accent); }
.btn-wpp-ico { width: 20px; height: 20px; flex-shrink: 0; color: #25D366; }
.map-wrap { border: 1px solid var(--border); overflow: hidden; }
.map-wrap iframe { width: 100%; height: 320px; border: 0; display: block; }

/* ═══ FOOTER ═══ */
footer {
  background: var(--text); color: rgba(250,246,244,.9);
  padding: 52px clamp(24px,6vw,80px);
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 24px;
}
.ft-brand { font-family: var(--font-d); font-style: italic; font-size: 1.2rem; }
.ft-tagline {
  font-size: .68rem; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(250,246,244,.38); text-align: center;
}
.ft-copy { font-size: .68rem; color: rgba(250,246,244,.3); text-align: right; }

/* ═══ REVEAL ═══ */
.rv { opacity: 0; transform: translateY(20px); transition: opacity .65s var(--ease), transform .65s var(--ease); }
.rv.on { opacity: 1; transform: none; }
.rv2 { opacity: 0; transform: translateY(20px); transition: opacity .65s var(--ease) .1s, transform .65s var(--ease) .1s; }
.rv2.on { opacity: 1; transform: none; }

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  #hero { grid-template-columns: 1fr; }
  .hero-visual { display: none; }
  .hero-copy { padding-bottom: calc(clamp(40px,6vw,64px) + 52px); }
  .sobre-body { grid-template-columns: 1fr; }
  .col-grid { grid-template-columns: repeat(2,1fr); }
  .col-header { flex-direction: column; align-items: flex-start; }
  footer { grid-template-columns: 1fr; gap: 12px; }
  .ft-tagline,.ft-copy { text-align: left; }
  .nav-group.hide-sm { display: none; }
}
@media(max-width:540px){
  .col-grid { grid-template-columns: 1fr 1fr; }
  .stats-row { flex-direction: column; }
  .stat { border-left: none; border-top: 1px solid var(--border); padding: 20px 0; }
  .stat:first-child { border-top: none; }
}
</style>
</head>

  </div>
</section>

<!-- FOOTER -->
<footer id="footer"></footer>

    tag: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
    leaf: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C8 10 5.9 16.17 3.82 22M9.09 9.91C7.07 12.87 6.56 16.11 6 19c4.17-.53 7.41-1.43 9.7-3"/></svg>',
    star: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    hand: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v5M14 10V4a2 2 0 0 0-4 0v6M10 10V4a2 2 0 0 0-4 0v10M6 14v-4a2 2 0 0 0-4 0v2c0 4.42 3.58 8 8 8h2c3.3 0 6-2.7 6-6v-2a2 2 0 0 0-4 0"/></svg>',
    shield: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
    phone: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.06 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16.92z"/></svg>',
    wpp: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.096.541 4.067 1.484 5.791L0 24l6.387-1.455A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.944 9.944 0 0 1-5.184-1.42l-.366-.22-3.788.863.931-3.683-.24-.381A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>'
  };
  function ico(k){ return ICONS[k] || ICONS.check; }

  // ── NAV ──────────────────────────────────────────
  var bHtml = (S.brand && S.brand.nameHtml) || bName;
  if(g('nav-brand')) g('nav-brand').innerHTML = bHtml;
  var sv = S.services || {};
  if(g('nav-left'))
    g('nav-left').innerHTML = '<a class="nav-link" href="#sobre">Sobre</a><a class="nav-link" href="#colecoes">'+(sv.navLabel||'Coleções')+'</a>';
  var ct = S.contact || {};
  var ph = ct.phoneDisplay; var wn = ct.whatsapp;
  if(g('nav-right')){
    var nr = '<a class="nav-link" href="#contato">Contato</a>';
    if(ph) nr += '<a class="nav-cta" href="tel:'+(wn||ph)+'">'+ico('phone')+ph+'</a>';
    g('nav-right').innerHTML = nr;
  }

  // ── HERO ─────────────────────────────────────────
  var h = S.hero || {}; var niH = (ni.hero) || {};
  if(h.title && !h.titleHtml && /[<>]/.test(h.title)) h.titleHtml = h.title;
  if(g('h-eyebrow')) g('h-eyebrow').textContent = h.eyebrow || niH.eyebrow || '';
  if(g('h-title'))   g('h-title').innerHTML     = h.titleHtml || h.title || niH.title || '';
  if(g('h-sub'))     g('h-sub').textContent     = h.sub || niH.sub || '';
  if(g('h-badge') && h.badge) g('h-badge').innerHTML = '<span style="color:var(--accent)">★</span>&nbsp;<strong>'+h.badge+'</strong>';
  // Palavra editorial no lado visual: primeira palavra da marca (ex: "PZ", "Espaço")
  if(g('h-word')){
    var firstWord = bName.split(/\s+/)[0] || bName;
    g('h-word').textContent = firstWord;
  }
  if(g('h-season')){
    var yr = new Date().getFullYear();
    var mo = new Date().getMonth();
    var saz = mo < 3 || mo === 11 ? 'Verão '+yr : mo < 6 ? 'Outono '+yr : mo < 9 ? 'Inverno '+yr : 'Primavera '+yr;
    g('h-season').textContent = 'Coleção · ' + saz;
  }
  if(g('h-tag') && h.badge){ g('h-tag').textContent = h.badge; } else if(g('h-tag')){ g('h-tag').style.display='none'; }
  if(g('h-ctas')){
    var c='';
    if(h.ctaPrimary) c+='<a class="btn-fill" href="'+(h.ctaPrimary.href||'#contato')+'">'+h.ctaPrimary.label+' →</a>';
    if(h.ctaGhost)   c+='<a class="btn-line" href="'+(h.ctaGhost.href||'#colecoes')+'">'+h.ctaGhost.label+'</a>';
    g('h-ctas').innerHTML = c;
  }

  // ── MARQUEE ───────────────────────────────────────
  var mEl = g('marquee');
  if(mEl){
    var its = (sv.items)||[];
    var txt = its.map(function(it){ return '<span class="marquee-item">'+it.name+'</span><span class="marquee-dot">·</span>'; }).join('');
    if(!txt) txt = '<span class="marquee-item">Nova Coleção</span><span class="marquee-dot">·</span><span class="marquee-item">Moda Feminina</span><span class="marquee-dot">·</span><span class="marquee-item">Estilo</span><span class="marquee-dot">·</span>';
    mEl.innerHTML = txt+txt;
  }

  // ── SOBRE ─────────────────────────────────────────
  var ab = S.about || {};
  if(ab.title && !ab.titleHtml && /[<>]/.test(ab.title)) ab.titleHtml = ab.title;
  if(g('ab-eyebrow')) g('ab-eyebrow').textContent = ab.eyebrow||'';
  if(g('ab-title'))   g('ab-title').innerHTML = ab.titleHtml||ab.title||'';

  if(g('ab-paras') && ab.paragraphs){
    g('ab-paras').innerHTML = ab.paragraphs.map(function(p){ return '<p class="rv" style="margin-bottom:16px;font-size:.97rem;color:var(--muted);line-height:1.85;">'+p+'</p>'; }).join('');
  }
  if(g('ab-stats') && ab.stats && ab.stats.length){
    g('ab-stats').innerHTML = ab.stats.map(function(st){
      // só anima se o sufixo for puramente não-numérico simples (ex: "+", "%"); sufixos com vírgula (ex: ",0") ficam estáticos
      var canAnim = /^[+%]?$/.test(String(st.suffix||''));
      var numAttr = canAnim ? ' data-target="'+(st.num||0)+'" data-suffix="'+(st.suffix||'')+'"' : '';
      return '<div class="stat rv"><div class="stat-n"'+numAttr+'>'+(st.num||'')+(st.suffix||'')+'</div><div class="stat-l">'+(st.label||'')+'</div></div>';
    }).join('');
  }
  if(g('ab-certs') && ab.certs && ab.certs.length){
    g('ab-certs').innerHTML = ab.certs.map(function(c){
      return '<div class="cert rv"><span class="cert-ico">'+ico(c.icon||'check')+'</span><span>'+c.label+'</span></div>';
    }).join('');
  }

  // ── COLEÇÕES ──────────────────────────────────────
  if(sv.title && !sv.titleHtml && /[<>]/.test(sv.title)) sv.titleHtml = sv.title;
  if(g('sv-eyebrow')) g('sv-eyebrow').textContent = sv.eyebrow||'Coleções';
  if(g('sv-title'))   g('sv-title').innerHTML = sv.titleHtml||sv.title||'Encontre o seu estilo';

  var grid = g('col-grid');
  if(grid && sv.items){
    var grd = [
      'linear-gradient(145deg,#EAD8C8 0%,#D4BFB0 100%)',
      'linear-gradient(145deg,#DDD0C4 0%,#C9BAB0 100%)',
      'linear-gradient(155deg,#D0C4BA 0%,#BFAD9E 100%)',
      'linear-gradient(135deg,#E4D4C4 0%,#CEBDAC 100%)',
      'linear-gradient(150deg,#D8CCC0 0%,#C4B4A6 100%)',
      'linear-gradient(140deg,#E0D0C0 0%,#CABAAA 100%)'
    ];
    grid.innerHTML = sv.items.map(function(it,i){
      return '<div class="col-card rv">'+
        '<div class="col-bg" style="background:'+grd[i%grd.length]+'"></div>'+
        '<div class="col-ph">'+it.name+'</div>'+
        '<div class="col-tag">'+it.name+'</div>'+
        '<div class="col-overlay">'+
          '<div class="col-name">'+it.name+'</div>'+
          '<div class="col-desc">'+(it.desc||'')+'</div>'+
          (it.price?'<div class="col-price">'+it.price+'</div>':'')+
        '</div>'+
      '</div>';
    }).join('');
  }

  // ── DEPOIMENTOS ───────────────────────────────────
  var tst = S.testimonials||{};
  var depEl = g('depoimentos');
  if(depEl && tst.show && tst.items && tst.items.length){
    depEl.style.display='';
    depEl.innerHTML='<div class="wrap"><div class="eyebrow rv" style="text-align:center;margin-bottom:12px">'+(tst.eyebrow||'Depoimentos')+'</div>'+
      '<div class="section-title rv" style="text-align:center;font-size:clamp(1.8rem,3.5vw,3rem);margin-bottom:40px">'+(tst.titleHtml||tst.title||'O que dizem')+'</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">'+
      tst.items.map(function(t){
        return '<div class="rv" style="background:var(--bg);border:1px solid var(--border);padding:28px">'+
          '<div style="color:var(--accent);margin-bottom:12px">★★★★★</div>'+
          '<div style="font-family:var(--font-d);font-style:italic;font-size:1rem;color:var(--text);line-height:1.65;margin-bottom:14px">&ldquo;'+(t.text||t.quote||'')+'&rdquo;</div>'+
          '<div style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">'+(t.name||'')+'</div>'+
        '</div>';
      }).join('')+'</div></div>';
  }

  // ── CONTATO ───────────────────────────────────────
  if(ct.title && !ct.titleHtml && /[<>]/.test(ct.title)) ct.titleHtml = ct.title;
  if(g('ct-eyebrow')) g('ct-eyebrow').textContent = ct.eyebrow||'Contato';
  if(g('ct-title'))   g('ct-title').innerHTML = ct.titleHtml||ct.title||'Fale conosco';

  if(g('ct-infos')){
    var blocks='';
    if(ph)         blocks+='<div class="info-block"><div class="info-label">Telefone</div><div class="info-val">'+ph+'</div></div>';
    if(ct.address) blocks+='<div class="info-block"><div class="info-label">Endereço</div><div class="info-val">'+ct.address+'</div></div>';
    if(ct.hours)   blocks+='<div class="info-block"><div class="info-label">Horário</div><div class="info-val">'+ct.hours+'</div></div>';
    g('ct-infos').innerHTML = blocks;
  }

  if(g('ct-wpp')){
    var wmsg = encodeURIComponent('Olá! Vi o site da '+bName+' e gostaria de saber mais sobre as coleções!');
    var wlabel = (h.ctaPrimary && h.ctaPrimary.label)||'Falar no WhatsApp';
    if(wn){
      g('ct-wpp').innerHTML = '<a class="btn-wpp" href="https://wa.me/'+wn+'?text='+wmsg+'" target="_blank" rel="noopener">'+
        '<span class="btn-wpp-ico">'+ico('wpp')+'</span>'+wlabel+'</a>'+
        '<span style="font-size:.8rem;color:var(--muted)">Respondemos rápido! ✦</span>';
    } else if(ph){
      g('ct-wpp').innerHTML = '<a class="btn-wpp" href="tel:'+ph+'">'+ico('phone')+' Ligar agora</a>';
    }
  }

  if(g('ct-map') && ct.mapsEmbed){
    g('ct-map').style.display='';
    g('ct-map').innerHTML='<iframe src="'+ct.mapsEmbed+'" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>';
  }

  // ── FOOTER ────────────────────────────────────────
  var fo = S.footer||{};
  var ftEl = g('footer');
  if(ftEl){
    ftEl.innerHTML='<span class="ft-brand">'+bHtml+'</span>'+
      (fo.tagline?'<span class="ft-tagline">'+fo.tagline+'</span>':'<span></span>')+
      '<span class="ft-copy">© '+new Date().getFullYear()+'</span>';
  }

  // ── REVEAL ───────────────────────────────────────
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('on'); obs.unobserve(e.target); }
    });
  },{threshold:0.08, rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv,.rv2').forEach(function(el){ obs.observe(el); });

  // ── COUNTERS (só para sufixos simples como + ou %) ───────────────
  var obsN = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      var el=e.target; var target=+(el.dataset.target||0);
      var suf=el.dataset.suffix||'';
      var v=0; var inc=target/60;
      var t=setInterval(function(){ v=Math.min(v+inc,target); el.textContent=Math.floor(v)+suf; if(v>=target)clearInterval(t); },16);
      obsN.unobserve(el);
    });
  },{threshold:0.5});
  document.querySelectorAll('[data-target]').forEach(function(el){ obsN.observe(el); });
})();
</script>
</body>
</html>
