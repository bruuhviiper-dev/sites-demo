<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boutique</title>
<meta name="description" content="Boutique" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF6F4; --bg-alt: #F2EBE7; --surface: #FFFFFF;
  --accent: #C97070; --accent2: #EBC8C8;
  --text: #1E1614; --muted: #8A7A76; --border: #E8DDD8;
  --font-d: "Playfair Display", serif;
  --font-b: "DM Sans", sans-serif;
  --ease: cubic-bezier(.16,.84,.34,1);
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 16px; line-height: 1.65; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px clamp(20px,5vw,64px);
  background: transparent; border-bottom: 1px solid transparent;
  transition: background .4s, border-color .4s, box-shadow .4s;
}
nav.up { background: var(--bg); border-color: var(--border); box-shadow: 0 2px 20px rgba(0,0,0,.06); }
.nav-brand { font-family: var(--font-d); font-size: 1.2rem; font-style: italic; letter-spacing: .02em; color: var(--text); }
.nav-links { display: flex; gap: 28px; align-items: center; font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.nav-links a { transition: color .25s; }
.nav-links a:hover { color: var(--accent); }
.nav-phone { display: flex; align-items: center; gap: 8px; color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 100px; transition: border-color .3s, color .3s; }
.nav-phone:hover { border-color: var(--accent); color: var(--accent); }

/* HERO */
#hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
  overflow: hidden;
}
.hero-text {
  padding: clamp(100px,14vw,160px) clamp(32px,6vw,72px) calc(clamp(64px,8vw,100px) + 44px);
  display: flex; flex-direction: column; justify-content: center;
  position: relative; z-index: 2;
}
.hero-image {
  background: var(--bg-alt);
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.hero-image-label {
  position: absolute; top: 32px; right: 32px;
  background: var(--accent); color: var(--bg);
  font-size: .65rem; letter-spacing: .18em; text-transform: uppercase;
  padding: 8px 14px;
}
.hero-image-ph {
  font-family: var(--font-d); font-style: italic; font-size: clamp(1rem,2vw,1.6rem);
  color: var(--muted); opacity: .3; text-align: center; padding: 32px; line-height: 1.4;
}
.hero-eyebrow { font-size: .68rem; letter-spacing: .3em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
.hero-title { font-family: var(--font-d); font-style: italic; font-weight: 400; font-size: clamp(2.8rem,5vw,4.6rem); line-height: 1.07; color: var(--text); margin-bottom: 24px; }
.hero-title em { color: var(--accent); font-style: italic; }
.hero-sub { font-size: .97rem; color: var(--muted); max-width: 380px; margin-bottom: 16px; line-height: 1.75; }
.hero-badge { display: inline-flex; align-items: center; gap: 6px; font-size: .76rem; color: var(--muted); margin-bottom: 36px; }
.hero-badge strong { color: var(--text); font-size: .84rem; }
.ctas { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-primary { display: inline-flex; align-items: center; gap: 10px; background: var(--accent); color: var(--bg); padding: 14px 28px; font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; border: none; cursor: pointer; transition: opacity .25s; }
.btn-primary:hover { opacity: .88; }
.btn-ghost { display: inline-flex; align-items: center; gap: 8px; color: var(--text); border: 1px solid var(--border); padding: 13px 26px; font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; transition: border-color .3s; }
.btn-ghost:hover { border-color: var(--text); }

/* MARQUEE */
.marquee-band { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; background: var(--text); overflow: hidden; display: flex; align-items: center; }
.marquee-track { display: flex; white-space: nowrap; animation: mq 30s linear infinite; }
.marquee-track span { display: inline-block; padding: 0 20px; font-size: .68rem; letter-spacing: .2em; text-transform: uppercase; color: var(--bg); opacity: .8; }
.marquee-track .dot { color: var(--accent2); opacity: 1; font-size: .9rem; padding: 0 6px; }
@keyframes mq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* SOBRE */
#sobre { background: var(--surface); padding: clamp(64px,10vw,120px) clamp(20px,6vw,80px); }
.sobre-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: clamp(40px,6vw,80px); align-items: start; }
.section-eyebrow { font-size: .68rem; letter-spacing: .3em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
.section-title { font-family: var(--font-d); font-style: italic; font-weight: 400; font-size: clamp(2rem,3.8vw,3rem); line-height: 1.1; color: var(--text); margin-bottom: 24px; }
.section-title em { color: var(--accent); font-style: italic; }
.sobre-para { color: var(--muted); font-size: .96rem; line-height: 1.8; margin-bottom: 14px; }
.stats-row { display: flex; gap: 0; margin-top: 36px; border: 1px solid var(--border); }
.stat-item { flex: 1; text-align: center; padding: 24px 16px; border-right: 1px solid var(--border); }
.stat-item:last-child { border-right: none; }
.stat-num { font-family: var(--font-d); font-size: 2.2rem; font-weight: 400; color: var(--text); line-height: 1; }
.stat-label { font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
.certs-list { display: grid; grid-template-columns: 1fr; gap: 10px; padding-top: 8px; }
.cert-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; border: 1px solid var(--border); background: var(--bg); font-size: .9rem; color: var(--text); line-height: 1.4; }
.cert-icon { flex-shrink: 0; width: 18px; height: 18px; color: var(--accent); margin-top: 2px; }

/* COLEÇÕES */
#colecoes { padding: 0; }
.colecoes-header { max-width: 1100px; margin: 0 auto; padding: clamp(64px,10vw,100px) clamp(20px,6vw,80px) clamp(32px,4vw,48px); display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; }
.colecoes-header-text .section-title { margin-bottom: 0; }
.col-cta-link { font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); display: inline-flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--accent); padding-bottom: 2px; white-space: nowrap; }
.collections-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
.col-card { position: relative; aspect-ratio: 2/3; overflow: hidden; cursor: pointer; background: var(--bg-alt); }
.col-bg { position: absolute; inset: 0; transition: transform .6s var(--ease); }
.col-card:hover .col-bg { transform: scale(1.04); }
.col-card-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-d); font-style: italic; font-size: clamp(.9rem,1.5vw,1.2rem); color: var(--muted); opacity: .28; text-align: center; padding: 24px; pointer-events: none; }
.col-card-tag { position: absolute; top: 16px; left: 16px; background: var(--bg); font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; color: var(--text); padding: 6px 12px; z-index: 2; }
.col-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: clamp(18px,2.5vw,28px); background: linear-gradient(to top, var(--accent) 0%, transparent 100%); opacity: 0; transition: opacity .45s var(--ease); z-index: 3; }
.col-card:hover .col-overlay { opacity: 1; }
.col-name { font-family: var(--font-d); font-style: italic; font-size: clamp(1.1rem,1.8vw,1.4rem); color: var(--bg); margin-bottom: 4px; }
.col-desc { font-size: .8rem; color: var(--bg); opacity: .85; line-height: 1.5; }
.col-price { margin-top: 10px; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--bg); opacity: .75; }

/* DEPOIMENTOS */
#depoimentos { padding: clamp(64px,10vw,120px) clamp(20px,6vw,80px); background: var(--bg-alt); }
.dep-header { max-width: 1100px; margin: 0 auto; text-align: center; margin-bottom: 40px; }
.testimonials-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 16px; }
.t-card { background: var(--surface); border: 1px solid var(--border); padding: 28px; }
.t-stars { color: var(--accent); font-size: .95rem; margin-bottom: 12px; }
.t-text { font-family: var(--font-d); font-style: italic; font-size: 1rem; color: var(--text); line-height: 1.65; margin-bottom: 16px; }
.t-name { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

/* CONTATO */
#contato { padding: clamp(64px,10vw,120px) clamp(20px,6vw,80px); background: var(--surface); }
.contato-inner { max-width: 680px; margin: 0 auto; text-align: center; }
.contato-info { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 32px 0 36px; }
.info-item { display: flex; align-items: center; gap: 8px; font-size: .86rem; color: var(--muted); }
.info-icon { width: 15px; height: 15px; color: var(--accent); flex-shrink: 0; }
.btn-wpp { display: inline-flex; align-items: center; gap: 12px; background: #25D366; color: #fff; padding: 16px 36px; font-size: .88rem; letter-spacing: .06em; transition: opacity .25s; }
.btn-wpp:hover { opacity: .9; }
.map-wrap { margin-top: 36px; border: 1px solid var(--border); overflow: hidden; }
.map-wrap iframe { width: 100%; height: 280px; border: 0; display: block; }

/* FOOTER */
footer { background: var(--text); color: var(--bg); padding: 44px clamp(20px,6vw,80px); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-brand { font-family: var(--font-d); font-style: italic; font-size: 1.1rem; }
.footer-tagline { font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; opacity: .45; }
.footer-copy { font-size: .7rem; opacity: .35; }

/* REVEAL */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
.reveal.on { opacity: 1; transform: none; }

/* RESPONSIVE */
@media(max-width:860px){
  #hero { grid-template-columns: 1fr; }
  .hero-image { display: none; }
  .hero-text { padding: 110px 24px calc(64px + 44px); }
  .sobre-grid { grid-template-columns: 1fr; }
  .collections-grid { grid-template-columns: repeat(2,1fr); }
  .colecoes-header { flex-direction: column; align-items: flex-start; }
  footer { flex-direction: column; align-items: flex-start; gap: 10px; }
  .nav-links { display: none; }
}
@media(max-width:480px){
  .collections-grid { grid-template-columns: 1fr 1fr; }
  .stats-row { flex-direction: column; }
  .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
  .stat-item:last-child { border-bottom: none; }
}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-links" id="nav-left"></div>
  <a class="nav-brand" href="#" id="nav-brand"></a>
  <div class="nav-links" id="nav-right"></div>
</nav>

<section id="hero">
  <div class="hero-text">
    <span class="hero-eyebrow" id="hero-eyebrow"></span>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-badge" id="hero-badge"></div>
    <div class="ctas" id="hero-ctas"></div>
  </div>
  <div class="hero-image">
    <div class="hero-image-label" id="hero-img-label"></div>
    <div class="hero-image-ph" id="hero-img-ph"></div>
  </div>
  <div class="marquee-band">
    <div class="marquee-track" id="marquee-track"></div>
  </div>
</section>

<section id="sobre"></section>

<section id="colecoes">
  <div class="colecoes-header">
    <div class="colecoes-header-text">
      <div class="section-eyebrow reveal" id="sv-eyebrow"></div>
      <div class="section-title reveal" id="sv-title"></div>
    </div>
    <a class="col-cta-link" href="#contato" id="sv-cta">Ver mais →</a>
  </div>
  <div class="collections-grid" id="collections-grid"></div>
</section>

<section id="depoimentos" style="display:none"></section>

<section id="contato">
  <div class="contato-inner">
    <div class="section-eyebrow reveal" id="ct-eyebrow"></div>
    <div class="section-title reveal" id="ct-title"></div>
    <div class="contato-info reveal" id="ct-info"></div>
    <div class="reveal" id="ct-cta"></div>
    <div class="map-wrap reveal" id="ct-map"></div>
  </div>
</section>

<footer id="footer"></footer>

<script>window.SITE = /*__SITE__*/ null;</script>
<script>
(function(){
  const S = window.SITE;
  const sc = S._scheme || {};
  const ni = S._nicho || {};

  // Fonts
  const fgArr = ni.fontsGoogle || ['Playfair+Display:ital,wght@0,400;0,500;1,400;1,500','DM+Sans:wght@300;400;500'];
  const fl = document.createElement('link');
  fl.rel = 'stylesheet';
  fl.href = 'https://fonts.googleapis.com/css2?family=' + fgArr.join('&family=') + '&display=swap';
  document.head.appendChild(fl);

  // CSS vars
  const R = document.documentElement;
  ['bg','bgAlt','surface','accent','accent2','text','muted','border'].forEach(function(k){
    if(sc[k]) R.style.setProperty('--' + (k==='bgAlt'?'bg-alt':k), sc[k]);
  });
  const fn = ni.fonts || {};
  if(fn.display) R.style.setProperty('--font-d', fn.display);
  if(fn.body)    R.style.setProperty('--font-b', fn.body);

  const bName = (S.brand && S.brand.name) || 'Boutique';
  document.title = bName;
  const dm = document.querySelector('meta[name="description"]');
  if(dm) dm.content = (S.brand && S.brand.tagline) || bName;

  function g(id){ return document.getElementById(id); }

  function svgIcon(k){
    const M = {
      check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
      heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
      sparkle:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>',
      tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>',
      leaf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C8 10 5.9 16.17 3.82 22M9.09 9.91C7.07 12.87 6.56 16.11 6 19c4.17-.53 7.41-1.43 9.7-3"/></svg>',
      star:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      hand:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10V4a2 2 0 0 0-4 0v10"/><path d="M6 14v-4a2 2 0 0 0-4 0v2c0 4.42 3.58 8 8 8h2c3.3 0 6-2.7 6-6v-2a2 2 0 0 0-4 0"/></svg>',
      shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.06 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16.92z"/></svg>',
      map:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
      clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      wpp:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.096.541 4.067 1.484 5.791L0 24l6.387-1.455C8.074 23.494 10.001 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.893 0-3.667-.518-5.184-1.42l-.366-.22-3.788.863.931-3.683-.24-.381A9.944 9.944 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>'
    };
    return M[k] || M.check;
  }

  // ── NAV ──────────────────────────────────────────
  if(g('nav-brand')) g('nav-brand').innerHTML = (S.brand && S.brand.nameHtml) || bName;
  if(g('nav-left'))  g('nav-left').innerHTML  = '<a href="#sobre">Sobre</a><a href="#colecoes">' + ((S.services && S.services.navLabel) || 'Coleções') + '</a>';
  const ph = S.contact && S.contact.phoneDisplay;
  const wn = S.contact && S.contact.whatsapp;
  if(g('nav-right')){
    let r = '<a href="#contato">Contato</a>';
    if(ph) r += '<a class="nav-phone" href="tel:' + (wn || ph) + '"><svg class="info-icon" style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.06 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16.92z"/></svg>' + ph + '</a>';
    g('nav-right').innerHTML = r;
  }
  window.addEventListener('scroll', function(){ g('nav').classList.toggle('up', window.scrollY > 60); });

  // ── HERO ──────────────────────────────────────────
  const h = S.hero || {};
  if(h.title && !h.titleHtml && /[<>]/.test(h.title)) h.titleHtml = h.title;
  const niH = ni.hero || {};

  if(g('hero-eyebrow')) g('hero-eyebrow').textContent = h.eyebrow || niH.eyebrow || '';
  if(g('hero-title'))   g('hero-title').innerHTML     = h.titleHtml || h.title || niH.title || '';
  if(g('hero-sub'))     g('hero-sub').textContent     = h.sub || niH.sub || '';
  if(g('hero-badge') && h.badge) g('hero-badge').innerHTML = '<span>★</span>&nbsp;<strong>' + h.badge + '</strong>';
  if(g('hero-img-label') && h.badge) g('hero-img-label').textContent = h.badge;
  else if(g('hero-img-label')) g('hero-img-label').style.display = 'none';
  if(g('hero-img-ph')) g('hero-img-ph').textContent = bName;

  if(g('hero-ctas')){
    let c = '';
    if(h.ctaPrimary) c += '<a class="btn-primary" href="' + (h.ctaPrimary.href||'#contato') + '">' + h.ctaPrimary.label + ' →</a>';
    if(h.ctaGhost)   c += '<a class="btn-ghost"   href="' + (h.ctaGhost.href||'#colecoes')  + '">' + h.ctaGhost.label + '</a>';
    g('hero-ctas').innerHTML = c;
  }

  // ── MARQUEE ───────────────────────────────────────
  const mt = g('marquee-track');
  if(mt){
    const items = (S.services && S.services.items) || [];
    let txt = items.map(function(it){ return '<span>' + it.name + '</span><span class="dot">·</span>'; }).join('');
    if(!txt) txt = '<span>Nova Coleção</span><span class="dot">·</span><span>Moda Feminina</span><span class="dot">·</span><span>Estilo</span><span class="dot">·</span>';
    mt.innerHTML = txt + txt;
  }

  // ── SOBRE ──────────────────────────────────────────
  const ab = S.about || {};
  if(ab.title && !ab.titleHtml && /[<>]/.test(ab.title)) ab.titleHtml = ab.title;
  const sobreEl = g('sobre');
  if(sobreEl){
    let statsHtml = '';
    if(ab.stats && ab.stats.length){
      statsHtml = '<div class="stats-row">' + ab.stats.map(function(st){
        return '<div class="stat-item reveal"><div class="stat-num" data-target="' + (st.num||0) + '">' + (st.num||'') + (st.suffix||'') + '</div><div class="stat-label">' + (st.label||'') + '</div></div>';
      }).join('') + '</div>';
    }
    let certsHtml = '';
    if(ab.certs && ab.certs.length){
      certsHtml = ab.certs.map(function(c){
        return '<div class="cert-item reveal"><span class="cert-icon">' + svgIcon(c.icon||'check') + '</span><span>' + c.label + '</span></div>';
      }).join('');
    }
    const paras = (ab.paragraphs||[]).map(function(p){ return '<p class="sobre-para reveal">' + p + '</p>'; }).join('');
    sobreEl.innerHTML = '<div class="sobre-grid">' +
      '<div><div class="section-eyebrow reveal">' + (ab.eyebrow||'') + '</div>' +
        '<div class="section-title reveal">' + (ab.titleHtml||ab.title||'') + '</div>' +
        paras + statsHtml + '</div>' +
      '<div><div class="certs-list">' + certsHtml + '</div></div>' +
    '</div>';
  }

  // ── COLEÇÕES ──────────────────────────────────────
  const sv = S.services || {};
  if(sv.title && !sv.titleHtml && /[<>]/.test(sv.title)) sv.titleHtml = sv.title;
  if(g('sv-eyebrow')) g('sv-eyebrow').textContent = sv.eyebrow || 'Coleções';
  if(g('sv-title'))   g('sv-title').innerHTML     = sv.titleHtml || sv.title || 'Encontre o seu estilo';
  if(g('sv-cta'))     g('sv-cta').textContent     = (sv.ctaLabel || 'Falar no WhatsApp') + ' →';

  const cg = g('collections-grid');
  if(cg && sv.items){
    // Soft warm palette for placeholder backgrounds
    const pals = ['#E8D5C0','#D8C8BE','#CABAAD','#DDD0C0','#D0C4B8','#BFAD9E'];
    cg.innerHTML = sv.items.map(function(it,i){
      return '<div class="col-card reveal">' +
        '<div class="col-bg" style="background:' + pals[i%pals.length] + '"></div>' +
        '<div class="col-card-ph">' + it.name + '</div>' +
        '<div class="col-card-tag">' + it.name + '</div>' +
        '<div class="col-overlay">' +
          '<div class="col-name">' + it.name + '</div>' +
          '<div class="col-desc">' + (it.desc||'') + '</div>' +
          (it.price ? '<div class="col-price">' + it.price + '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── DEPOIMENTOS ───────────────────────────────────
  const tst = S.testimonials || {};
  const depEl = g('depoimentos');
  if(depEl && tst.show && tst.items && tst.items.length){
    depEl.style.display = '';
    depEl.innerHTML = '<div class="dep-header"><div class="section-eyebrow reveal">' + (tst.eyebrow||'Depoimentos') + '</div>' +
      '<div class="section-title reveal">' + (tst.titleHtml||tst.title||'O que dizem nossas clientes') + '</div></div>' +
      '<div class="testimonials-grid">' +
      tst.items.map(function(t){
        return '<div class="t-card reveal"><div class="t-stars">★★★★★</div>' +
          '<div class="t-text">&ldquo;' + (t.text||t.quote||'') + '&rdquo;</div>' +
          '<div class="t-name">' + (t.name||'') + '</div></div>';
      }).join('') + '</div>';
  }

  // ── CONTATO ───────────────────────────────────────
  const ct = S.contact || {};
  if(ct.title && !ct.titleHtml && /[<>]/.test(ct.title)) ct.titleHtml = ct.title;
  if(g('ct-eyebrow')) g('ct-eyebrow').textContent = ct.eyebrow || 'Contato';
  if(g('ct-title'))   g('ct-title').innerHTML     = ct.titleHtml || ct.title || 'Fale conosco';

  if(g('ct-info')){
    let info = '';
    if(ct.phoneDisplay) info += '<span class="info-item"><span class="info-icon">' + svgIcon('phone') + '</span>' + ct.phoneDisplay + '</span>';
    if(ct.address)      info += '<span class="info-item"><span class="info-icon">' + svgIcon('map')   + '</span>' + ct.address + '</span>';
    if(ct.hours)        info += '<span class="info-item"><span class="info-icon">' + svgIcon('clock') + '</span>' + ct.hours + '</span>';
    g('ct-info').innerHTML = info;
  }

  if(g('ct-cta')){
    const wmsg = encodeURIComponent('Olá! Vi o site da ' + bName + ' e gostaria de mais informações sobre as coleções.');
    const wlabel = (h.ctaPrimary && h.ctaPrimary.label) || 'Falar no WhatsApp';
    if(wn){
      g('ct-cta').innerHTML = '<a class="btn-wpp" href="https://wa.me/' + wn + '?text=' + wmsg + '" target="_blank" rel="noopener"><span style="width:20px;height:20px;display:inline-flex">' + svgIcon('wpp') + '</span>' + wlabel + '</a>';
    } else {
      g('ct-cta').innerHTML = '<a class="btn-primary" href="tel:' + (ct.phoneDisplay||'') + '">' + wlabel + '</a>';
    }
  }

  if(g('ct-map') && ct.mapsEmbed){
    g('ct-map').innerHTML = '<iframe src="' + ct.mapsEmbed + '" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>';
  }

  // ── FOOTER ────────────────────────────────────────
  const fo = S.footer || {};
  const ftEl = g('footer');
  if(ftEl){
    ftEl.innerHTML = '<span class="footer-brand">' + ((S.brand && S.brand.nameHtml) || bName) + '</span>' +
      (fo.tagline ? '<span class="footer-tagline">' + fo.tagline + '</span>' : '') +
      '<span class="footer-copy">© ' + new Date().getFullYear() + ' · Todos os direitos reservados</span>';
  }

  // ── SCROLL REVEAL ─────────────────────────────────
  const obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('on'); obs.unobserve(e.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(function(el){ obs.observe(el); });

  // Animated counters
  const obsN = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      const el = e.target;
      const target = +(el.dataset.target||0);
      const suffix = el.textContent.replace(/[0-9]/g,'');
      let v = 0; const dur = 1200; const step = 16;
      const inc = target/(dur/step);
      const t = setInterval(function(){
        v = Math.min(v+inc, target);
        el.textContent = Math.floor(v) + suffix;
        if(v >= target) clearInterval(t);
      }, step);
      obsN.unobserve(el);
    });
  }, { threshold: 0.5 });
  document.querySelectorAll('[data-target]').forEach(function(el){ obsN.observe(el); });
})();
</script>
</body>
</html>
