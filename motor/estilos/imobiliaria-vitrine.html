<!DOCTYPE html>
<!--
  ============================================================
  ESTILO: IMOBILIÁRIA VITRINE  (portal claro — catálogo de imóveis)
  Protagonista: GRADE DE IMÓVEIS com filtro (Comprar/Alugar), cards com
  foto, preço, bairro e specs (quartos/banheiros/vagas/área). Hero de
  vitrine com filtro. Claro e moderno (≠ imoveis-premium, que é dark/gold).
  Lê o MESMO window.SITE; usa SITE.imoveis. Acento vem do nicho.
  ============================================================
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" id="meta-desc" content="" />
<title id="meta-title"></title>
<script id="site-data">window.SITE = /*__SITE__*/ null;</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root{
  --bg:#F6F8FB; --bg2:#EEF2F7; --surface:#FFFFFF;
  --ink:#15212E; --ink2:#4A5A6B; --muted:#8593A3; --line:#E3E9F0;
  --accent:#C09B45;
  --display:"Outfit", sans-serif; --sans:"Inter", sans-serif;
  --maxw:1200px; --ease:cubic-bezier(.16,.84,.34,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--bg); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.65; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--display); font-weight:700; line-height:1.12; letter-spacing:-.015em; }
::selection{ background:var(--accent); color:#fff; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-track{ background:var(--bg2); }
::-webkit-scrollbar-thumb{ background:#c5cfda; } ::-webkit-scrollbar-thumb:hover{ background:var(--accent); }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:clamp(22px,5vw,56px); }
.section{ padding-block:clamp(60px,8vw,116px); }
.kicker{ font-family:var(--display); font-weight:600; font-size:.72rem; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:10px; }
.kicker::before{ content:""; width:24px; height:2px; background:var(--accent); display:inline-block; }
.sec-title{ font-size:clamp(1.9rem,4.4vw,3.2rem); font-weight:700; margin-top:12px; }
.sec-title em{ font-style:normal; color:var(--accent); }
.sec-intro{ color:var(--ink2); max-width:560px; margin-top:12px; font-size:1.04rem; }

.btn{ font-family:var(--display); font-weight:600; font-size:.9rem; padding:14px 26px; border-radius:10px; display:inline-flex; align-items:center; gap:9px; border:1px solid transparent; cursor:pointer; transition:all .25s var(--ease); }
.btn svg{ width:17px; height:17px; }
.btn--solid{ background:var(--accent); color:#fff; }
.btn--solid:hover{ filter:brightness(.93); transform:translateY(-1px); }
.btn--ghost{ background:var(--surface); border-color:var(--line); color:var(--ink); }
.btn--ghost:hover{ border-color:var(--accent); color:var(--accent); }

/* LOADER */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--ink); display:grid; place-items:center; transition:opacity .8s var(--ease), visibility .8s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld{ font-family:var(--display); font-weight:800; font-size:clamp(2.2rem,7vw,3.6rem); color:#fff; overflow:hidden; }
.ld span{ display:inline-block; transform:translateY(110%); animation:ldup .9s var(--ease) forwards; }
.ld span:nth-child(2){ animation-delay:.12s; }
@keyframes ldup{ to{ transform:none; } }

/* HEADER */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .4s var(--ease), border-color .4s, padding .4s; border-bottom:1px solid transparent; }
.header.scrolled{ background:rgba(246,248,251,.9); backdrop-filter:blur(14px); border-bottom-color:var(--line); }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:20px; }
.header.scrolled .nav{ padding-block:13px; }
.brand{ font-family:var(--display); font-weight:800; font-size:1.4rem; letter-spacing:-.02em; line-height:1; }
.brand b{ color:var(--accent); }
.brand .tag{ display:block; font-family:var(--sans); font-size:.56rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-top:4px; font-weight:500; }
.nav-links{ display:flex; align-items:center; gap:30px; }
.nav-links a{ font-size:.86rem; font-weight:400; color:var(--ink2); transition:color .25s; }
.nav-links a:hover{ color:var(--accent); }
.nav-right{ display:flex; align-items:center; gap:18px; }
.burger{ display:none; width:42px; height:42px; border-radius:10px; background:var(--surface); border:1px solid var(--line); position:relative; z-index:1100; cursor:pointer; }
.burger span{ position:absolute; left:11px; width:20px; height:2px; border-radius:2px; background:var(--ink); transition:.35s var(--ease); }
.burger span:nth-child(1){ top:16px; } .burger span:nth-child(2){ top:24px; }
.burger.open span:nth-child(1){ top:20px; transform:rotate(45deg); background:var(--accent); }
.burger.open span:nth-child(2){ top:20px; transform:rotate(-45deg); background:var(--accent); }
@media (max-width:900px){
  .burger{ display:grid; place-items:center; }
  .nav-links{ position:fixed; inset:0; flex-direction:column; justify-content:center; gap:26px; background:var(--bg); transform:translateX(100%); transition:transform .45s var(--ease); }
  .nav-links.open{ transform:none; }
  .nav-links a{ font-size:1.5rem; font-family:var(--display); font-weight:600; color:var(--ink); }
  .nav-right .btn{ display:none; }
}

/* HERO vitrine */
.hero{ padding-top:clamp(110px,14vw,150px); padding-bottom:clamp(8px,2vw,20px); }
.hero h1{ font-size:clamp(2.2rem,5vw,3.8rem); font-weight:800; line-height:1.08; margin:14px 0 18px; max-width:18ch; }
.hero h1 em{ font-style:normal; color:var(--accent); }
.hero-lead{ color:var(--ink2); font-size:1.12rem; max-width:540px; margin-bottom:26px; }
.hero-search{ display:inline-flex; flex-wrap:wrap; gap:8px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:8px; box-shadow:0 30px 60px -40px rgba(21,33,46,.4); }
.hero-search button{ font-family:var(--display); font-weight:600; font-size:.9rem; padding:12px 22px; border-radius:9px; border:none; background:transparent; color:var(--ink2); cursor:pointer; transition:.2s; display:inline-flex; align-items:center; gap:8px; }
.hero-search button svg{ width:17px; height:17px; }
.hero-search button:hover{ color:var(--accent); }
.hero-search button.on{ background:var(--accent); color:#fff; }

/* CATÁLOGO DE IMÓVEIS */
.imv-filters{ display:flex; flex-wrap:wrap; gap:9px; margin-top:clamp(28px,4vw,44px); }
.imv-filters button{ font-family:var(--display); font-weight:600; font-size:.84rem; padding:9px 18px; border-radius:30px; border:1px solid var(--line); background:var(--surface); color:var(--ink2); cursor:pointer; transition:.2s; }
.imv-filters button.on,.imv-filters button:hover{ background:var(--accent); border-color:var(--accent); color:#fff; }
.imv-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:26px; }
.imv{ background:var(--surface); border:1px solid var(--line); border-radius:16px; overflow:hidden; transition:transform .3s var(--ease), box-shadow .3s; }
.imv:hover{ transform:translateY(-5px); box-shadow:0 30px 50px -30px rgba(21,33,46,.35); }
.imv-img{ position:relative; aspect-ratio:4/3; background:linear-gradient(135deg,var(--bg2),#dde5ee); overflow:hidden; }
.imv-img img{ width:100%; height:100%; object-fit:cover; }
.imv-ph{ position:absolute; inset:0; display:grid; place-items:center; color:#b9c4d1; }
.imv-ph svg{ width:54px; height:54px; }
.imv-tag{ position:absolute; top:12px; left:12px; font-family:var(--display); font-weight:600; font-size:.72rem; background:var(--accent); color:#fff; padding:5px 12px; border-radius:30px; }
.imv-price{ position:absolute; bottom:12px; left:12px; font-family:var(--display); font-weight:700; font-size:1.15rem; color:#fff; background:rgba(21,33,46,.72); padding:6px 14px; border-radius:9px; backdrop-filter:blur(4px); }
.imv-body{ padding:20px; }
.imv-tipo{ font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); font-weight:600; font-family:var(--display); }
.imv-body h3{ font-size:1.18rem; font-weight:600; margin:6px 0 8px; }
.imv-loc{ display:flex; align-items:center; gap:6px; color:var(--ink2); font-size:.9rem; }
.imv-loc svg{ width:15px; height:15px; color:var(--accent); }
.imv-specs{ display:flex; flex-wrap:wrap; gap:14px; margin:14px 0; padding-top:14px; border-top:1px solid var(--line); }
.imv-specs span{ display:inline-flex; align-items:center; gap:6px; font-size:.86rem; color:var(--ink2); }
.imv-specs svg{ width:17px; height:17px; color:var(--muted); }
.imv-cta{ display:inline-flex; align-items:center; gap:8px; font-family:var(--display); font-weight:600; font-size:.86rem; color:var(--accent); }
.imv-cta:hover{ gap:12px; }
.imv-cta svg{ width:16px; height:16px; }
.imv-empty{ color:var(--muted); padding:40px 0; }
@media (max-width:980px){ .imv-grid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:600px){ .imv-grid{ grid-template-columns:1fr; } }

/* SOBRE */
.about{ background:var(--surface); }
.about-grid{ display:grid; grid-template-columns:1fr 1fr; gap:clamp(36px,6vw,80px); align-items:center; }
.about-media{ position:relative; aspect-ratio:4/3; background:linear-gradient(135deg,var(--bg2),#dde5ee); border-radius:18px; overflow:hidden; }
.about-media img{ width:100%; height:100%; object-fit:cover; }
.about-media .ml{ position:absolute; inset:0; display:grid; place-items:center; font-family:var(--display); font-weight:800; font-size:2.6rem; color:#b9c4d1; }
.about-text h2{ font-size:clamp(1.8rem,4vw,3rem); margin:12px 0 18px; }
.about-text p{ color:var(--ink2); margin-bottom:14px; max-width:540px; }
.about-stats{ display:flex; flex-wrap:wrap; gap:clamp(24px,4vw,48px); margin:28px 0; }
.about-stats .n{ font-family:var(--display); font-weight:800; font-size:clamp(1.9rem,4vw,2.7rem); color:var(--accent); line-height:1; }
.about-stats .l{ font-size:.78rem; color:var(--muted); margin-top:6px; }
.about-tags{ display:flex; flex-wrap:wrap; gap:9px; }
.about-tags span{ font-size:.8rem; padding:8px 15px; border:1px solid var(--line); border-radius:8px; color:var(--ink2); background:var(--bg); display:inline-flex; align-items:center; gap:8px; }
.about-tags span svg{ width:15px; height:15px; color:var(--accent); }
@media (max-width:900px){ .about-grid{ grid-template-columns:1fr; gap:34px; } .about-media{ max-width:460px; } }

/* PROCESSO */
.proc-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:clamp(18px,3vw,30px); margin-top:clamp(30px,4vw,48px); }
.proc-step{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:24px; }
.proc-n{ font-family:var(--display); font-weight:800; font-size:1.8rem; color:var(--accent); }
.proc-step h3{ font-size:1.1rem; font-weight:600; margin:6px 0 7px; }
.proc-step p{ color:var(--ink2); font-size:.92rem; }
@media (max-width:760px){ .proc-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:460px){ .proc-grid{ grid-template-columns:1fr; } }

/* DEPOIMENTOS */
.quotes{ background:var(--ink); color:#fff; text-align:center; }
.quotes .kicker{ color:var(--accent); } .quotes .kicker::before{ background:var(--accent); }
.qmark{ font-family:var(--display); font-weight:800; font-size:4rem; line-height:.6; color:var(--accent); }
.qtrack{ max-width:800px; margin:0 auto; overflow:hidden; }
.qslides{ display:flex; transition:transform .7s var(--ease); }
.qslide{ min-width:100%; }
.qquote{ font-family:var(--display); font-weight:500; font-size:clamp(1.35rem,3vw,2.05rem); line-height:1.45; }
.qauthor{ margin-top:24px; font-size:.82rem; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); font-weight:600; }
.qauthor span{ display:block; color:#9fb0c2; margin-top:5px; letter-spacing:.02em; font-weight:400; text-transform:none; }
.qdots{ display:flex; gap:10px; justify-content:center; margin-top:32px; }
.qdots button{ width:8px; height:8px; border-radius:50%; border:none; background:#41556a; cursor:pointer; transition:.3s; }
.qdots button.active{ background:var(--accent); width:26px; border-radius:8px; }

/* CONTATO */
.contact-grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(36px,6vw,72px); margin-top:46px; }
.cform{ display:grid; gap:18px; }
.fld label{ display:block; font-size:.74rem; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.fld input,.fld select,.fld textarea{ width:100%; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:13px 14px; font-family:var(--sans); font-size:1rem; font-weight:300; color:var(--ink); transition:border-color .3s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); }
.fld textarea{ resize:vertical; min-height:92px; }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.cmsg{ font-size:.86rem; color:var(--accent); min-height:18px; }
.cinfo{ display:grid; gap:4px; align-content:start; }
.cinfo .it{ padding:17px 0; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:flex-start; }
.cinfo .it h4{ font-family:var(--display); font-weight:600; font-size:.72rem; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.cinfo .it p{ font-size:1rem; color:var(--ink); }
.cinfo .it svg{ width:20px; height:20px; color:var(--accent); flex-shrink:0; margin-top:3px; }
.cmap{ margin-top:8px; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.cmap iframe{ width:100%; height:200px; border:0; display:block; filter:grayscale(.3); }
@media (max-width:900px){ .contact-grid{ grid-template-columns:1fr; } .frow{ grid-template-columns:1fr; } }

.wa{ position:fixed; right:22px; bottom:22px; z-index:800; width:56px; height:56px; border-radius:50%; background:#25D366; display:grid; place-items:center; box-shadow:0 10px 26px -8px rgba(37,211,102,.55); transition:transform .3s; }
.wa:hover{ transform:scale(1.08); } .wa svg{ width:28px; height:28px; fill:#fff; }

/* FOOTER */
.footer{ background:var(--ink); color:#fff; padding-block:58px 26px; text-align:center; }
.footer .fmark{ font-family:var(--display); font-weight:800; font-size:clamp(2rem,5vw,3.2rem); }
.footer .ftag{ color:#9fb0c2; max-width:440px; margin:12px auto 26px; font-size:1.05rem; }
.fnav{ display:flex; gap:24px; justify-content:center; flex-wrap:wrap; margin-bottom:22px; }
.fnav a{ font-size:.8rem; color:#9fb0c2; } .fnav a:hover{ color:var(--accent); }
.fsoc{ display:flex; gap:12px; justify-content:center; margin-bottom:24px; }
.fsoc a{ width:40px; height:40px; border:1px solid #2c3e50; border-radius:10px; display:grid; place-items:center; transition:.3s; }
.fsoc a svg{ width:17px; height:17px; color:#9fb0c2; }
.fsoc a:hover{ border-color:var(--accent); } .fsoc a:hover svg{ color:var(--accent); }
.fcopy{ font-size:.76rem; color:#7c8ea0; border-top:1px solid #243648; padding-top:22px; }

[data-rev]{ opacity:0; transform:translateY(26px); transition:opacity .9s var(--ease), transform .9s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.08s; } [data-rev][data-d="2"]{ transition-delay:.16s; } [data-rev][data-d="3"]{ transition-delay:.24s; }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } [data-rev]{ opacity:1; transform:none; } }
</style>
</head>
<body>
  <div id="loader"><div class="ld"></div></div>
  <header class="header" id="header"></header>
  <main id="app"></main>
  <footer class="footer" id="footer"></footer>
  <a class="wa" id="wa" target="_blank" rel="noopener" aria-label="WhatsApp" style="display:none"><svg viewBox="0 0 32 32"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.7 1.9 6.7L3 29l7-1.8c1.9 1 4 1.6 6 1.6 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-4.1 1.1 1.1-4-.3-.4a10 10 0 01-1.6-5.4C5.6 9.8 10.2 5.3 16 5.3s10.4 4.5 10.4 10.2S21.8 25.7 16 25.7zm5.7-7.6c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-.9 1.2-.3.2-.6.1a8.3 8.3 0 01-2.4-1.5 9 9 0 01-1.7-2.1c-.2-.3 0-.5.1-.6l.5-.5.3-.5a.5.5 0 000-.5l-1-2.3c-.3-.6-.5-.5-.7-.5h-.6a1.1 1.1 0 00-.8.4 3.3 3.3 0 00-1 2.5c0 1.5 1.1 2.9 1.2 3.1s2.1 3.3 5.2 4.6c.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4s.3-1.3.2-1.4-.3-.2-.5-.4z"/></svg></a>

<script>
(function(){
  "use strict";
  var S = window.SITE;
  if(!S){ document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Erro: SITE não injetado.</p>'; return; }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function ini(n){ return (n||'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'•'; }

  ['hero','about','imoveis','testimonials','instagram','contact','footer','process'].forEach(function(k){
    var o=S[k]; if(o && o.title && !o.titleHtml && /[<>]/.test(o.title)){ o.titleHtml=o.title; }
  });

  var ICONS={
    home:'<path d="M4 11l8-7 8 7M6 10v9h12v-9"/>',
    building:'<rect x="5" y="3" width="14" height="18" rx="1"/><path d="M9 7h.01M15 7h.01M9 11h.01M15 11h.01M9 15h6"/>',
    bed:'<path d="M3 18v-6h18v6M3 12V8a2 2 0 012-2h6v6M21 12V9a2 2 0 00-2-2h-3v5M3 18v2M21 18v2"/>',
    bath:'<path d="M4 12h16v3a4 4 0 01-4 4H8a4 4 0 01-4-4v-3zM7 12V6a2 2 0 012-2 2 2 0 012 2"/>',
    car:'<path d="M5 11l1.5-4.5A2 2 0 018.4 5h7.2a2 2 0 011.9 1.5L19 11M5 11h14v5H5zM7 16v2M17 16v2"/>',
    ruler:'<path d="M4 16L16 4l4 4L8 20zM9 9l2 2M12 6l2 2M6 12l2 2"/>',
    pin:'<path d="M12 21s-7-4.5-7-10a7 7 0 1114 0c0 5.5-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/>',
    key:'<circle cx="8" cy="8" r="4"/><path d="M11 11l9 9M17 17l2-2M14 14l2-2"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
    scale:'<path d="M12 3v18M7 21h10M12 7l-6 1.6 2.4 5.4a2.8 2.8 0 01-4.8 0L6 8.6M12 7l6 1.6-2.4 5.4a2.8 2.8 0 004.8 0L18 8.6"/>',
    hand:'<path d="M7 11V6a1.5 1.5 0 013 0v4m0-1V4.5a1.5 1.5 0 013 0V10m0-1a1.5 1.5 0 013 0V14c0 3-2 6-6 6h-1c-2 0-3-1-4-2l-3-3a1.5 1.5 0 012-2l1.5 1.5"/>',
    check:'<path d="M5 12l5 5L20 7"/>',
    heart:'<path d="M12 20s-7-4.5-7-9a4 4 0 017-2 4 4 0 017 2c0 4.5-7 9-7 9z"/>',
    star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6-5.3-2.9-5.3 2.9 1.1-6L3.4 9.4l6-.8z"/>',
    phone:'<path d="M5 4h3l2 5-2 1a11 11 0 005 5l1-2 5 2v3a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'
  };
  function svg(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||ICONS.check)+'</svg>'; }
  var IGS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>';
  var WAS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/></svg>';
  var MS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
  var ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

  var acc = (S.theme && S.theme.accent) || '#C09B45';
  document.documentElement.style.setProperty('--accent', acc);

  document.getElementById('meta-title').textContent = (S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Imobiliária';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{}, h=S.hero||{}, a=S.about||{}, c=S.contact||{};
  var im=S.imoveis||{};
  var hasImoveis = im.show!==false && im.items && im.items.length;
  document.querySelector('.ld').innerHTML = ini(b.name).split('').map(function(ch){return '<span>'+esc(ch)+'</span>';}).join('');

  var nav=[{id:'inicio',label:'Início'}];
  if(hasImoveis) nav.push({id:'imoveis',label:(im.navLabel||'Imóveis')});
  if(S.about) nav.push({id:'sobre',label:'Sobre'});
  if(S.process&&S.process.steps&&S.process.steps.length) nav.push({id:'processo',label:(S.process.navLabel||'Como funciona')});
  nav.push({id:'contato',label:'Contato'});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';
  document.getElementById('header').innerHTML='<div class="container nav">'+brandHtml+
    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right"><a href="#contato" class="btn btn--solid">'+esc((h.ctaAgendar)||'Fale conosco')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):(c.instagramUrl||'#');
  var html='';

  /* HERO vitrine */
  var searchBar = hasImoveis ? '<div class="hero-search">'+
      '<button data-hf="todos" class="on">'+svg('home')+'Todos</button>'+
      '<button data-hf="venda">'+svg('key')+'Comprar</button>'+
      '<button data-hf="aluguel">'+svg('building')+'Alugar</button>'+
    '</div>' : '';
  html+='<section class="hero" id="inicio"><div class="container">'+
    '<span class="kicker">'+esc(h.eyebrow||'Imobiliária')+'</span>'+
    '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
    (h.sub?'<p class="hero-lead">'+esc(h.sub)+'</p>':'')+
    searchBar+
    '</div></section>';

  /* CATÁLOGO DE IMÓVEIS (protagonista) */
  if(hasImoveis){
    var filtros = im.filtros || [{key:'todos',label:'Todos'}];
    var cards = im.items.map(function(it){
      var cat = it.tag || (it.finalidade?String(it.finalidade).toLowerCase():'todos');
      var img = it.image ? '<img loading="lazy" src="'+esc(it.image)+'" alt="'+esc(it.titulo)+'">' : '<span class="imv-ph">'+svg('home')+'</span>';
      var specs = '';
      if(it.quartos) specs+='<span>'+svg('bed')+esc(it.quartos)+'</span>';
      if(it.banheiros) specs+='<span>'+svg('bath')+esc(it.banheiros)+'</span>';
      if(it.vagas) specs+='<span>'+svg('car')+esc(it.vagas)+'</span>';
      if(it.area) specs+='<span>'+svg('ruler')+esc(it.area)+'</span>';
      var cta = (waLink!=='#') ? (waLink+'?text='+encodeURIComponent('Olá! Tenho interesse no imóvel: '+(it.titulo||'')+(it.bairro?' ('+it.bairro+')':'')+'.')) : '#contato';
      return '<article class="imv" data-cat="'+esc(cat)+'" data-rev>'+
        '<div class="imv-img">'+img+(it.finalidade?'<span class="imv-tag">'+esc(it.finalidade)+'</span>':'')+(it.preco?'<span class="imv-price">'+esc(it.preco)+'</span>':'')+'</div>'+
        '<div class="imv-body">'+(it.tipo?'<span class="imv-tipo">'+esc(it.tipo)+'</span>':'')+
        '<h3>'+esc(it.titulo)+'</h3>'+
        (it.bairro?'<p class="imv-loc">'+svg('pin')+esc(it.bairro)+'</p>':'')+
        (specs?'<div class="imv-specs">'+specs+'</div>':'')+
        '<a class="imv-cta" href="'+esc(cta)+'" target="_blank" rel="noopener">Tenho interesse '+ARR+'</a>'+
        '</div></article>';
    }).join('');
    html+='<section class="section" id="imoveis"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(im.eyebrow||'Imóveis')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(im.titleHtml||esc(im.title||'Imóveis disponíveis'))+'</h2>'+
      (im.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(im.intro)+'</p>':'')+
      '<div class="imv-filters" data-rev data-d="1">'+filtros.map(function(f,i){return '<button class="'+(i===0?'on':'')+'" data-f="'+esc(f.key)+'">'+esc(f.label)+'</button>';}).join('')+'</div>'+
      '<div class="imv-grid" id="imvGrid">'+cards+'</div>'+
      '<p class="imv-empty" id="imvEmpty" style="display:none">Nenhum imóvel nesta categoria no momento. Fale com a gente!</p>'+
      '</div></section>';
  }

  /* SOBRE */
  if(S.about){
    var media = a.image ? '<img loading="lazy" src="'+esc(a.image)+'" alt="'+esc(b.name)+'">' : '<span class="ml">'+esc(ini(b.name))+'</span>';
    html+='<section class="section about" id="sobre"><div class="container about-grid">'+
      '<div class="about-media" data-rev>'+media+'</div>'+
      '<div class="about-text"><span class="kicker" data-rev>'+esc(a.eyebrow||'Sobre')+'</span>'+
      '<h2 data-rev data-d="1">'+(a.titleHtml||esc(a.title))+'</h2>'+
      (a.paragraphs||[]).map(function(p){return '<p data-rev data-d="1">'+esc(p)+'</p>';}).join('')+
      (a.stats&&a.stats.length?'<div class="about-stats" data-rev data-d="2">'+a.stats.map(function(s){var nn=String(s.num),num=/^\d+$/.test(nn);return '<div><div class="n"'+(num?' data-count="'+esc(nn)+'"':'')+(s.suffix?' data-suffix="'+esc(s.suffix)+'"':'')+'>'+(num?'0':esc(nn)+(s.suffix?esc(s.suffix):''))+'</div><div class="l">'+esc(s.label)+'</div></div>';}).join('')+'</div>':'')+
      (a.certs&&a.certs.length?'<div class="about-tags" data-rev data-d="2">'+a.certs.map(function(ct){return '<span>'+svg(ct.icon||'check')+esc(ct.label||ct)+'</span>';}).join('')+'</div>':'')+
      '</div></div></section>';
  }

  /* PROCESSO */
  if(S.process&&S.process.steps&&S.process.steps.length){
    var pc=S.process;
    html+='<section class="section" id="processo"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(pc.eyebrow||'Como funciona')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(pc.titleHtml||esc(pc.title||'Como funciona'))+'</h2>'+
      (pc.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(pc.intro)+'</p>':'')+'</div>'+
      '<div class="proc-grid">'+
      pc.steps.map(function(s,i){return '<div class="proc-step" data-rev'+(i?' data-d="'+Math.min(i,3)+'"':'')+'><div class="proc-n">'+esc(s.n||('0'+(i+1)).slice(-2))+'</div><h3>'+esc(s.name)+'</h3><p>'+esc(s.desc)+'</p></div>';}).join('')+
      '</div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section quotes" id="depoimentos"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<div class="qmark" data-rev>&ldquo;</div>'+
      '<div class="qtrack" data-rev data-d="1"><div class="qslides" id="qslides">'+
      te.items.map(function(it){return '<div class="qslide"><p class="qquote">'+esc(it.quote||it.text)+'</p><div class="qauthor">'+esc(it.name)+'<span>'+esc(it.meta||'')+'</span></div></div>';}).join('')+
      '</div></div><div class="qdots" id="qdots"></div></div></section>';
  }

  /* CONTATO */
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener">'+WAS+'<div><h4>'+(c.whatsapp?'WhatsApp':'Telefone')+'</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.address) info+='<div class="it">'+svg('pin')+'<div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it">'+svg('clock')+'<div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';
  var map=c.mapsEmbed?'<div class="cmap"><iframe loading="lazy" src="'+esc(c.mapsEmbed)+'"></iframe></div>':'';
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+
    '<h2 class="sec-title" data-rev data-d="1">'+(c.titleHtml||esc(c.title||'Encontre o seu imóvel'))+'</h2>'+
    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      '<div class="fld"><label>Interesse</label><select name="servico"><option value="">Selecione</option><option>Comprar</option><option>Alugar</option><option>Vender / Anunciar</option><option>Avaliar imóvel</option></select></div></div>'+
      '<div class="fld"><label>Mensagem</label><textarea name="msg" placeholder="O que você procura?"></textarea></div>'+
      '<button type="submit" class="btn btn--solid" id="cbtn" style="justify-self:start">Enviar mensagem '+ARR+'</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cinfo" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  var foot=S.footer||{};
  var soc='';
  if(S.instagram&&S.instagram.url) soc+='<a href="'+esc(S.instagram.url)+'" target="_blank" rel="noopener" aria-label="Instagram">'+IGS+'</a>';
  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="fmark">'+esc(b.name)+'</div>'+
    (foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    (soc?'<div class="fsoc">'+soc+'</div>':'')+
    '<p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* INTERAÇÕES */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});

  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(x){ x.addEventListener('click',function(){ tm(false); }); });

  /* FILTRO DE IMÓVEIS */
  function applyFilter(key){
    var grid=document.getElementById('imvGrid'); if(!grid) return;
    var any=0;
    [].forEach.call(grid.querySelectorAll('.imv'),function(el){
      var ok = (key==='todos' || el.getAttribute('data-cat')===key);
      el.style.display = ok?'':'none'; if(ok) any++;
    });
    var emp=document.getElementById('imvEmpty'); if(emp) emp.style.display = any?'none':'block';
    document.querySelectorAll('.imv-filters button').forEach(function(btn){ btn.classList.toggle('on',btn.dataset.f===key); });
    document.querySelectorAll('.hero-search button').forEach(function(btn){ btn.classList.toggle('on',btn.dataset.hf===key); });
  }
  document.querySelectorAll('.imv-filters button').forEach(function(btn){ btn.addEventListener('click',function(){ applyFilter(btn.dataset.f); }); });
  document.querySelectorAll('.hero-search button').forEach(function(btn){ btn.addEventListener('click',function(){ applyFilter(btn.dataset.hf); var t=document.getElementById('imoveis'); if(t) t.scrollIntoView({behavior:'smooth'}); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=+el.dataset.count,sf=el.dataset.suffix||'',st=performance.now(); if(isNaN(t)){ el.textContent=el.dataset.count+sf; cio.unobserve(el); return; } (function tk(n){ var p=Math.min((n-st)/1500,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length>1){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au(); } au();
  }

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.innerHTML='Enviar mensagem '+ARR; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Interesse: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
</body>
</html>
