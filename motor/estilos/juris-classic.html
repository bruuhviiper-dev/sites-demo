<!DOCTYPE html>
<!--
  ============================================================
  ESTILO: JURIS CLASSIC  (advocacia — banca clássica, marfim + serifa)
  Identidade própria de escritório de advocacia: base marfim, tipografia
  Cormorant serifada (autoridade/tradição), cartão de credenciais no hero
  (OAB/áreas), ÁREAS DE ATUAÇÃO em índice numerado, processo em etapas e
  depoimento central. Lê o MESMO window.SITE que os outros estilos; só a
  cor de destaque (--accent) vem do nicho.
  ============================================================
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" id="meta-desc" content="" />
<title id="meta-title"></title>
<script id="site-data">window.SITE = /*__SITE__*/ null;</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root{
  --ivory:#F7F4EE; --ivory2:#EFEADF; --white:#FFFFFF;
  --ink:#1A2230; --ink2:#48505E; --muted:#8B8678; --line:#DCD5C7;
  --accent:#9A5B5B;
  --display:"Cormorant Garamond", serif; --sans:"Jost", sans-serif;
  --maxw:1160px; --ease:cubic-bezier(.16,.84,.34,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--ivory); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.7; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--display); font-weight:500; line-height:1.08; }
::selection{ background:var(--accent); color:var(--white); }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-track{ background:var(--ivory2); }
::-webkit-scrollbar-thumb{ background:#c5bdac; } ::-webkit-scrollbar-thumb:hover{ background:var(--accent); }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:clamp(22px,5vw,56px); }
.section{ padding-block:clamp(68px,10vw,134px); }
.kicker{ font-family:var(--sans); font-weight:500; font-size:.7rem; letter-spacing:.34em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:12px; }
.kicker::before{ content:""; width:28px; height:1px; background:var(--accent); display:inline-block; }
.sec-title{ font-family:var(--display); font-size:clamp(2.3rem,5.2vw,4rem); font-weight:500; margin-top:16px; }
.sec-title em{ font-style:italic; color:var(--accent); }
.sec-intro{ color:var(--ink2); max-width:560px; margin-top:16px; font-size:1.04rem; }

.btn{ font-family:var(--sans); font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; font-weight:500; padding:15px 30px; border:1px solid var(--ink); display:inline-flex; align-items:center; gap:10px; transition:all .35s var(--ease); }
.btn:hover{ background:var(--ink); color:var(--ivory); }
.btn--solid{ background:var(--accent); border-color:var(--accent); color:var(--white); }
.btn--solid:hover{ background:var(--ink); border-color:var(--ink); color:var(--ivory); }
.btn--ghost{ border-color:var(--line); color:var(--ink); }
.btn svg{ width:16px; height:16px; }

/* LOADER */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--ink); display:grid; place-items:center; transition:opacity .8s var(--ease), visibility .8s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld{ font-family:var(--display); font-size:clamp(2.4rem,7vw,4rem); font-style:italic; color:var(--ivory); overflow:hidden; letter-spacing:.1em; }
.ld span{ display:inline-block; transform:translateY(110%); animation:ldup .9s var(--ease) forwards; }
.ld span:nth-child(2){ animation-delay:.12s; }
@keyframes ldup{ to{ transform:none; } }

/* HEADER */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .4s var(--ease), border-color .4s, padding .4s; border-bottom:1px solid transparent; }
.header.scrolled{ background:rgba(247,244,238,.9); backdrop-filter:blur(14px); border-bottom-color:var(--line); }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:24px; }
.header.scrolled .nav{ padding-block:14px; }
.brand{ font-family:var(--display); font-size:1.6rem; letter-spacing:.02em; line-height:1; }
.brand b{ font-weight:600; font-style:italic; color:var(--accent); }
.brand .tag{ display:block; font-family:var(--sans); font-size:.55rem; letter-spacing:.32em; text-transform:uppercase; color:var(--muted); margin-top:4px; font-weight:400; }
.nav-links{ display:flex; align-items:center; gap:36px; }
.nav-links a{ font-size:.76rem; letter-spacing:.16em; text-transform:uppercase; font-weight:400; position:relative; }
.nav-links a::after{ content:""; position:absolute; left:0; bottom:-5px; width:0; height:1px; background:var(--accent); transition:width .35s var(--ease); }
.nav-links a:hover{ color:var(--accent); } .nav-links a:hover::after{ width:100%; }
.nav-right{ display:flex; align-items:center; gap:22px; }
.burger{ display:none; width:40px; height:40px; background:none; border:none; position:relative; z-index:1100; cursor:pointer; }
.burger span{ position:absolute; left:8px; width:24px; height:1.5px; background:var(--ink); transition:.35s var(--ease); }
.burger span:nth-child(1){ top:15px; } .burger span:nth-child(2){ top:22px; }
.burger.open span:nth-child(1){ top:18px; transform:rotate(45deg); }
.burger.open span:nth-child(2){ top:18px; transform:rotate(-45deg); }
@media (max-width:900px){
  .burger{ display:block; }
  .nav-links{ position:fixed; inset:0; flex-direction:column; justify-content:center; gap:28px; background:var(--ivory); transform:translateY(-100%); transition:transform .5s var(--ease); }
  .nav-links.open{ transform:none; }
  .nav-links a{ font-size:1.7rem; font-family:var(--display); text-transform:none; letter-spacing:0; }
  .nav-right .btn{ display:none; }
}

/* HERO */
.hero{ padding-top:clamp(120px,16vw,168px); padding-bottom:0; }
.hero-grid{ display:grid; grid-template-columns:1.15fr .85fr; gap:clamp(36px,5vw,70px); align-items:center; }
.hero h1{ font-size:clamp(2.9rem,6.6vw,5.2rem); font-weight:500; line-height:1.04; margin:20px 0 24px; }
.hero h1 em{ font-style:italic; color:var(--accent); }
.hero-lead{ color:var(--ink2); font-size:1.12rem; max-width:470px; margin-bottom:32px; }
.hero-actions{ display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
/* cartão de credenciais (papel timbrado) */
.cred{ background:var(--white); border:1px solid var(--line); border-top:3px solid var(--accent); padding:clamp(24px,3vw,34px); box-shadow:0 40px 80px -50px rgba(26,34,48,.5); }
.cred-hd{ font-family:var(--sans); font-size:.66rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); padding-bottom:16px; border-bottom:1px solid var(--line); margin-bottom:6px; }
.cred-row{ display:flex; gap:14px; align-items:flex-start; padding:15px 0; border-bottom:1px solid var(--line); }
.cred-row:last-child{ border-bottom:none; }
.cred-ic{ width:38px; height:38px; flex-shrink:0; border:1px solid var(--line); border-radius:50%; display:grid; place-items:center; color:var(--accent); }
.cred-ic svg{ width:18px; height:18px; }
.cred-lb{ font-weight:500; color:var(--ink); font-size:.95rem; }
.cred-vl{ font-size:.82rem; color:var(--ink2); }
.cred-badge{ margin-top:16px; text-align:center; font-family:var(--sans); font-size:.8rem; color:var(--ink2); }
.cred-badge .stars{ color:var(--accent); letter-spacing:2px; }
@media (max-width:900px){ .hero-grid{ grid-template-columns:1fr; gap:34px; } .cred{ order:-1; } }

/* STATS */
.sb{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-top:clamp(36px,5vw,60px); }
.sb-row{ display:flex; flex-wrap:wrap; }
.sb-it{ flex:1; min-width:140px; padding:26px clamp(14px,3vw,30px); border-right:1px solid var(--line); }
.sb-it:last-child{ border-right:none; }
.sb-n{ font-family:var(--display); font-size:clamp(2rem,4vw,2.8rem); color:var(--accent); line-height:1; }
.sb-l{ font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:8px; }

/* SOBRE */
.about-grid{ display:grid; grid-template-columns:.9fr 1.1fr; gap:clamp(40px,6vw,84px); align-items:center; }
.about-media{ position:relative; aspect-ratio:4/5; background:linear-gradient(135deg,var(--ivory2),#e3dccc); overflow:hidden; border:1px solid var(--line); }
.about-media img{ width:100%; height:100%; object-fit:cover; }
.about-media .ml{ position:absolute; inset:0; display:flex; flex-direction:column; gap:8px; align-items:center; justify-content:center; font-family:var(--display); font-style:italic; font-size:3rem; color:var(--muted); }
.about-text h2{ font-size:clamp(2rem,4.4vw,3.3rem); margin:16px 0 22px; }
.about-text p{ color:var(--ink2); margin-bottom:16px; max-width:540px; }
.about-tags{ display:flex; flex-wrap:wrap; gap:10px; margin-top:26px; }
.about-tags span{ font-size:.8rem; letter-spacing:.03em; padding:9px 16px; border:1px solid var(--line); color:var(--ink2); background:var(--white); display:inline-flex; align-items:center; gap:8px; }
.about-tags span svg{ width:15px; height:15px; color:var(--accent); }
@media (max-width:900px){ .about-grid{ grid-template-columns:1fr; gap:38px; } .about-media{ max-width:400px; } }

/* ÁREAS DE ATUAÇÃO (índice numerado) */
.area-list{ border-top:1px solid var(--line); margin-top:clamp(36px,5vw,56px); }
.area-row{ display:grid; grid-template-columns:auto 1fr auto; gap:clamp(16px,4vw,44px); align-items:center; padding:clamp(22px,3vw,34px) 6px; border-bottom:1px solid var(--line); position:relative; transition:padding-left .4s var(--ease), background .4s; }
.area-row::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:0; background:var(--accent); transition:width .4s var(--ease); }
.area-row:hover{ background:var(--white); padding-left:24px; }
.area-row:hover::before{ width:3px; }
.area-idx{ font-family:var(--display); font-style:italic; font-size:1.5rem; color:var(--accent); width:42px; }
.area-main h3{ font-size:clamp(1.4rem,2.7vw,2rem); font-weight:500; }
.area-main p{ color:var(--ink2); font-size:.95rem; margin-top:5px; max-width:560px; }
.area-arrow{ width:42px; height:42px; border:1px solid var(--line); border-radius:50%; display:grid; place-items:center; color:var(--ink); transition:all .35s var(--ease); }
.area-row:hover .area-arrow{ background:var(--accent); border-color:var(--accent); color:var(--white); }
.area-arrow svg{ width:16px; height:16px; }
@media (max-width:760px){ .area-row{ grid-template-columns:auto 1fr; } .area-idx{ width:auto; } .area-arrow{ display:none; } }

/* PROCESSO */
.proc{ background:var(--ink); color:var(--ivory); }
.proc .kicker{ color:#cbb08f; } .proc .kicker::before{ background:#cbb08f; }
.proc .sec-title{ color:var(--ivory); } .proc .sec-intro{ color:#b9b3a6; }
.proc-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(24px,4vw,44px); margin-top:clamp(40px,5vw,60px); }
.proc-step{ border-top:2px solid rgba(247,244,238,.2); padding-top:22px; }
.proc-n{ font-family:var(--display); font-style:italic; font-size:2.2rem; color:var(--accent); }
.proc-step h3{ font-size:1.5rem; margin:8px 0 8px; color:var(--ivory); }
.proc-step p{ color:#b9b3a6; font-size:.95rem; }
@media (max-width:760px){ .proc-grid{ grid-template-columns:1fr; gap:28px; } }

/* DEPOIMENTOS */
.quotes{ background:var(--ivory2); text-align:center; }
.qmark{ font-family:var(--display); font-size:5rem; line-height:.6; color:var(--accent); font-style:italic; }
.qtrack{ max-width:800px; margin:0 auto; overflow:hidden; }
.qslides{ display:flex; transition:transform .7s var(--ease); }
.qslide{ min-width:100%; }
.qquote{ font-family:var(--display); font-weight:400; font-size:clamp(1.5rem,3.3vw,2.3rem); line-height:1.45; font-style:italic; color:var(--ink); }
.qauthor{ margin-top:24px; font-family:var(--sans); font-size:.8rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink); }
.qauthor span{ display:block; color:var(--muted); margin-top:5px; letter-spacing:.1em; }
.qdots{ display:flex; gap:10px; justify-content:center; margin-top:36px; }
.qdots button{ width:8px; height:8px; border-radius:50%; border:none; background:#c8c0b0; cursor:pointer; transition:.3s; }
.qdots button.active{ background:var(--accent); width:26px; border-radius:8px; }

/* CONTATO */
.contact-grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(40px,6vw,80px); margin-top:50px; }
.cform{ display:grid; gap:22px; }
.fld label{ display:block; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
.fld input,.fld select,.fld textarea{ width:100%; background:var(--white); border:1px solid var(--line); padding:13px 14px; font-family:var(--sans); font-size:1rem; font-weight:300; color:var(--ink); transition:border-color .3s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); }
.fld textarea{ resize:vertical; min-height:96px; }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:22px; }
.cmsg{ font-size:.86rem; color:var(--accent); min-height:18px; }
.cinfo{ display:grid; gap:4px; align-content:start; }
.cinfo .it{ padding:20px 0; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:flex-start; }
.cinfo .it h4{ font-family:var(--sans); font-weight:500; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.cinfo .it p{ font-size:1rem; color:var(--ink); }
.cinfo .it svg{ width:20px; height:20px; color:var(--accent); flex-shrink:0; margin-top:3px; }
.cmap{ margin-top:8px; border:1px solid var(--line); }
.cmap iframe{ width:100%; height:200px; border:0; display:block; filter:grayscale(.4); }
@media (max-width:900px){ .contact-grid{ grid-template-columns:1fr; } .frow{ grid-template-columns:1fr; } }

.wa{ position:fixed; right:22px; bottom:22px; z-index:800; width:56px; height:56px; border-radius:50%; background:#25D366; display:grid; place-items:center; box-shadow:0 10px 26px -8px rgba(37,211,102,.55); transition:transform .3s; }
.wa:hover{ transform:scale(1.08); } .wa svg{ width:28px; height:28px; fill:#fff; }

/* FOOTER */
.footer{ background:var(--ink); color:var(--ivory); padding-block:64px 28px; text-align:center; }
.footer .fmark{ font-family:var(--display); font-size:clamp(2.2rem,5.5vw,3.6rem); font-style:italic; }
.footer .ftag{ color:#b9b3a6; max-width:440px; margin:12px auto 28px; font-family:var(--display); font-size:1.18rem; font-style:italic; }
.fnav{ display:flex; gap:26px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
.fnav a{ font-size:.76rem; letter-spacing:.14em; text-transform:uppercase; color:#b9b3a6; }
.fnav a:hover{ color:var(--accent); }
.fsoc{ display:flex; gap:14px; justify-content:center; margin-bottom:28px; }
.fsoc a{ width:40px; height:40px; border:1px solid rgba(247,244,238,.2); border-radius:50%; display:grid; place-items:center; transition:.3s; }
.fsoc a svg{ width:17px; height:17px; color:#b9b3a6; }
.fsoc a:hover{ border-color:var(--accent); } .fsoc a:hover svg{ color:var(--accent); }
.fcopy{ font-size:.74rem; color:var(--muted); border-top:1px solid rgba(247,244,238,.14); padding-top:22px; }

[data-rev]{ opacity:0; transform:translateY(30px); transition:opacity 1s var(--ease), transform 1s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.1s; } [data-rev][data-d="2"]{ transition-delay:.2s; } [data-rev][data-d="3"]{ transition-delay:.3s; }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } [data-rev]{ opacity:1; transform:none; } }
</style>
</head>
<body>
  <div id="loader"><div class="ld"></div></div>
  <header class="header" id="header"></header>
  <main id="app"></main>
  <footer class="footer" id="footer"></footer>
  <a class="wa" id="wa" target="_blank" rel="noopener" aria-label="WhatsApp" style="display:none"><svg viewBox="0 0 32 32"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.7 1.9 6.7L3 29l7-1.8c1.9 1 4 1.6 6 1.6 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-4.1 1.1 1.1-4-.3-.4a10 10 0 01-1.6-5.4C5.6 9.8 10.2 5.3 16 5.3s10.4 4.5 10.4 10.2S21.8 25.7 16 25.7zm5.7-7.6c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-.9 1.2-.3.2-.6.1a8.3 8.3 0 01-2.4-1.5 9 9 0 01-1.7-2.1c-.2-.3 0-.5.1-.6l.5-.5.3-.5a.5.5 0 000-.5l-1-2.3c-.3-.6-.5-.5-.7-.5h-.6a1.1 1.1 0 00-.8.4 3.3 3.3 0 00-1 2.5c0 1.5 1.1 2.9 1.2 3.1s2.1 3.3 5.2 4.6c.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4s.3-1.3.2-1.4-.3-.2-.5-.4z"/></svg></a>

<script>
(function(){
  "use strict";
  var S = window.SITE;
  if(!S){ document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Erro: SITE não injetado.</p>'; return; }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function ini(n){ return (n||'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'•'; }

  ['hero','about','services','testimonials','instagram','contact','footer','process'].forEach(function(k){
    var o=S[k]; if(o && o.title && !o.titleHtml && /[<>]/.test(o.title)){ o.titleHtml=o.title; }
  });

  var ICONS={
    scale:'<path d="M12 3v18M7 21h10M12 7l-6 1.6 2.4 5.4a2.8 2.8 0 01-4.8 0L6 8.6M12 7l6 1.6-2.4 5.4a2.8 2.8 0 004.8 0L18 8.6"/>',
    shield:'<path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z"/>',
    check:'<path d="M5 12l5 5L20 7"/>',
    heart:'<path d="M12 20s-7-4.5-7-9a4 4 0 017-2 4 4 0 017 2c0 4.5-7 9-7 9z"/>',
    home:'<path d="M4 11l8-7 8 7M6 10v9h12v-9"/>',
    hand:'<path d="M7 11V6a1.5 1.5 0 013 0v4m0-1V4.5a1.5 1.5 0 013 0V10m0-1a1.5 1.5 0 013 0V14c0 3-2 6-6 6h-1c-2 0-3-1-4-2l-3-3a1.5 1.5 0 012-2l1.5 1.5"/>',
    phone:'<path d="M5 4h3l2 5-2 1a11 11 0 005 5l1-2 5 2v3a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    pin:'<path d="M12 21s-7-4.5-7-10a7 7 0 1114 0c0 5.5-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/>',
    star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6-5.3-2.9-5.3 2.9 1.1-6L3.4 9.4l6-.8z"/>',
    face:'<circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8.5 15a4 4 0 007 0"/>',
    sparkle:'<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/>'
  };
  function svg(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||ICONS.check)+'</svg>'; }
  var IGS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>';
  var WAS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/></svg>';
  var MS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
  var ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

  var acc = (S.theme && S.theme.accent) || '#9A5B5B';
  document.documentElement.style.setProperty('--accent', acc);

  document.getElementById('meta-title').textContent = (S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Advocacia';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{}, h=S.hero||{}, a=S.about||{}, c=S.contact||{};
  document.querySelector('.ld').innerHTML = ini(b.name).split('').map(function(ch){return '<span>'+esc(ch)+'</span>';}).join('');

  var nav=[{id:'inicio',label:'Início'}];
  if(S.about) nav.push({id:'sobre',label:'Sobre'});
  if(S.services) nav.push({id:'atuacao',label:(S.services.navLabel||'Atuação')});
  if(S.process&&S.process.steps&&S.process.steps.length) nav.push({id:'processo',label:(S.process.navLabel||'Como funciona')});
  nav.push({id:'contato',label:'Contato'});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';
  document.getElementById('header').innerHTML='<div class="container nav">'+brandHtml+
    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right"><a href="#contato" class="btn btn--solid">'+esc((h.ctaAgendar)||'Falar agora')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):(c.instagramUrl||'#');
  var html='';

  /* HERO + cartão de credenciais */
  var credRows='';
  if(c.phoneDisplay||c.whatsapp) credRows+='<div class="cred-row"><span class="cred-ic">'+svg('phone')+'</span><div><div class="cred-lb">'+(c.whatsapp?'WhatsApp':'Telefone')+'</div><div class="cred-vl">'+esc(c.phoneDisplay||c.whatsapp)+'</div></div></div>';
  (a.certs||[]).slice(0,3).forEach(function(ct){
    credRows+='<div class="cred-row"><span class="cred-ic">'+svg(ct.icon||'check')+'</span><div><div class="cred-lb">'+esc(ct.label||ct)+'</div>'+(ct.desc?'<div class="cred-vl">'+esc(ct.desc)+'</div>':'')+'</div></div>';
  });
  var ratingBadge=(a.stats&&a.stats.length)?'<div class="cred-badge"><span class="stars">★★★★★</span> '+esc(a.stats[0].num+(a.stats[0].suffix||'')+' · '+a.stats[0].label)+'</div>':'';
  html+='<section class="hero" id="inicio"><div class="container">'+
    '<div class="hero-grid">'+
      '<div><span class="kicker">'+esc(h.eyebrow||'Advocacia')+'</span>'+
        '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
        (h.sub?'<p class="hero-lead">'+esc(h.sub)+'</p>':'')+
        '<div class="hero-actions">'+
          '<a href="'+esc((h.ctaPrimary&&h.ctaPrimary.href)||'#contato')+'" class="btn btn--solid">'+esc((h.ctaPrimary&&h.ctaPrimary.label)||'Falar no WhatsApp')+' '+ARR+'</a>'+
          (h.ctaGhost?'<a href="'+esc(h.ctaGhost.href||'#atuacao')+'" class="btn btn--ghost">'+esc(h.ctaGhost.label)+'</a>':'')+
        '</div></div>'+
      '<div class="cred"><div class="cred-hd">'+esc(h.badge||'O escritório')+'</div>'+credRows+ratingBadge+'</div>'+
    '</div></div></section>';

  /* STATS */
  if(a.stats&&a.stats.length){
    html+='<div class="container"><div class="sb"><div class="sb-row">'+
      a.stats.map(function(s){var nn=String(s.num),num=/^\d+$/.test(nn);return '<div class="sb-it"><div class="sb-n"'+(num?' data-count="'+esc(nn)+'"':'')+(s.suffix?' data-suffix="'+esc(s.suffix)+'"':'')+'>'+(num?'0':esc(nn)+(s.suffix?esc(s.suffix):''))+'</div><div class="sb-l">'+esc(s.label)+'</div></div>';}).join('')+
      '</div></div></div>';
  }

  /* SOBRE */
  if(S.about){
    var media = a.image ? '<img loading="lazy" src="'+esc(a.image)+'" alt="'+esc(b.name)+'">' : '<span class="ml">'+svg('scale')+esc(ini(b.name))+'</span>';
    html+='<section class="section" id="sobre"><div class="container about-grid">'+
      '<div class="about-media" data-rev>'+media+'</div>'+
      '<div class="about-text"><span class="kicker" data-rev>'+esc(a.eyebrow||'Sobre')+'</span>'+
      '<h2 data-rev data-d="1">'+(a.titleHtml||esc(a.title))+'</h2>'+
      (a.paragraphs||[]).map(function(p){return '<p data-rev data-d="1">'+esc(p)+'</p>';}).join('')+
      (a.certs&&a.certs.length?'<div class="about-tags" data-rev data-d="2">'+a.certs.map(function(ct){return '<span>'+svg(ct.icon||'check')+esc(ct.label||ct)+'</span>';}).join('')+'</div>':'')+
      '</div></div></section>';
  }

  /* ÁREAS DE ATUAÇÃO */
  if(S.services){
    var sv=S.services;
    html+='<section class="section" id="atuacao"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(sv.eyebrow||'Áreas de atuação')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(sv.titleHtml||esc(sv.title||'Áreas de atuação'))+'</h2>'+
      (sv.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(sv.intro)+'</p>':'')+'</div>'+
      '<div class="area-list">'+
      (sv.items||[]).map(function(it,i){return '<div class="area-row" data-rev>'+
        '<span class="area-idx">'+('0'+(i+1)).slice(-2)+'</span>'+
        '<div class="area-main"><h3>'+esc(it.name)+'</h3>'+(it.desc?'<p>'+esc(it.desc)+'</p>':'')+'</div>'+
        '<a href="#contato" class="area-arrow" aria-label="Falar sobre">'+ARR+'</a>'+
      '</div>';}).join('')+
      '</div></div></section>';
  }

  /* PROCESSO */
  if(S.process&&S.process.steps&&S.process.steps.length){
    var pc=S.process;
    html+='<section class="section proc" id="processo"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(pc.eyebrow||'Como funciona')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(pc.titleHtml||esc(pc.title||'Como funciona'))+'</h2>'+
      (pc.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(pc.intro)+'</p>':'')+
      '<div class="proc-grid">'+
      pc.steps.map(function(s,i){return '<div class="proc-step" data-rev'+(i?' data-d="'+Math.min(i,3)+'"':'')+'><div class="proc-n">'+esc(s.n||('0'+(i+1)).slice(-2))+'</div><h3>'+esc(s.name)+'</h3><p>'+esc(s.desc)+'</p></div>';}).join('')+
      '</div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section quotes" id="depoimentos"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<div class="qmark" data-rev>&ldquo;</div>'+
      '<div class="qtrack" data-rev data-d="1"><div class="qslides" id="qslides">'+
      te.items.map(function(it){return '<div class="qslide"><p class="qquote">'+esc(it.quote||it.text)+'</p><div class="qauthor">'+esc(it.name)+'<span>'+esc(it.meta||'')+'</span></div></div>';}).join('')+
      '</div></div><div class="qdots" id="qdots"></div></div></section>';
  }

  /* CONTATO */
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener">'+WAS+'<div><h4>'+(c.whatsapp?'WhatsApp':'Telefone')+'</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.address) info+='<div class="it">'+svg('pin')+'<div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it">'+svg('clock')+'<div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';
  var map=c.mapsEmbed?'<div class="cmap"><iframe loading="lazy" src="'+esc(c.mapsEmbed)+'"></iframe></div>':'';
  var svcOpts=(S.services&&S.services.items?S.services.items.map(function(i){return i.name;}):[]);
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+
    '<h2 class="sec-title" data-rev data-d="1">'+(c.titleHtml||esc(c.title||'Fale com o escritório'))+'</h2>'+
    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      '<div class="fld"><label>E-mail</label><input type="email" name="email" placeholder="voce@email.com"></div></div>'+
      (svcOpts.length?'<div class="fld"><label>Assunto</label><select name="servico"><option value="">Selecione a área</option>'+svcOpts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select></div>':'')+
      '<div class="fld"><label>Como podemos ajudar</label><textarea name="msg" placeholder="Conte resumidamente o seu caso"></textarea></div>'+
      '<button type="submit" class="btn btn--solid" id="cbtn" style="justify-self:start">Enviar mensagem '+ARR+'</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cinfo" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  var foot=S.footer||{};
  var soc='';
  if(S.instagram&&S.instagram.url) soc+='<a href="'+esc(S.instagram.url)+'" target="_blank" rel="noopener" aria-label="Instagram">'+IGS+'</a>';
  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="fmark">'+esc(b.name)+'</div>'+
    (foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    (soc?'<div class="fsoc">'+soc+'</div>':'')+
    '<p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* INTERAÇÕES */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});

  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(x){ x.addEventListener('click',function(){ tm(false); }); });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var cio=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting)return; var el=e.target,t=+el.dataset.count,sf=el.dataset.suffix||'',st=performance.now(); if(isNaN(t)){ el.textContent=el.dataset.count+sf; cio.unobserve(el); return; } (function tk(n){ var p=Math.min((n-st)/1500,1),k=1-Math.pow(1-p,3); el.textContent=Math.round(k*t)+sf; if(p<1)requestAnimationFrame(tk); })(st); cio.unobserve(el); }); },{threshold:.6});
  document.querySelectorAll('[data-count]').forEach(function(x){ cio.observe(x); });

  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length>1){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au(); } au();
  }

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.innerHTML='Enviar mensagem '+ARR; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Assunto: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
</body>
</html>
