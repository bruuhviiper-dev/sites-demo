<!DOCTYPE html>
<!--
  ============================================================
  ESTILO: ESTÉTICA GLOW  (estética/beleza — editorial + antes/depois)
  Protagonistas: SLIDER ANTES/DEPOIS (arrasta para revelar) e AGENDAMENTO.
  Serviços com preço, galeria de resultados. Claro, sofisticado (Marcellus).
  Lê o MESMO window.SITE + SITE.antesDepois e SITE.agenda. Acento do nicho.
  ============================================================
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" id="meta-desc" content="" />
<title id="meta-title"></title>
<script id="site-data">window.SITE = /*__SITE__*/ null;</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root{
  --cream:#FBF7F4; --blush:#F3E9E5; --white:#FFFFFF;
  --ink:#2A2320; --ink2:#6B5F58; --muted:#A8978E; --line:#EBE0D9;
  --accent:#C9A96E;
  --display:"Marcellus", serif; --sans:"Jost", sans-serif;
  --maxw:1180px; --ease:cubic-bezier(.16,.84,.34,1);
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{ background:var(--cream); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.7; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
ul{ list-style:none; }
h1,h2,h3,h4{ font-family:var(--display); font-weight:400; line-height:1.1; }
::selection{ background:var(--accent); color:#fff; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
::-webkit-scrollbar{ width:9px; } ::-webkit-scrollbar-track{ background:var(--blush); }
::-webkit-scrollbar-thumb{ background:#d8c7bb; } ::-webkit-scrollbar-thumb:hover{ background:var(--accent); }

.container{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:clamp(22px,5vw,56px); }
.section{ padding-block:clamp(64px,9vw,128px); }
.kicker{ font-family:var(--sans); font-weight:500; font-size:.72rem; letter-spacing:.3em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:11px; }
.kicker::before{ content:""; width:30px; height:1px; background:var(--accent); display:inline-block; }
.sec-title{ font-size:clamp(2.2rem,5vw,4rem); font-weight:400; margin-top:16px; }
.sec-title em{ font-style:italic; color:var(--accent); }
.sec-intro{ color:var(--ink2); max-width:560px; margin-top:16px; font-size:1.05rem; }

.btn{ font-family:var(--sans); font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; font-weight:500; padding:15px 30px; border-radius:40px; display:inline-flex; align-items:center; gap:10px; border:1px solid var(--ink); cursor:pointer; transition:all .35s var(--ease); }
.btn svg{ width:16px; height:16px; }
.btn:hover{ background:var(--ink); color:var(--cream); }
.btn--solid{ background:var(--accent); border-color:var(--accent); color:#fff; }
.btn--solid:hover{ background:var(--ink); border-color:var(--ink); color:var(--cream); }
.btn--ghost{ border-color:var(--line); color:var(--ink); }

/* LOADER */
#loader{ position:fixed; inset:0; z-index:9999; background:var(--blush); display:grid; place-items:center; transition:opacity .8s var(--ease), visibility .8s; }
#loader.hidden{ opacity:0; visibility:hidden; }
.ld{ font-family:var(--display); font-size:clamp(2.4rem,7vw,4rem); font-style:italic; color:var(--accent); overflow:hidden; letter-spacing:.06em; }
.ld span{ display:inline-block; transform:translateY(110%); animation:ldup .9s var(--ease) forwards; }
.ld span:nth-child(2){ animation-delay:.12s; }
@keyframes ldup{ to{ transform:none; } }

/* HEADER */
.header{ position:fixed; top:0; left:0; width:100%; z-index:1000; transition:background .4s var(--ease), border-color .4s, padding .4s; border-bottom:1px solid transparent; }
.header.scrolled{ background:rgba(251,247,244,.9); backdrop-filter:blur(14px); border-bottom-color:var(--line); }
.nav{ display:flex; align-items:center; justify-content:space-between; padding-block:24px; }
.header.scrolled .nav{ padding-block:14px; }
.brand{ font-family:var(--display); font-size:1.6rem; letter-spacing:.02em; line-height:1; }
.brand b{ font-weight:400; font-style:italic; color:var(--accent); }
.brand .tag{ display:block; font-family:var(--sans); font-size:.55rem; letter-spacing:.32em; text-transform:uppercase; color:var(--muted); margin-top:4px; font-weight:400; }
.nav-links{ display:flex; align-items:center; gap:34px; }
.nav-links a{ font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2); transition:color .25s; }
.nav-links a:hover{ color:var(--accent); }
.nav-right{ display:flex; align-items:center; gap:22px; }
.burger{ display:none; width:42px; height:42px; border-radius:50%; background:var(--white); border:1px solid var(--line); position:relative; z-index:1100; cursor:pointer; }
.burger span{ position:absolute; left:11px; width:20px; height:1.5px; background:var(--ink); transition:.35s var(--ease); }
.burger span:nth-child(1){ top:17px; } .burger span:nth-child(2){ top:24px; }
.burger.open span:nth-child(1){ top:20px; transform:rotate(45deg); background:var(--accent); }
.burger.open span:nth-child(2){ top:20px; transform:rotate(-45deg); background:var(--accent); }
@media (max-width:900px){
  .burger{ display:grid; place-items:center; }
  .nav-links{ position:fixed; inset:0; flex-direction:column; justify-content:center; gap:26px; background:var(--cream); transform:translateY(-100%); transition:transform .5s var(--ease); }
  .nav-links.open{ transform:none; }
  .nav-links a{ font-size:1.6rem; font-family:var(--display); text-transform:none; letter-spacing:0; color:var(--ink); }
  .nav-right .btn{ display:none; }
}

/* HERO */
.hero{ padding-top:clamp(120px,16vw,170px); padding-bottom:0; }
.hero-grid{ display:grid; grid-template-columns:1.05fr .95fr; gap:clamp(36px,5vw,72px); align-items:center; }
.hero h1{ font-size:clamp(2.8rem,6.5vw,5.2rem); font-weight:400; line-height:1.04; margin:18px 0 24px; }
.hero h1 em{ font-style:italic; color:var(--accent); }
.hero-lead{ color:var(--ink2); font-size:1.14rem; max-width:460px; margin-bottom:32px; }
.hero-actions{ display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.hero-visual{ position:relative; aspect-ratio:4/5; background:linear-gradient(150deg,var(--blush),#e6d3c9); border-radius:200px 200px 16px 16px; overflow:hidden; box-shadow:0 50px 90px -50px rgba(42,35,32,.5); }
.hero-visual img{ width:100%; height:100%; object-fit:cover; }
.hero-visual .vl{ position:absolute; inset:0; display:flex; flex-direction:column; gap:8px; align-items:center; justify-content:center; font-family:var(--display); font-style:italic; color:var(--muted); font-size:1.3rem; }
@media (max-width:900px){ .hero-grid{ grid-template-columns:1fr; gap:34px; } .hero-visual{ order:-1; aspect-ratio:4/3; max-height:340px; border-radius:120px 120px 14px 14px; } }

/* ANTES & DEPOIS */
.ba-wrap{ background:var(--blush); }
.ba-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:clamp(34px,5vw,54px); }
.ba{ position:relative; aspect-ratio:3/4; border-radius:14px; overflow:hidden; border:1px solid var(--line); user-select:none; touch-action:none; }
.ba-img{ position:absolute; inset:0; }
.ba-img .ph{ position:absolute; inset:0; display:flex; align-items:flex-end; justify-content:center; padding-bottom:18%; font-family:var(--display); font-size:1.6rem; color:#fff; text-shadow:0 1px 6px rgba(0,0,0,.4); }
.ba-after{ background:linear-gradient(150deg,#cbb49f,var(--accent)); }
.ba-before{ background:linear-gradient(150deg,#b9a9a0,#8a7d74); clip-path:inset(0 50% 0 0); }
.ba-img img{ width:100%; height:100%; object-fit:cover; }
.ba-tag{ position:absolute; top:12px; font-family:var(--sans); font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:#fff; background:rgba(42,35,32,.6); padding:5px 12px; border-radius:30px; }
.ba-tag-b{ left:12px; } .ba-tag-a{ right:12px; }
.ba-handle{ position:absolute; top:0; bottom:0; left:50%; width:2px; background:#fff; transform:translateX(-1px); pointer-events:none; box-shadow:0 0 8px rgba(0,0,0,.3); }
.ba-handle::after{ content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:38px; height:38px; border-radius:50%; background:#fff; box-shadow:0 4px 14px rgba(0,0,0,.25); }
.ba-handle::before{ content:"‹ ›"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:2; font-size:.9rem; letter-spacing:-2px; color:var(--accent); font-weight:700; }
.ba-range{ position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:ew-resize; margin:0; }
.ba-label{ position:absolute; bottom:12px; left:50%; transform:translateX(-50%); font-family:var(--sans); font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; color:#fff; background:rgba(42,35,32,.55); padding:5px 14px; border-radius:30px; pointer-events:none; }
@media (max-width:840px){ .ba-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:520px){ .ba-grid{ grid-template-columns:1fr; max-width:340px; margin-inline:auto; } }

/* SERVIÇOS (com preço) */
.svc-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-top:clamp(34px,5vw,54px); }
.svc{ background:var(--white); border:1px solid var(--line); border-radius:14px; padding:26px 28px; display:flex; gap:18px; align-items:flex-start; transition:border-color .3s, transform .3s; }
.svc:hover{ border-color:var(--accent); transform:translateY(-3px); }
.svc-ic{ width:46px; height:46px; border-radius:50%; background:var(--blush); display:grid; place-items:center; color:var(--accent); flex-shrink:0; }
.svc-ic svg{ width:22px; height:22px; }
.svc-main{ flex:1; }
.svc-main h3{ font-size:1.3rem; font-weight:400; }
.svc-main p{ color:var(--ink2); font-size:.92rem; margin-top:5px; }
.svc-price{ font-family:var(--display); font-size:1.2rem; color:var(--accent); white-space:nowrap; margin-left:auto; }
@media (max-width:680px){ .svc-grid{ grid-template-columns:1fr; } .svc-price{ margin-left:0; } }

/* AGENDA */
.agenda{ background:var(--ink); color:var(--cream); }
.agenda .kicker{ color:var(--accent); } .agenda .kicker::before{ background:var(--accent); }
.agenda-grid{ display:grid; grid-template-columns:1fr 1fr; gap:clamp(34px,5vw,64px); align-items:center; margin-top:clamp(30px,4vw,48px); }
.agenda h2{ font-size:clamp(2rem,4.4vw,3.2rem); color:var(--cream); }
.agenda p{ color:#cdbfb4; margin:14px 0 24px; max-width:440px; }
.agenda-hours{ display:grid; gap:10px; margin-bottom:28px; }
.agenda-hours li{ display:flex; gap:12px; align-items:center; color:var(--cream); }
.agenda-hours svg{ width:18px; height:18px; color:var(--accent); }
.agenda-embed{ border:1px solid #3a322d; border-radius:16px; overflow:hidden; min-height:320px; background:var(--blush); }
.agenda-embed iframe{ width:100%; height:420px; border:0; display:block; }
.agenda-card{ background:#221c19; border:1px solid #3a322d; border-radius:16px; padding:clamp(28px,4vw,40px); text-align:center; }
.agenda-card .ac-ic{ width:64px; height:64px; border-radius:50%; background:color-mix(in srgb, var(--accent) 18%, transparent); display:grid; place-items:center; color:var(--accent); margin:0 auto 18px; }
.agenda-card .ac-ic svg{ width:30px; height:30px; }
.agenda-card h3{ font-size:1.5rem; color:var(--cream); margin-bottom:10px; }
.agenda-card p{ margin:0 auto 22px; }
@media (max-width:900px){ .agenda-grid{ grid-template-columns:1fr; gap:32px; } }

/* GALERIA */
.gal-grid{ display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:200px; gap:14px; margin-top:50px; }
.gal-item{ background:linear-gradient(150deg,var(--blush),#e2d0c6); overflow:hidden; position:relative; border-radius:10px; }
.gal-item:nth-child(1){ grid-column:span 2; grid-row:span 2; }
.gal-item:nth-child(6){ grid-column:span 2; }
.gal-item .g{ position:absolute; inset:0; display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center; font-family:var(--display); font-style:italic; color:var(--muted); }
.gal-item .g svg{ width:30px; height:30px; color:var(--accent); opacity:.6; }
.gal-item .ov{ position:absolute; inset:0; background:rgba(42,35,32,.32); opacity:0; display:grid; place-items:center; transition:opacity .4s; }
.gal-item:hover .ov{ opacity:1; } .gal-item .ov svg{ width:26px; height:26px; stroke:#fff; fill:none; }
@media (max-width:760px){ .gal-grid{ grid-template-columns:repeat(2,1fr); grid-auto-rows:150px; } .gal-item:nth-child(1){ grid-column:span 2; } .gal-item:nth-child(6){ grid-column:span 1; } }

/* DEPOIMENTOS */
.quotes{ background:var(--blush); text-align:center; }
.qmark{ font-family:var(--display); font-size:5rem; line-height:.6; color:var(--accent); font-style:italic; }
.qtrack{ max-width:800px; margin:0 auto; overflow:hidden; }
.qslides{ display:flex; transition:transform .7s var(--ease); }
.qslide{ min-width:100%; }
.qquote{ font-family:var(--display); font-size:clamp(1.4rem,3.2vw,2.2rem); line-height:1.4; font-style:italic; color:var(--ink); }
.qauthor{ margin-top:24px; font-family:var(--sans); font-size:.8rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink); }
.qauthor span{ display:block; color:var(--muted); margin-top:5px; letter-spacing:.08em; }
.qdots{ display:flex; gap:10px; justify-content:center; margin-top:36px; }
.qdots button{ width:8px; height:8px; border-radius:50%; border:none; background:#d8c7bb; cursor:pointer; transition:.3s; }
.qdots button.active{ background:var(--accent); width:26px; border-radius:8px; }

/* CONTATO */
.contact-grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(36px,6vw,72px); margin-top:48px; }
.cform{ display:grid; gap:22px; }
.fld label{ display:block; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
.fld input,.fld select,.fld textarea{ width:100%; background:none; border:none; border-bottom:1px solid var(--line); padding:9px 2px; font-family:var(--sans); font-size:1rem; font-weight:300; color:var(--ink); transition:border-color .3s; }
.fld input:focus,.fld select:focus,.fld textarea:focus{ outline:none; border-color:var(--accent); }
.fld textarea{ resize:vertical; min-height:90px; }
.frow{ display:grid; grid-template-columns:1fr 1fr; gap:22px; }
.cmsg{ font-size:.86rem; color:var(--accent); min-height:18px; }
.cinfo{ display:grid; gap:4px; align-content:start; }
.cinfo .it{ padding:20px 0; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:flex-start; }
.cinfo .it h4{ font-family:var(--sans); font-weight:500; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.cinfo .it p{ font-size:1rem; color:var(--ink); }
.cinfo .it svg{ width:20px; height:20px; color:var(--accent); flex-shrink:0; margin-top:3px; }
.cmap{ margin-top:8px; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.cmap iframe{ width:100%; height:200px; border:0; display:block; filter:grayscale(.3); }
@media (max-width:900px){ .contact-grid{ grid-template-columns:1fr; } .frow{ grid-template-columns:1fr; } }

.wa{ position:fixed; right:22px; bottom:22px; z-index:800; width:56px; height:56px; border-radius:50%; background:#25D366; display:grid; place-items:center; box-shadow:0 10px 26px -8px rgba(37,211,102,.55); transition:transform .3s; }
.wa:hover{ transform:scale(1.08); } .wa svg{ width:28px; height:28px; fill:#fff; }

/* FOOTER */
.footer{ background:var(--blush); border-top:1px solid var(--line); padding-block:62px 28px; text-align:center; }
.footer .fmark{ font-family:var(--display); font-size:clamp(2.2rem,5.5vw,3.6rem); font-style:italic; }
.footer .ftag{ color:var(--ink2); max-width:440px; margin:12px auto 28px; font-family:var(--display); font-size:1.15rem; font-style:italic; }
.fnav{ display:flex; gap:26px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
.fnav a{ font-size:.76rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2); } .fnav a:hover{ color:var(--accent); }
.fsoc{ display:flex; gap:14px; justify-content:center; margin-bottom:28px; }
.fsoc a{ width:40px; height:40px; border:1px solid var(--line); border-radius:50%; display:grid; place-items:center; transition:.3s; }
.fsoc a svg{ width:17px; height:17px; color:var(--ink2); }
.fsoc a:hover{ border-color:var(--accent); } .fsoc a:hover svg{ color:var(--accent); }
.fcopy{ font-size:.76rem; color:var(--muted); border-top:1px solid var(--line); padding-top:24px; }

[data-rev]{ opacity:0; transform:translateY(28px); transition:opacity .9s var(--ease), transform .9s var(--ease); }
[data-rev].in{ opacity:1; transform:none; }
[data-rev][data-d="1"]{ transition-delay:.1s; } [data-rev][data-d="2"]{ transition-delay:.2s; } [data-rev][data-d="3"]{ transition-delay:.3s; }
@media (prefers-reduced-motion:reduce){ *{ animation:none!important; transition:none!important; } [data-rev]{ opacity:1; transform:none; } }
</style>
</head>
<body>
  <div id="loader"><div class="ld"></div></div>
  <header class="header" id="header"></header>
  <main id="app"></main>
  <footer class="footer" id="footer"></footer>
  <a class="wa" id="wa" target="_blank" rel="noopener" aria-label="WhatsApp" style="display:none"><svg viewBox="0 0 32 32"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.7 1.9 6.7L3 29l7-1.8c1.9 1 4 1.6 6 1.6 7 0 12.5-5.5 12.5-12.5S23 3 16 3zm0 22.7c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-4.1 1.1 1.1-4-.3-.4a10 10 0 01-1.6-5.4C5.6 9.8 10.2 5.3 16 5.3s10.4 4.5 10.4 10.2S21.8 25.7 16 25.7zm5.7-7.6c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-.9 1.2-.3.2-.6.1a8.3 8.3 0 01-2.4-1.5 9 9 0 01-1.7-2.1c-.2-.3 0-.5.1-.6l.5-.5.3-.5a.5.5 0 000-.5l-1-2.3c-.3-.6-.5-.5-.7-.5h-.6a1.1 1.1 0 00-.8.4 3.3 3.3 0 00-1 2.5c0 1.5 1.1 2.9 1.2 3.1s2.1 3.3 5.2 4.6c.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4s.3-1.3.2-1.4-.3-.2-.5-.4z"/></svg></a>

<script>
(function(){
  "use strict";
  var S = window.SITE;
  if(!S){ document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Erro: SITE não injetado.</p>'; return; }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function ini(n){ return (n||'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'•'; }

  ['hero','services','antesDepois','agenda','testimonials','instagram','contact','footer'].forEach(function(k){
    var o=S[k]; if(o && o.title && !o.titleHtml && /[<>]/.test(o.title)){ o.titleHtml=o.title; }
  });

  var ICONS={
    face:'<circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8.5 14.5a4 4 0 007 0"/>',
    leaf:'<path d="M5 21c0-9 6-15 16-15 0 10-6 15-16 15z"/><path d="M5 21c2-6 6-9 11-10"/>',
    heart:'<path d="M12 20s-7-4.5-7-9a4 4 0 017-2 4 4 0 017 2c0 4.5-7 9-7 9z"/>',
    cut:'<circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8.5L20 18M8.5 15.5L20 6"/>',
    hand:'<path d="M7 11V6a1.5 1.5 0 013 0v4m0-1V4.5a1.5 1.5 0 013 0V10m0-1a1.5 1.5 0 013 0V14c0 3-2 6-6 6h-1c-2 0-3-1-4-2l-3-3a1.5 1.5 0 012-2l1.5 1.5"/>',
    sparkle:'<path d="M12 3l1.6 5L19 9.5l-5.4 1.5L12 16l-1.6-5L5 9.5l5.4-1.5z"/>',
    drop:'<path d="M12 3s6 6 6 10a6 6 0 01-12 0c0-4 6-10 6-10z"/>',
    check:'<path d="M5 12l5 5L20 7"/>',
    star:'<path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1.1 6-5.3-2.9-5.3 2.9 1.1-6L3.4 9.4l6-.8z"/>',
    calendar:'<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>',
    clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    pin:'<path d="M12 21s-7-4.5-7-10a7 7 0 1114 0c0 5.5-7 10-7 10z"/><circle cx="12" cy="11" r="2.5"/>',
    phone:'<path d="M5 4h3l2 5-2 1a11 11 0 005 5l1-2 5 2v3a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/>'
  };
  function svg(n){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||ICONS.sparkle)+'</svg>'; }
  var IGS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>';
  var WAS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M21 12a9 9 0 01-13 8l-5 1 1-5a9 9 0 1117-4z"/></svg>';
  var MS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
  var ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

  var acc = (S.theme && S.theme.accent) || '#C9A96E';
  document.documentElement.style.setProperty('--accent', acc);

  document.getElementById('meta-title').textContent = (S.meta&&S.meta.title)||(S.brand&&S.brand.name)||'Estética';
  document.getElementById('meta-desc').setAttribute('content',(S.meta&&S.meta.description)||'');
  if(S.meta&&S.meta.lang) document.documentElement.lang=S.meta.lang;

  var b=S.brand||{}, h=S.hero||{}, c=S.contact||{};
  document.querySelector('.ld').innerHTML = ini(b.name).split('').map(function(ch){return '<span>'+esc(ch)+'</span>';}).join('');

  var hasBa = S.antesDepois && S.antesDepois.items && S.antesDepois.items.length;
  var hasSvc = S.services && S.services.items && S.services.items.length;
  var hasAg = !!S.agenda;
  var hasGal = S.instagram && S.instagram.show!==false && S.instagram.url;

  var nav=[{id:'inicio',label:'Início'}];
  if(hasBa) nav.push({id:'resultados',label:(S.antesDepois.navLabel||'Resultados')});
  if(hasSvc) nav.push({id:'servicos',label:(S.services.navLabel||'Serviços')});
  if(hasAg) nav.push({id:'agenda',label:(S.agenda.navLabel||'Agendar')});
  nav.push({id:'contato',label:'Contato'});

  var brandHtml='<a href="#inicio" class="brand">'+(b.nameHtml||esc(b.name))+(b.tagline?'<span class="tag">'+esc(b.tagline)+'</span>':'')+'</a>';
  document.getElementById('header').innerHTML='<div class="container nav">'+brandHtml+
    '<nav class="nav-links" id="navLinks">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    '<div class="nav-right"><a href="#'+(hasAg?'agenda':'contato')+'" class="btn btn--solid">'+esc((h.ctaAgendar)||'Agendar')+'</a>'+
    '<button class="burger" id="burger" aria-label="Menu"><span></span><span></span></button></div></div>';

  var waLink=c.whatsapp?'https://wa.me/'+String(c.whatsapp).replace(/\D/g,''):(c.instagramUrl||'#');
  function wa(text){ return (waLink!=='#') ? (waLink+'?text='+encodeURIComponent(text)) : '#contato'; }
  var html='';

  /* HERO */
  var hv = h.image ? '<img loading="lazy" src="'+esc(h.image)+'" alt="'+esc(b.name)+'">' : '<span class="vl">'+svg('sparkle')+esc(h.imageLabel||'Sua foto aqui')+'</span>';
  html+='<section class="hero" id="inicio"><div class="container"><div class="hero-grid">'+
    '<div><span class="kicker">'+esc(h.eyebrow||'Estética & Bem-estar')+'</span>'+
      '<h1>'+(h.titleHtml||esc(h.title||b.name))+'</h1>'+
      (h.sub?'<p class="hero-lead">'+esc(h.sub)+'</p>':'')+
      '<div class="hero-actions">'+
        '<a href="'+esc((h.ctaPrimary&&h.ctaPrimary.href)||('#'+(hasAg?'agenda':'contato')))+'" class="btn btn--solid">'+esc((h.ctaPrimary&&h.ctaPrimary.label)||'Agendar avaliação')+' '+ARR+'</a>'+
        (h.ctaGhost?'<a href="'+esc(h.ctaGhost.href||'#servicos')+'" class="btn btn--ghost">'+esc(h.ctaGhost.label)+'</a>':'')+
      '</div></div>'+
    '<div class="hero-visual">'+hv+'</div>'+
  '</div></div></section>';

  /* ANTES & DEPOIS */
  if(hasBa){
    var ad=S.antesDepois;
    html+='<section class="section ba-wrap" id="resultados"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(ad.eyebrow||'Resultados')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(ad.titleHtml||esc(ad.title||'Antes & depois'))+'</h2>'+
      (ad.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(ad.intro)+'</p>':'')+'</div>'+
      '<div class="ba-grid">'+
      ad.items.map(function(it){
        var after = it.depois ? '<img loading="lazy" src="'+esc(it.depois)+'" alt="depois">' : '<span class="ph">Depois</span>';
        var before = it.antes ? '<img loading="lazy" src="'+esc(it.antes)+'" alt="antes">' : '<span class="ph">Antes</span>';
        return '<div class="ba" data-rev>'+
          '<div class="ba-img ba-after">'+after+'<span class="ba-tag ba-tag-a">Depois</span></div>'+
          '<div class="ba-img ba-before">'+before+'<span class="ba-tag ba-tag-b">Antes</span></div>'+
          '<div class="ba-handle"></div>'+
          '<input type="range" class="ba-range" min="0" max="100" value="50" aria-label="Comparar antes e depois">'+
          (it.label?'<span class="ba-label">'+esc(it.label)+'</span>':'')+
        '</div>';
      }).join('')+
      '</div></div></section>';
  }

  /* SERVIÇOS (com preço) */
  if(hasSvc){
    var sv=S.services;
    html+='<section class="section" id="servicos"><div class="container">'+
      '<div style="max-width:680px"><span class="kicker" data-rev>'+esc(sv.eyebrow||'Serviços')+'</span>'+
      '<h2 class="sec-title" data-rev data-d="1">'+(sv.titleHtml||esc(sv.title||'Serviços & Tratamentos'))+'</h2>'+
      (sv.intro?'<p class="sec-intro" data-rev data-d="1">'+esc(sv.intro)+'</p>':'')+'</div>'+
      '<div class="svc-grid">'+
      sv.items.map(function(it,i){return '<article class="svc" data-rev'+(i%2?' data-d="1"':'')+'>'+
        '<div class="svc-ic">'+svg(it.icon||'sparkle')+'</div>'+
        '<div class="svc-main"><h3>'+esc(it.name)+'</h3>'+(it.desc?'<p>'+esc(it.desc)+'</p>':'')+'</div>'+
        (it.price?'<span class="svc-price">'+esc(it.price)+'</span>':'')+
      '</article>';}).join('')+
      '</div></div></section>';
  }

  /* AGENDA */
  if(hasAg){
    var ag=S.agenda;
    var hours=(ag.horarios||[]).map(function(hr){return '<li>'+svg('clock')+esc(hr)+'</li>';}).join('');
    var right = ag.embed ? '<div class="agenda-embed"><iframe loading="lazy" src="'+esc(ag.embed)+'" title="Agendamento"></iframe></div>'
      : '<div class="agenda-card"><div class="ac-ic">'+svg('calendar')+'</div><h3>'+esc(ag.cardTitle||'Agende pelo WhatsApp')+'</h3>'+
        '<p>'+esc(ag.cardText||'Resposta rápida para marcar o seu horário no melhor dia para você.')+'</p>'+
        '<a class="btn btn--solid" href="'+esc(wa('Olá! Gostaria de agendar um horário.'))+'" target="_blank" rel="noopener">'+esc(ag.cta||'Agendar pelo WhatsApp')+' '+ARR+'</a></div>';
    html+='<section class="section agenda" id="agenda"><div class="container"><div class="agenda-grid">'+
      '<div><span class="kicker" data-rev>'+esc(ag.eyebrow||'Agendamento')+'</span>'+
        '<h2 data-rev data-d="1">'+(ag.titleHtml||esc(ag.title||'Agende o seu horário'))+'</h2>'+
        (ag.intro?'<p data-rev data-d="1">'+esc(ag.intro)+'</p>':'')+
        (hours?'<ul class="agenda-hours" data-rev data-d="2">'+hours+'</ul>':'')+
      '</div>'+
      '<div data-rev data-d="1">'+right+'</div>'+
    '</div></div></section>';
  }

  /* GALERIA */
  if(hasGal){
    var ig=S.instagram;
    var caps=(ig.captions&&ig.captions.length)?ig.captions:(hasSvc?S.services.items.map(function(i){return i.name;}):[]);
    var cells='';
    for(var gi=0;gi<6;gi++){ var cap=caps.length?caps[gi%caps.length]:''; cells+='<a class="gal-item" href="'+esc(ig.url)+'" target="_blank" rel="noopener"><span class="g">'+svg('sparkle')+(cap?'<em>'+esc(cap)+'</em>':'')+'</span><span class="ov">'+IGS+'</span></a>'; }
    html+='<section class="section" id="galeria"><div class="container">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px">'+
      '<div><span class="kicker" data-rev>'+esc(ig.handle||'@instagram')+'</span><h2 class="sec-title" data-rev data-d="1">'+(ig.titleHtml||esc(ig.title||'Nossos resultados'))+'</h2></div>'+
      '<a href="'+esc(ig.url)+'" target="_blank" rel="noopener" class="btn btn--ghost" data-rev data-d="1">Seguir '+IGS+'</a></div>'+
      '<div class="gal-grid" data-rev data-d="1">'+cells+'</div></div></section>';
  }

  /* DEPOIMENTOS */
  if(S.testimonials&&S.testimonials.show!==false&&S.testimonials.items&&S.testimonials.items.length){
    var te=S.testimonials;
    html+='<section class="section quotes" id="depoimentos"><div class="container">'+
      '<span class="kicker" data-rev>'+esc(te.eyebrow||'Depoimentos')+'</span>'+
      '<div class="qmark" data-rev>&ldquo;</div>'+
      '<div class="qtrack" data-rev data-d="1"><div class="qslides" id="qslides">'+
      te.items.map(function(it){return '<div class="qslide"><p class="qquote">'+esc(it.quote||it.text)+'</p><div class="qauthor">'+esc(it.name)+'<span>'+esc(it.meta||'')+'</span></div></div>';}).join('')+
      '</div></div><div class="qdots" id="qdots"></div></div></section>';
  }

  /* CONTATO */
  var info='';
  if(c.whatsapp||c.phoneDisplay) info+='<a class="it" href="'+esc(waLink)+'" target="_blank" rel="noopener">'+WAS+'<div><h4>'+(c.whatsapp?'WhatsApp':'Telefone')+'</h4><p>'+esc(c.phoneDisplay||c.whatsapp)+'</p></div></a>';
  if(c.instagramUrl) info+='<a class="it" href="'+esc(c.instagramUrl)+'" target="_blank" rel="noopener">'+IGS+'<div><h4>Instagram</h4><p>'+esc((S.instagram&&S.instagram.handle)||c.instagramUrl)+'</p></div></a>';
  if(c.address) info+='<div class="it">'+svg('pin')+'<div><h4>Endereço</h4><p>'+esc(c.address)+'</p></div></div>';
  if(c.hours) info+='<div class="it">'+svg('clock')+'<div><h4>Horário</h4><p>'+esc(c.hours)+'</p></div></div>';
  var map=c.mapsEmbed?'<div class="cmap"><iframe loading="lazy" src="'+esc(c.mapsEmbed)+'"></iframe></div>':'';
  var svcOpts=(hasSvc?S.services.items.map(function(i){return i.name;}):[]);
  html+='<section class="section" id="contato"><div class="container">'+
    '<span class="kicker" data-rev>'+esc(c.eyebrow||'Contato')+'</span>'+
    '<h2 class="sec-title" data-rev data-d="1">'+(c.titleHtml||esc(c.title||'Vamos cuidar de você'))+'</h2>'+
    '<div class="contact-grid">'+
    '<form class="cform" id="cform" data-rev novalidate>'+
      '<div class="fld"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" required></div>'+
      '<div class="frow"><div class="fld"><label>WhatsApp</label><input type="tel" name="whats" placeholder="(00) 00000-0000" required></div>'+
      (svcOpts.length?'<div class="fld"><label>Tratamento</label><select name="servico"><option value="">Selecione</option>'+svcOpts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('')+'</select></div>':'<div class="fld"><label>E-mail</label><input type="email" name="email" placeholder="voce@email.com"></div>')+
      '</div>'+
      '<div class="fld"><label>Mensagem</label><textarea name="msg" placeholder="Como podemos ajudar?"></textarea></div>'+
      '<button type="submit" class="btn btn--solid" id="cbtn" style="justify-self:start">Agendar agora '+ARR+'</button>'+
      '<p class="cmsg" id="cmsg"></p></form>'+
    '<div class="cinfo" data-rev data-d="1">'+info+map+'</div>'+
    '</div></div></section>';

  document.getElementById('app').innerHTML=html;

  var foot=S.footer||{};
  var soc='';
  if(S.instagram&&S.instagram.url) soc+='<a href="'+esc(S.instagram.url)+'" target="_blank" rel="noopener" aria-label="Instagram">'+IGS+'</a>';
  if(c.whatsapp) soc+='<a href="'+esc(waLink)+'" target="_blank" rel="noopener" aria-label="WhatsApp">'+WAS+'</a>';
  if(c.email) soc+='<a href="mailto:'+esc(c.email)+'" aria-label="E-mail">'+MS+'</a>';
  document.getElementById('footer').innerHTML='<div class="container"><div class="fmark">'+esc(b.name)+'</div>'+
    (foot.tagline?'<p class="ftag">'+esc(foot.tagline)+'</p>':'')+
    '<nav class="fnav">'+nav.map(function(n){return '<a href="#'+n.id+'">'+esc(n.label)+'</a>';}).join('')+'</nav>'+
    (soc?'<div class="fsoc">'+soc+'</div>':'')+
    '<p class="fcopy">© <span id="yr"></span> '+esc(b.name)+' · Todos os direitos reservados.</p></div>';

  if(c.whatsapp){ var w=document.getElementById('wa'); w.href=waLink; w.style.display='grid'; }
  document.getElementById('yr').textContent=new Date().getFullYear();

  /* INTERAÇÕES */
  window.addEventListener('load',function(){ setTimeout(function(){ document.getElementById('loader').classList.add('hidden'); },800); });
  var header=document.getElementById('header');
  addEventListener('scroll',function(){ header.classList.toggle('scrolled',scrollY>40); },{passive:true});

  var burger=document.getElementById('burger'), navLinks=document.getElementById('navLinks');
  function tm(f){ var o=f!==undefined?f:!navLinks.classList.contains('open'); navLinks.classList.toggle('open',o); burger.classList.toggle('open',o); document.body.style.overflow=o?'hidden':''; }
  burger.addEventListener('click',function(){ tm(); });
  navLinks.querySelectorAll('a').forEach(function(x){ x.addEventListener('click',function(){ tm(false); }); });

  /* slider antes/depois */
  document.querySelectorAll('.ba').forEach(function(ba){
    var range=ba.querySelector('.ba-range'), before=ba.querySelector('.ba-before'), handle=ba.querySelector('.ba-handle');
    function set(v){ before.style.clipPath='inset(0 '+(100-v)+'% 0 0)'; handle.style.left=v+'%'; }
    range.addEventListener('input',function(){ set(+range.value); });
    set(50);
  });

  var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); },{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-rev]').forEach(function(el){ io.observe(el); });

  var qs=document.getElementById('qslides');
  if(qs&&qs.children.length>1){
    var n=qs.children.length, dots=document.getElementById('qdots'), cur=0, tmr;
    for(var i=0;i<n;i++){ var d=document.createElement('button'); d.className=i===0?'active':''; d.dataset.i=i; dots.appendChild(d); }
    function go(k){ cur=(k+n)%n; qs.style.transform='translateX(-'+(cur*100)+'%)'; [].forEach.call(dots.children,function(x,j){ x.classList.toggle('active',j===cur); }); }
    dots.addEventListener('click',function(e){ if(e.target.dataset.i!==undefined){ go(+e.target.dataset.i); rs(); } });
    function au(){ tmr=setInterval(function(){ go(cur+1); },5200); } function rs(){ clearInterval(tmr); au(); } au();
  }

  var form=document.getElementById('cform');
  if(form){ var btn=document.getElementById('cbtn'), msg=document.getElementById('cmsg');
    form.addEventListener('submit',function(e){ e.preventDefault();
      if(!form.nome.value.trim()||!form.whats.value.trim()){ msg.style.color='#C0392B'; msg.textContent='Preencha nome e WhatsApp.'; return; }
      btn.textContent='Enviando...'; btn.disabled=true; msg.textContent='';
      setTimeout(function(){ btn.innerHTML='Agendar agora '+ARR; btn.disabled=false; msg.style.color=acc;
        if(c.whatsapp){ var t='Olá! Meu nome é '+form.nome.value+'.'+(form.servico&&form.servico.value?' Tratamento: '+form.servico.value+'.':'')+(form.msg.value?' '+form.msg.value:''); window.open(waLink+'?text='+encodeURIComponent(t),'_blank'); msg.textContent='✓ Te levamos para o WhatsApp!'; }
        else msg.textContent='✓ Mensagem enviada! Em breve entramos em contato.';
        form.reset();
      },1100);
    });
  }
})();
</script>
</body>
</html>
